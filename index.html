<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f43f5e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hearty">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Hearty%20%E2%80%94%20Noughts%20%26%20Crosses%22%2C%22short_name%22%3A%22Hearty%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22portrait%22%2C%22background_color%22%3A%22%231a0a12%22%2C%22theme_color%22%3A%22%23f43f5e%22%2C%22start_url%22%3A%22.%2F%22%7D">
<style>
  /* ── PORTRAIT LOCK ── */
  @media screen and (orientation: landscape) and (max-width: 900px) and (min-height: 400px) {
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      background: #1a0a12;
    }
    #portrait-msg {
      display: flex !important;
    }
  }
  /* Pause all CSS animations when the Page Visibility API marks app hidden.
     The .app-hidden class is toggled by JS on visibilitychange.
     animation-play-state:paused freezes every keyframe animation on the page,
     saving CPU/battery on mobile while in the background.               */
  body.app-hidden * {
    animation-play-state: paused !important;
  }

  #portrait-msg {
    display: none;
    position: fixed; inset: 0; z-index: 10000;
    background: linear-gradient(160deg, #1a0a12 0%, #12100e 50%, #0a1020 100%);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 24px; color: #f9a8d4; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 16px; text-align: center; padding: 40px;
  }
  #portrait-msg svg { opacity: 0.85; }
  #portrait-msg p { color: #e879a0; font-size: 14px; font-weight: 700; max-width: 260px; line-height: 1.5; margin-top: -8px; }
</style>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=DM+Mono:wght@400;500&family=Lilita+One&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes heartyBreathe {
    0%,100% { transform: translateX(-50%) scale(1); }
    50%      { transform: translateX(-50%) scale(1.045); }
  }
  @keyframes heartySpeaking {
    0%   { transform: translateX(-50%) scale(1); }
    20%  { transform: translateX(-50%) scale(1.06); }
    50%  { transform: translateX(-50%) scale(1.04); }
    75%  { transform: translateX(-50%) scale(1.07); }
    100% { transform: translateX(-50%) scale(1); }
  }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  @keyframes drawLine {
    from { stroke-dashoffset: 40; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes drawCircle {
    from { stroke-dashoffset: 88; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes fadeSlideIn {
    from { opacity:0; transform: translateY(14px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,120,180,0); }
    50%      { box-shadow: 0 0 28px 8px rgba(255,120,180,0.2); }
  }
  @keyframes wiggle {
    0%,100% { transform: translateX(-50%) rotate(0deg); }
    25% { transform: translateX(-50%) rotate(-7deg); }
    75% { transform: translateX(-50%) rotate(7deg); }
  }
  @keyframes cupPop {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    70% { transform: scale(1.2) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  @keyframes dotTyping {
    0% { transform: translateY(0px); opacity: 0.3; }
    50% { transform: translateY(-5px); opacity: 1; }
    100% { transform: translateY(0px); opacity: 0.3; }
  }
  @keyframes modalIn {
    from { opacity:0; transform: scale(0.88) translateY(20px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }
  @keyframes matchBannerIn {
    from { opacity:0; transform: scale(0.7) rotate(-4deg); }
    to   { opacity:1; transform: scale(1) rotate(0deg); }
  }
  @keyframes bubbleIn {
    from { opacity:0; transform: translateY(8px) scale(0.92); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  /* Warmer entrance for encouragement tier 2 (2-3 losses) */
  @keyframes bubbleEncourage {
    0%   { opacity:0; transform: translateY(6px) scale(0.88); }
    60%  { opacity:1; transform: translateY(-4px) scale(1.04); }
    80%  { transform: translateY(2px) scale(0.98); }
    100% { opacity:1; transform: translateY(0) scale(1); }
  }
  /* Full cheerleader bounce for tier 3+ (4+ losses) */
  @keyframes bubbleCheer {
    0%   { opacity:0; transform: translateY(8px) scale(0.84); }
    40%  { opacity:1; transform: translateY(-7px) scale(1.07); }
    65%  { transform: translateY(3px) scale(0.97); }
    82%  { transform: translateY(-3px) scale(1.02); }
    100% { opacity:1; transform: translateY(0) scale(1); }
  }
  .speech-bubble.encourage { animation: bubbleEncourage 0.5s cubic-bezier(0.34,1.56,0.64,1); opacity:1; }
  .speech-bubble.cheer     { animation: bubbleCheer 0.65s cubic-bezier(0.34,1.56,0.64,1); opacity:1; }

  .shake-error {
    animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
    border-color: var(--theme-x-color, #f43f5e) !important;
    background: rgba(254, 226, 226, 0.8) !important;
    z-index: 10;
  }
  .thinking-dots { display: flex; gap: 6px; align-items: center; justify-content: center; }
  .thinking-dots span {
    width: 8px; height: 8px; background-color: var(--theme-accent); border-radius: 50%;
    display: inline-block; animation: dotTyping 1s infinite ease-in-out;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* ── TUTORIAL MODE ── */
  /* tutorialPulse uses a CSS custom property so the glow colour tracks the
     active theme. --tutorial-glow is set on :root below and overridden per
     theme. Keyframes can only read custom properties that are on :root or
     inherited, so we define it there and update it in each theme block.     */
  :root {
    --tutorial-glow: rgba(255,120,180,0.45);
    --tutorial-glow0: rgba(255,120,180,0);
  }
  @keyframes tutorialPulse {
    0%,100% { box-shadow: 0 0 0 0 var(--tutorial-glow0); transform: scale(1); }
    50%      { box-shadow: 0 0 0 6px var(--tutorial-glow);  transform: scale(1.06); }
  }
  @keyframes tutorialBadgePop {
    0%   { transform: scale(0) rotate(-15deg); opacity:0; }
    70%  { transform: scale(1.15) rotate(5deg); opacity:1; }
    100% { transform: scale(1) rotate(0); opacity:1; }
  }
  .tutorial-highlight {
    animation: tutorialPulse 1.1s ease-in-out infinite !important;
    border-color: var(--theme-accent) !important;
    background: var(--win-cell-bg) !important;
    z-index: 20 !important;
    position: relative;
  }

  /* Bubble expands when tutorial is active to fit controls */
  .speech-bubble.tutorial-active {
    width: 210px !important;
    padding: 9px 11px 8px !important;
    min-height: unset !important;
    align-items: flex-start !important;
    flex-direction: column !important;
    gap: 4px !important;
  }
  /* Override .speech-bubble p centred text for tutorial paragraphs */
  .speech-bubble.tutorial-active p {
    text-align: left !important;
  }
  /* Anchor tail to bottom of bubble (toward Hearty) when bubble is taller */
  .speech-bubble.tutorial-active .bubble-tail,
  .speech-bubble.tutorial-active .bubble-tail-border {
    top: auto !important;
    bottom: 16px !important;
    transform: none !important;
  }

  /* Tutorial content inside the bubble */
  .tut-text {
    font-size: 10.5px; font-weight: 700; color: var(--bubble-text);
    line-height: 1.4; text-align: left; width: 100%;
  }
  .tut-meta {
    font-size: 9.5px; font-weight: 700; color: var(--text-label);
    width: 100%; margin-bottom: 3px;
  }
  .tut-btn-row {
    display: flex; gap: 5px; align-items: center; justify-content: space-between;
    width: 100%; margin-top: 2px;
  }
  .tut-skip {
    font-size: 10px; font-weight: 800; color: var(--text-label);
    background: none; border: none; cursor: pointer; padding: 0;
    font-family: 'Nunito', sans-serif; opacity: 0.7; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .tut-skip:active { opacity: 1; }
  .tut-next {
    font-size: 10.5px; font-weight: 900; color: white;
    background: var(--theme-btn-grad, linear-gradient(135deg,#f43f5e,#e879a0));
    border: none; cursor: pointer; padding: 4px 11px;
    border-radius: 12px;
    box-shadow: 0 2px 8px var(--theme-btn-shadow, rgba(244,63,94,0.3));
    font-family: 'Nunito', sans-serif; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .tut-next:active { transform: scale(0.93); }
  .tut-wait {
    font-size: 10px; font-weight: 700; color: var(--text-label);
    font-style: italic; font-family: 'Nunito', sans-serif;
  }
  /* .tutorial-icon-btn kept as fallback but not in DOM */
  .tutorial-icon-btn {
    background: var(--theme-btn-grad, linear-gradient(135deg,#f43f5e,#e879a0));
    color: white; border: none; border-radius: 50%;
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 900; cursor: pointer;
    box-shadow: 0 2px 10px var(--theme-btn-shadow, rgba(244,63,94,0.3));
    font-family: 'Nunito', sans-serif;
  }

  /* ── DARK MODE ── */
  body.dark-mode {
    --bg: linear-gradient(160deg, #1a0a12 0%, #12100e 30%, #0a1020 65%, #130a22 100%);
    --bg-before1: rgba(120,30,70,0.3);
    --bg-before2: rgba(20,50,120,0.25);
    --bg-before3: rgba(60,20,120,0.22);
    --bg-before4: rgba(120,70,20,0.2);
    --card-bg: rgba(30,15,25,0.85);
    --card-border: rgba(180,60,110,0.35);
    --status-bg: rgba(30,15,25,0.8);
    --board-bg: rgba(25,12,22,0.75);
    --cell-bg: rgba(40,18,35,0.7);
    --cell-hover: rgba(60,20,45,0.95);
    --bubble-bg: #1e0e1a;
    --bubble-border: #8b3060;
    --bubble-text: #f9a8d4;
    --text-main: #f9a8d4;
    --text-sub: #e879a0;
    --text-label: #c080a0;
    --score-label: #b06080;
    --footer: #906070;
    --btn-inactive-bg: rgba(40,15,30,0.8);
    --btn-inactive-color: #d080a0;
    --btn-inactive-border: rgba(244,63,94,0.3);
    --btn-diff-inactive-bg: rgba(30,15,50,0.7);
    --btn-diff-inactive-color: #c0a0e0;
    --win-cell-bg: rgba(80,20,50,0.9);
    --modal-bg: #1e0e1a;
    --modal-border: rgba(180,60,110,0.5);
    --input-bg: rgba(40,18,35,0.9);
    --input-border: rgba(180,60,110,0.4);
    --series-bg: rgba(25,10,20,0.8);
  }
  body:not(.dark-mode) {
    --bg: linear-gradient(160deg, #ffeaf4 0%, #fff0e8 30%, #eaf4ff 65%, #f0eaff 100%);
    --card-bg: rgba(255,255,255,0.75);
    --card-border: rgba(255,182,213,0.4);
    --status-bg: rgba(255,255,255,0.7);
    --board-bg: rgba(255,255,255,0.65);
    --cell-bg: rgba(255,255,255,0.6);
    --cell-hover: rgba(255,240,248,0.95);
    --bubble-bg: white;
    --bubble-border: #fbb6ce;
    --bubble-text: #be185d;
    --text-main: #c0386e;
    --text-sub: #d4648a;
    --text-label: #d4648a;
    --score-label: #9d6d80;
    --footer: #c08090;
    --btn-inactive-bg: rgba(255,255,255,0.7);
    --btn-inactive-color: #a0657e;
    --btn-inactive-border: rgba(244,63,94,0.2);
    --btn-diff-inactive-bg: rgba(255,255,255,0.6);
    --btn-diff-inactive-color: #a89fc0;
    --win-cell-bg: rgba(255,220,235,0.8);
    --modal-bg: white;
    --modal-border: rgba(255,182,213,0.6);
    --input-bg: rgba(255,255,255,0.9);
    --input-border: rgba(244,63,94,0.3);
    --series-bg: rgba(255,255,255,0.7);
  }

  /* ════════════════════════════════════════════════════
     THEME ENGINE — seasonal / mood palettes
     Each theme overrides the same CSS vars used throughout.
     body[data-theme="x"] sets the palette.
     Default (no attribute / "default") = original Hearty pink.
     ════════════════════════════════════════════════════ */

  /* ── PASTEL SPRING ── mint, lilac, blossom */
  body[data-theme="spring"]:not(.dark-mode) {
    --bg: linear-gradient(160deg,#f0faf4 0%,#fdf4ff 35%,#fff0f8 65%,#f4f8ff 100%);
    --card-bg: rgba(255,255,255,0.78); --card-border: rgba(134,239,172,0.45);
    --status-bg: rgba(255,255,255,0.72); --board-bg: rgba(255,255,255,0.68);
    --cell-bg: rgba(240,255,244,0.65); --cell-hover: rgba(220,255,230,0.95);
    --bubble-bg: white; --bubble-border: #86efac; --bubble-text: #16a34a;
    --text-main: #15803d; --text-sub: #4ade80; --text-label: #22c55e;
    --score-label: #6b9e7a; --footer: #86b094;
    --btn-inactive-bg: rgba(255,255,255,0.72); --btn-inactive-color: #5a8a6a;
    --btn-inactive-border: rgba(74,222,128,0.25);
    --btn-diff-inactive-bg: rgba(250,245,255,0.7); --btn-diff-inactive-color: #a78bfa;
    --win-cell-bg: rgba(187,247,208,0.85); --modal-bg: white;
    --modal-border: rgba(134,239,172,0.55); --input-bg: rgba(255,255,255,0.92);
    --input-border: rgba(74,222,128,0.35); --series-bg: rgba(255,255,255,0.72);
    --theme-accent:#22c55e; --theme-letterbox:#f0faf4; --theme-title:#16a34a;
    --theme-title-glow:rgba(34,197,94,0.45);
    --theme-x-color:#16a34a; --theme-o-color:#a855f7;
    --theme-btn-grad:linear-gradient(135deg,#22c55e,#4ade80);
    --theme-btn-shadow:rgba(34,197,94,0.3);
    --theme-burger-grad:linear-gradient(135deg,#22c55e,#4ade80);
    --theme-burger-shadow:rgba(34,197,94,0.4);
    --tutorial-glow:rgba(34,197,94,0.5);
    --tutorial-glow0:rgba(34,197,94,0);
  }
  body[data-theme="spring"].dark-mode {
    --bg: linear-gradient(160deg,#052e16 0%,#0a1f0e 30%,#1a0a2e 65%,#0e1a05 100%);
    --card-bg:rgba(5,46,22,0.85); --card-border:rgba(74,222,128,0.3);
    --status-bg:rgba(5,46,22,0.8); --board-bg:rgba(5,46,22,0.75);
    --cell-bg:rgba(10,60,25,0.7); --cell-hover:rgba(15,80,35,0.95);
    --bubble-bg:#052e16; --bubble-border:#4ade80; --bubble-text:#86efac;
    --text-main:#86efac; --text-sub:#4ade80; --text-label:#22c55e;
    --score-label:#2d6a40; --footer:#2d6a40;
    --btn-inactive-bg:rgba(10,50,20,0.8); --btn-inactive-color:#86efac;
    --btn-inactive-border:rgba(74,222,128,0.3);
    --btn-diff-inactive-bg:rgba(20,5,50,0.7); --btn-diff-inactive-color:#c4b5fd;
    --win-cell-bg:rgba(20,100,50,0.9); --modal-bg:#052e16;
    --modal-border:rgba(74,222,128,0.4); --input-bg:rgba(10,50,20,0.9);
    --input-border:rgba(74,222,128,0.35); --series-bg:rgba(5,40,18,0.8);
    --theme-accent:#4ade80; --theme-letterbox:#052e16; --theme-title:#86efac;
    --theme-title-glow:rgba(74,222,128,0.6);
    --theme-x-color:#4ade80; --theme-o-color:#c084fc;
    --theme-btn-grad:linear-gradient(135deg,#16a34a,#4ade80);
    --theme-btn-shadow:rgba(74,222,128,0.3);
    --theme-burger-grad:linear-gradient(135deg,#16a34a,#4ade80);
    --theme-burger-shadow:rgba(74,222,128,0.4);
    --tutorial-glow:rgba(74,222,128,0.5);
    --tutorial-glow0:rgba(74,222,128,0);
  }

  /* ── NEON NIGHT ── electric cyan, hot magenta, void */
  body[data-theme="neon"] {
    --bg: linear-gradient(160deg,#0d0221 0%,#0a0a2e 35%,#1a0a2e 65%,#0d1a2e 100%);
    --card-bg:rgba(15,5,40,0.82); --card-border:rgba(0,255,255,0.3);
    --status-bg:rgba(10,5,30,0.8); --board-bg:rgba(10,5,30,0.75);
    --cell-bg:rgba(20,5,50,0.65); --cell-hover:rgba(0,255,255,0.08);
    --bubble-bg:#0d0221; --bubble-border:#00ffff; --bubble-text:#00ffff;
    --text-main:#00ffff; --text-sub:#ff00ff; --text-label:#00bfff;
    --score-label:#4080a0; --footer:#305060;
    --btn-inactive-bg:rgba(15,5,40,0.8); --btn-inactive-color:#00bfff;
    --btn-inactive-border:rgba(0,255,255,0.25);
    --btn-diff-inactive-bg:rgba(20,0,50,0.7); --btn-diff-inactive-color:#ff00ff;
    --win-cell-bg:rgba(0,255,255,0.12); --modal-bg:#0d0221;
    --modal-border:rgba(0,255,255,0.4); --input-bg:rgba(20,5,50,0.9);
    --input-border:rgba(0,255,255,0.35); --series-bg:rgba(10,5,35,0.8);
    --theme-accent:#00ffff; --theme-letterbox:#0d0221; --theme-title:#00ffff;
    --theme-title-glow:rgba(0,255,255,0.7);
    --theme-x-color:#00ffff; --theme-o-color:#ff00ff;
    --theme-btn-grad:linear-gradient(135deg,#00ffff,#0080ff);
    --theme-btn-shadow:rgba(0,255,255,0.35);
    --theme-burger-grad:linear-gradient(135deg,#ff00ff,#00ffff);
    --theme-burger-shadow:rgba(0,255,255,0.5);
    --tutorial-glow:rgba(0,255,255,0.55);
    --tutorial-glow0:rgba(0,255,255,0);
  }
  body[data-theme="neon"].dark-mode {
    --bg:linear-gradient(160deg,#050010 0%,#040418 30%,#0e0518 65%,#040e18 100%);
    --card-bg:rgba(8,2,25,0.92); --cell-bg:rgba(12,2,35,0.8);
    --theme-letterbox:#050010;
  }

  /* ── SPOOKY HALLOWEEN ── pumpkin, ghost, void */
  body[data-theme="halloween"] {
    --bg:linear-gradient(160deg,#1a0800 0%,#0f0a00 35%,#1a0a00 65%,#0a0508 100%);
    --card-bg:rgba(30,12,0,0.85); --card-border:rgba(251,146,60,0.35);
    --status-bg:rgba(25,10,0,0.82); --board-bg:rgba(20,8,0,0.78);
    --cell-bg:rgba(40,15,0,0.7); --cell-hover:rgba(251,146,60,0.10);
    --bubble-bg:#1a0800; --bubble-border:#fb923c; --bubble-text:#fed7aa;
    --text-main:#fb923c; --text-sub:#fdba74; --text-label:#f97316;
    --score-label:#7c4a20; --footer:#5a3010;
    --btn-inactive-bg:rgba(35,12,0,0.82); --btn-inactive-color:#fdba74;
    --btn-inactive-border:rgba(251,146,60,0.3);
    --btn-diff-inactive-bg:rgba(20,5,30,0.7); --btn-diff-inactive-color:#c084fc;
    --win-cell-bg:rgba(251,146,60,0.15); --modal-bg:#1a0800;
    --modal-border:rgba(251,146,60,0.4); --input-bg:rgba(40,15,0,0.9);
    --input-border:rgba(251,146,60,0.4); --series-bg:rgba(20,8,0,0.82);
    --theme-accent:#fb923c; --theme-letterbox:#1a0800; --theme-title:#fb923c;
    --theme-title-glow:rgba(251,146,60,0.65);
    --theme-x-color:#fb923c; --theme-o-color:#c084fc;
    --theme-btn-grad:linear-gradient(135deg,#ea580c,#fb923c);
    --theme-btn-shadow:rgba(251,146,60,0.35);
    --theme-burger-grad:linear-gradient(135deg,#7c2d12,#fb923c);
    --theme-burger-shadow:rgba(251,146,60,0.45);
    --tutorial-glow:rgba(251,146,60,0.5);
    --tutorial-glow0:rgba(251,146,60,0);
  }
  body[data-theme="halloween"].dark-mode {
    --bg:linear-gradient(160deg,#0a0400 0%,#060400 30%,#0a0300 65%,#050205 100%);
    --card-bg:rgba(15,6,0,0.92); --cell-bg:rgba(25,8,0,0.82);
    --theme-letterbox:#0a0400;
  }

  /* ── OCEAN BREEZE ── aqua, seafoam, deep navy */
  body[data-theme="ocean"]:not(.dark-mode) {

    --win-cell-bg:rgba(251,191,36,0.18); --modal-bg:#2d1a00;
    --modal-border:rgba(251,191,36,0.4); --input-bg:rgba(55,32,0,0.9);

    --theme-btn-shadow:rgba(251,191,36,0.3);
    --theme-burger-grad:linear-gradient(135deg,#d97706,#fbbf24);
    --theme-burger-shadow:rgba(251,191,36,0.45);

  /* ── Default theme — wire up theme vars for original pink ── */
  body:not([data-theme]), body[data-theme="default"] {
    --theme-accent:#f43f5e; --theme-letterbox:#ffeaf4; --theme-title:#f43f5e;
    --theme-title-glow:rgba(244,63,94,0.45);
    --theme-x-color:#f43f5e; --theme-o-color:#7c3aed;
    --theme-btn-grad:linear-gradient(135deg,#f43f5e,#e879a0);
    --theme-btn-shadow:rgba(244,63,94,0.3);
    --theme-burger-grad:linear-gradient(135deg,#f43f5e,#e879a0);
    --theme-burger-shadow:rgba(244,63,94,0.4);
    --tutorial-glow:rgba(244,63,94,0.5);
    --tutorial-glow0:rgba(244,63,94,0);
  }
  body.dark-mode:not([data-theme]), body.dark-mode[data-theme="default"] {
    --theme-letterbox:#1a0a12; --theme-title:#ff6b8a;
    --theme-title-glow:rgba(244,63,94,0.65);
  }

  /* ── Theme-reactive element overrides ── */
  /* These rules use CSS custom properties set per-theme so every themed
     element updates automatically when the theme changes.               */

  /* Title */
  .game-title-main { color: var(--theme-title) !important; }

  /* Hamburger / side menu */
  .menu-tab {
    background: var(--theme-burger-grad) !important;
    box-shadow: 0 4px 18px var(--theme-burger-shadow) !important;
  }

  /* Active mode / menu pills */
  .btn-pill.active-mode, .menu-pill.active-mode {
    background: var(--theme-btn-grad) !important;
    box-shadow: 0 3px 14px var(--theme-btn-shadow) !important;
  }

  /* Side menu toggles */
  .menu-toggle-icon.active {
    background: var(--theme-btn-grad) !important;
    border-color: var(--theme-accent) !important;
    box-shadow: 0 3px 12px var(--theme-btn-shadow) !important;
  }
  .menu-switch.on {
    background: var(--theme-btn-grad) !important;
    border-color: var(--theme-accent) !important;
  }

  /* ── New Game button ── */
  .new-game-btn {
    background: var(--theme-btn-grad) !important;
    box-shadow: 0 4px 20px var(--theme-btn-shadow) !important;
  }

  /* ── Rematch button ── */
  .rematch-btn {
    background: var(--theme-btn-grad) !important;
    box-shadow: 0 4px 16px var(--theme-btn-shadow) !important;
  }

  /* ── Modal OK / Let's Play button ── */
  .modal-btn {
    background: var(--theme-btn-grad) !important;
    box-shadow: 0 4px 16px var(--theme-btn-shadow) !important;
  }
  .modal-field input:focus { border-color: var(--theme-accent) !important; }

  /* ── Match banner border ── */
  .match-banner-box {
    border-color: var(--theme-accent) !important;
    box-shadow: 0 20px 80px var(--theme-btn-shadow) !important;
  }

  /* ── Cell mark colours — themed via currentColor on the SVG ── */
  .cell-x-svg { color: var(--theme-x-color); }
  .cell-o-svg { color: var(--theme-o-color); }
  .u-result-x { color: var(--theme-x-color); }
  .u-result-o { color: var(--theme-o-color); }

  /* ── Score numbers ── */
  .score-num.x { color: var(--theme-x-color) !important; }
  .score-num.o { color: var(--theme-o-color) !important; }

  /* ── Series pips ── */
  .pip.won-x { background: var(--theme-x-color) !important; border-color: var(--theme-x-color) !important; }
  .pip.won-o { background: var(--theme-o-color) !important; border-color: var(--theme-o-color) !important; }

  /* ── Status bar result state ── */
  .status-bar.result {
    border-color: var(--theme-accent) !important;
  }
  .status-text { color: var(--text-label) !important; }
  .status-text.win-x { color: var(--theme-x-color) !important; }
  .status-text.win-o { color: var(--theme-o-color) !important; }

  /* ── Cell hover ghost mark ── */
  .cell:hover:not(.disabled):not(.filled) {
    border-color: var(--theme-accent) !important;
  }
  .cell:not(.filled):not(.disabled):hover .cell-inner::before {
    color: color-mix(in srgb, var(--theme-x-color) 22%, transparent) !important;
  }
  .board-grid.o-turn .cell:not(.filled):not(.disabled):hover .cell-inner::before {
    color: color-mix(in srgb, var(--theme-o-color) 22%, transparent) !important;
  }

  /* ── Win cell highlight ── */
  .cell.win-cell {
    border-color: var(--theme-accent) !important;
    box-shadow: 0 0 22px 5px var(--theme-btn-shadow) !important;
  }

  /* ── Active difficulty pill ── */
  .btn-pill.active-diff {
    background: color-mix(in srgb, var(--theme-o-color) 18%, transparent) !important;
    color: var(--theme-o-color) !important;
    border-color: color-mix(in srgb, var(--theme-o-color) 35%, transparent) !important;
  }

  /* ── Theme swatch picker (inside side menu) ── */
  .theme-swatch {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer; transition: all 0.18s;
    display: inline-flex; align-items: center; justify-content: center;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    flex-shrink: 0; position: relative;
  }
  .theme-swatch.selected {
    border-color: white;
    box-shadow: 0 0 0 3px var(--theme-accent);
    transform: scale(1.18);
  }
  .theme-swatch:active { transform: scale(0.9); }
  .theme-swatch-tick {
    position: absolute; width: 12px; height: 12px;
    background: white; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
    font-size: 8px; color: #333; font-weight: 900;
  }
  .theme-swatch.selected .theme-swatch-tick { opacity: 1; }
  .theme-swatches-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 4px 4px 10px; align-items: center;
  }

  /* ── VIEWPORT SCALER ── */
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #ffeaf4; /* light mode letterbox — toggleDark() updates this */
  }
  #root {
    /* Fixed design canvas — everything is designed at this size */
    width: 390px;
    height: 780px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 12px 16px 16px;
    font-family: 'Nunito', sans-serif;
    /* ── BACKGROUND: colour wash + base gradient ──
       The SVG scatter is rendered in #root::after (a pseudo-element)
       so we can mask ONLY the scatter without hiding the game UI.
       This element carries only the colour-wash radials + base gradient. */
    background:
      /* Colour wash — pink bloom behind Hearty, purple corner tints */
      radial-gradient(ellipse 280px 130px at 50% 44%,  rgba(244,63,94,0.18)  0%, transparent 68%),
      radial-gradient(ellipse 190px 140px at 0%   0%,  rgba(124,58,237,0.14) 0%, transparent 62%),
      radial-gradient(ellipse 170px 120px at 100% 0%,  rgba(244,63,94,0.12)  0%, transparent 62%),
      radial-gradient(ellipse 240px 60px  at 50%  0%,  rgba(251,182,206,0.16) 0%, transparent 55%),
      /* Base page gradient */
      linear-gradient(160deg, #ffeaf4 0%, #fff0e8 30%, #eaf4ff 65%, #f0eaff 100%);
    position: absolute;
    top: 0; left: 0;
    transform-origin: top left;
    overflow: hidden;
    transition: background 0.4s;
  }
  /* Dark mode — default (pink) theme */
  body.dark-mode #root {
    background:
      radial-gradient(ellipse 280px 130px at 50% 44%,  rgba(244,63,94,0.30)  0%, transparent 68%),
      radial-gradient(ellipse 190px 140px at 0%   0%,  rgba(124,58,237,0.24) 0%, transparent 62%),
      radial-gradient(ellipse 170px 120px at 100% 0%,  rgba(244,63,94,0.20)  0%, transparent 62%),
      radial-gradient(ellipse 240px 60px  at 50%  0%,  rgba(180,40,90,0.20)  0%, transparent 55%),
      linear-gradient(160deg, #1a0a12 0%, #12100e 30%, #0a1020 65%, #130a22 100%);
  }
  /* ── SVG SCATTER LAYER — pseudo-element, masked independently ──
     Using ::after lets us apply mask-image ONLY to the scatter SVG
     without touching any game UI children.
     z-index: 0 sits below all #root > * children (z-index: 1+).        */
  /* ── SVG SCATTER LAYER — base rule (default light) ── */
  #root::after {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none; z-index: 0;
    background:
      url("https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/3095bc0db01eab570b679e338f7367e036abd388/assests/hearty-bg-default.svg")
      top center / 390px 340px no-repeat;
    -webkit-mask-image: linear-gradient(to bottom, black 0%, black 32%, transparent 48%);
    mask-image:         linear-gradient(to bottom, black 0%, black 32%, transparent 48%);
  }
  /* Default dark */
  body.dark-mode #root::after {
    background:
      url("https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/a9dedc52ba38154a32fec813495a90cff93f172a/assests/hearty-bg-default-dark.svg")
      top center / 390px 340px no-repeat;
  }

  /* ── PER-THEME OVERRIDES ──────────────────────────────────────────────────
     Each theme has two rules:
     1. body[theme] #root        — colour-wash radials + base gradient only
     2. body[theme] #root::after — swap the themed SVG scatter file
     Separating them keeps the mask on ::after isolated from the game UI.  */

  /* ── SPRING ── */
  body[data-theme="spring"]:not(.dark-mode) #root {
    background:
      radial-gradient(ellipse 280px 130px at 50% 44%,  rgba(34,197,94,0.14)   0%, transparent 68%),
      radial-gradient(ellipse 190px 140px at 0%   0%,  rgba(168,85,247,0.12)  0%, transparent 62%),
      radial-gradient(ellipse 170px 120px at 100% 0%,  rgba(34,197,94,0.10)   0%, transparent 62%),
      radial-gradient(ellipse 240px 60px  at 50%  0%,  rgba(187,247,208,0.16) 0%, transparent 55%),
      linear-gradient(160deg,#f0faf4 0%,#fdf4ff 35%,#fff0f8 65%,#f4f8ff 100%);
  }
  body[data-theme="spring"].dark-mode #root {
    background:
      radial-gradient(ellipse 280px 130px at 50% 44%,  rgba(74,222,128,0.22)  0%, transparent 68%),
      radial-gradient(ellipse 190px 140px at 0%   0%,  rgba(192,132,252,0.18) 0%, transparent 62%),
      radial-gradient(ellipse 170px 120px at 100% 0%,  rgba(74,222,128,0.16)  0%, transparent 62%),
      radial-gradient(ellipse 240px 60px  at 50%  0%,  rgba(20,80,40,0.25)    0%, transparent 55%),
      linear-gradient(160deg,#052e16 0%,#0a1f0e 30%,#1a0a2e 65%,#0e1a05 100%);
  }
  body[data-theme="spring"] #root::after {
    background: url("https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/3095bc0db01eab570b679e338f7367e036abd388/assests/hearty-bg-spring.svg") top center / 390px 340px no-repeat;
  }
  body[data-theme="spring"].dark-mode #root::after {
    background: url("https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/a9dedc52ba38154a32fec813495a90cff93f172a/assests/hearty-bg-spring-dark.svg") top center / 390px 340px no-repeat;
  }

  /* ── NEON ── */
  body[data-theme="neon"] #root,
  body[data-theme="neon"].dark-mode #root {
    background:
      radial-gradient(ellipse 280px 130px at 50% 44%,  rgba(0,255,255,0.10)   0%, transparent 68%),
      radial-gradient(ellipse 190px 140px at 0%   0%,  rgba(255,0,255,0.10)   0%, transparent 62%),
      radial-gradient(ellipse 170px 120px at 100% 0%,  rgba(0,255,255,0.08)   0%, transparent 62%),
      radial-gradient(ellipse 240px 60px  at 50%  0%,  rgba(0,128,255,0.10)   0%, transparent 55%),
      linear-gradient(160deg,#0d0221 0%,#0a0a2e 35%,#1a0a2e 65%,#0d1a2e 100%);
  }
  body[data-theme="neon"] #root::after {
    background: url("https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/3095bc0db01eab570b679e338f7367e036abd388/assests/hearty-bg-neon.svg") top center / 390px 340px no-repeat;
  }
  body[data-theme="neon"].dark-mode #root::after {
    background: url("https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/a9dedc52ba38154a32fec813495a90cff93f172a/assests/hearty-bg-neon-dark.svg") top center / 390px 340px no-repeat;
  }

  /* ── HALLOWEEN ── */
  body[data-theme="halloween"] #root,
  body[data-theme="halloween"].dark-mode #root {
    background:
      radial-gradient(ellipse 280px 130px at 50% 44%,  rgba(251,146,60,0.16)  0%, transparent 68%),
      radial-gradient(ellipse 190px 140px at 0%   0%,  rgba(192,132,252,0.12) 0%, transparent 62%),
      radial-gradient(ellipse 170px 120px at 100% 0%,  rgba(251,146,60,0.10)  0%, transparent 62%),
      radial-gradient(ellipse 240px 60px  at 50%  0%,  rgba(180,60,0,0.18)    0%, transparent 55%),
      linear-gradient(160deg,#1a0800 0%,#0f0a00 35%,#1a0a00 65%,#0a0508 100%);
  }
  body[data-theme="halloween"] #root::after {
    background: url("https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/3095bc0db01eab570b679e338f7367e036abd388/assests/hearty-bg-halloween.svg") top center / 390px 340px no-repeat;
  }
  body[data-theme="halloween"].dark-mode #root::after {
    background: url("https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/a9dedc52ba38154a32fec813495a90cff93f172a/assests/hearty-bg-halloween-dark.svg") top center / 390px 340px no-repeat;
  }

  /* ── OCEAN ── */
  body[data-theme="ocean"]:not(.dark-mode) #root {
    background:
      radial-gradient(ellipse 280px 130px at 50% 44%,  rgba(6,182,212,0.14)   0%, transparent 68%),
      radial-gradient(ellipse 190px 140px at 0%   0%,  rgba(99,102,241,0.12)  0%, transparent 62%),
      radial-gradient(ellipse 170px 120px at 100% 0%,  rgba(6,182,212,0.10)   0%, transparent 62%),
      radial-gradient(ellipse 240px 60px  at 50%  0%,  rgba(167,243,250,0.18) 0%, transparent 55%),
      linear-gradient(160deg,#e0f7fa 0%,#e8f5f0 35%,#e0f0ff 65%,#f0e8ff 100%);
  }
  body[data-theme="ocean"].dark-mode #root {
    background:
      radial-gradient(ellipse 280px 130px at 50% 44%,  rgba(34,211,238,0.22)  0%, transparent 68%),
      radial-gradient(ellipse 190px 140px at 0%   0%,  rgba(129,140,248,0.18) 0%, transparent 62%),
      radial-gradient(ellipse 170px 120px at 100% 0%,  rgba(34,211,238,0.16)  0%, transparent 62%),
      radial-gradient(ellipse 240px 60px  at 50%  0%,  rgba(4,80,100,0.28)    0%, transparent 55%),
      linear-gradient(160deg,#042f40 0%,#061a28 30%,#08102a 65%,#061428 100%);
  }
  body[data-theme="ocean"] #root::after {
    background: url("https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/3095bc0db01eab570b679e338f7367e036abd388/assests/hearty-bg-ocean.svg") top center / 390px 340px no-repeat;
  }
  body[data-theme="ocean"].dark-mode #root::after {
    background: url("https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/a9dedc52ba38154a32fec813495a90cff93f172a/assests/hearty-bg-ocean-dark.svg") top center / 390px 340px no-repeat;
  }

  /* ── SUMMER ── */
  body[data-theme="summer"]:not(.dark-mode) #root {
    background:
      radial-gradient(ellipse 280px 130px at 50% 44%,  rgba(245,158,11,0.16)  0%, transparent 68%),
      radial-gradient(ellipse 190px 140px at 0%   0%,  rgba(251,113,133,0.10) 0%, transparent 62%),
      radial-gradient(ellipse 170px 120px at 100% 0%,  rgba(245,158,11,0.10)  0%, transparent 62%),
      radial-gradient(ellipse 240px 60px  at 50%  0%,  rgba(253,230,138,0.22) 0%, transparent 55%),
      linear-gradient(160deg,#fffbeb 0%,#fff8e0 35%,#fff0d8 65%,#ffefd0 100%);
  }
  body[data-theme="summer"].dark-mode #root {
    background:
      radial-gradient(ellipse 280px 130px at 50% 44%,  rgba(251,191,36,0.22)  0%, transparent 68%),
      radial-gradient(ellipse 190px 140px at 0%   0%,  rgba(251,146,60,0.16)  0%, transparent 62%),
      radial-gradient(ellipse 170px 120px at 100% 0%,  rgba(251,191,36,0.14)  0%, transparent 62%),
      radial-gradient(ellipse 240px 60px  at 50%  0%,  rgba(100,50,0,0.30)    0%, transparent 55%),
      linear-gradient(160deg,#2d1a00 0%,#1f1200 30%,#2a1000 65%,#1a0e00 100%);
  }
  body[data-theme="summer"] #root::after {
    background: url("https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/3095bc0db01eab570b679e338f7367e036abd388/assests/hearty-bg-summer.svg") top center / 390px 340px no-repeat;
  }
  body[data-theme="summer"].dark-mode #root::after {
    background: url("https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/a9dedc52ba38154a32fec813495a90cff93f172a/assests/hearty-bg-summer-dark.svg") top center / 390px 340px no-repeat;
  }

  /* Hamburger is position:fixed — floats above canvas, no padding needed */
  #root { padding-top: 6px; }
  #root::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 420px 320px at 10% 15%, rgba(255,182,213,0.28) 0%, transparent 70%),
      radial-gradient(ellipse 350px 280px at 90% 10%, rgba(180,210,255,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 80% 90%, rgba(210,180,255,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 300px 250px at 5% 85%,  rgba(255,220,180,0.25) 0%, transparent 70%);
    transition: opacity 0.4s;
  }
  body.dark-mode #root::before { opacity: 0.4; }

  .bg-hearts { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .bg-heart { position:absolute; opacity:0.13; animation: floatCloud linear infinite; display:flex; align-items:center; justify-content:center; }
  .bg-heart svg { width:100%; height:100%; }

  #root > * { position: relative; z-index: 1; }

  /* ── TOP TOOLBAR (toggles) ── */
  .top-toolbar {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 2px;
    animation: fadeSlideIn 0.6s ease-out;
  }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--card-border);
    background: var(--card-bg); cursor: pointer; font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; outline: none; backdrop-filter: blur(8px);
  }
  .icon-btn:hover { transform: scale(1.12); filter: brightness(1.1); }
  .icon-btn.muted { opacity: 0.5; }

  /* ── CONTROLS ── */
  .controls {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    margin-bottom: 4px; animation: fadeSlideIn 0.7s ease-out;
  }
  .btn-pill {
    font-family: 'Nunito', sans-serif; font-weight: 800;
    border-radius: 999px; padding: 7px 20px; font-size: 13px;
    cursor: pointer; border: 2px solid transparent;
    transition: all 0.18s; outline: none;
  }
  .btn-pill:hover { transform: translateY(-2px); filter: brightness(1.07); }
  .btn-pill:active { transform: scale(0.96); }
  .btn-pill.active-mode {
    background: linear-gradient(135deg,#f43f5e,#e879a0);
    color: white; box-shadow: 0 3px 14px rgba(244,63,94,0.3);
  }
  .btn-pill.inactive-mode {
    background: var(--btn-inactive-bg); color: var(--btn-inactive-color);
    border-color: var(--btn-inactive-border);
  }
  .btn-pill.active-diff {
    background: rgba(167,139,250,0.18); color: #7c3aed;
    border-color: rgba(124,58,237,0.35);
  }
  .btn-pill.inactive-diff {
    background: var(--btn-diff-inactive-bg); color: var(--btn-diff-inactive-color);
    border-color: rgba(124,58,237,0.12);
  }

  /* ── SERIES MODE PILL ── */
  .btn-pill.active-series {
    background: var(--theme-btn-grad, linear-gradient(135deg,#f59e0b,#fbbf24));
    color: white; box-shadow: 0 3px 14px var(--theme-btn-shadow, rgba(245,158,11,0.3));
  }
  .btn-pill.inactive-series {
    background: var(--btn-diff-inactive-bg); color: var(--btn-diff-inactive-color);
    border-color: rgba(245,158,11,0.2);
  }

  /* ── LAYOUT ── */
  .main-layout {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; width: 100%; max-width: 720px;
    flex: 1; min-height: 0;
  }
  /* ── GAME TITLE — wordmark ── */

  /* Default / pink theme */
  @keyframes titleGlow {
    0%,100% { text-shadow:
      0 0 12px rgba(244,63,94,0.55),
      0 0 28px rgba(244,63,94,0.30),
      0 2px 0 rgba(140,20,50,0.60); }
    50% { text-shadow:
      0 0 18px rgba(244,63,94,0.80),
      0 0 40px rgba(244,63,94,0.45),
      0 2px 0 rgba(140,20,50,0.60); }
  }
  @keyframes titleGlowLight {
    0%,100% { text-shadow:
      0 0 8px rgba(244,63,94,0.30),
      0 1px 0 rgba(180,40,80,0.35); }
    50% { text-shadow:
      0 0 16px rgba(244,63,94,0.50),
      0 1px 0 rgba(180,40,80,0.35); }
  }

  /* Spring — mint green pulse */
  @keyframes titleGlowSpring {
    0%,100% { text-shadow:
      0 0 8px rgba(34,197,94,0.35),
      0 1px 0 rgba(10,120,50,0.30); }
    50% { text-shadow:
      0 0 18px rgba(34,197,94,0.60),
      0 0 32px rgba(34,197,94,0.25),
      0 1px 0 rgba(10,120,50,0.30); }
  }
  @keyframes titleGlowSpringDark {
    0%,100% { text-shadow:
      0 0 12px rgba(74,222,128,0.55),
      0 0 28px rgba(74,222,128,0.25),
      0 2px 0 rgba(5,80,30,0.70); }
    50% { text-shadow:
      0 0 22px rgba(74,222,128,0.85),
      0 0 44px rgba(74,222,128,0.40),
      0 2px 0 rgba(5,80,30,0.70); }
  }

  /* Neon — cyan/magenta flicker */
  @keyframes titleGlowNeon {
    0%,100% { text-shadow:
      0 0 6px rgba(0,255,255,0.70),
      0 0 20px rgba(0,255,255,0.50),
      0 0 40px rgba(0,255,255,0.25),
      0 0 1px rgba(255,0,255,0.90); }
    33% { text-shadow:
      0 0 10px rgba(255,0,255,0.80),
      0 0 28px rgba(255,0,255,0.55),
      0 0 50px rgba(255,0,255,0.25),
      0 0 1px rgba(0,255,255,0.90); }
    66% { text-shadow:
      0 0 8px rgba(0,255,255,0.90),
      0 0 24px rgba(0,255,255,0.60),
      0 0 48px rgba(0,255,255,0.30),
      0 0 1px rgba(255,0,255,0.60); }
  }

  /* Halloween — orange ember pulse */
  @keyframes titleGlowHalloween {
    0%,100% { text-shadow:
      0 0 10px rgba(251,146,60,0.60),
      0 0 24px rgba(251,146,60,0.30),
      0 2px 0 rgba(100,30,0,0.70); }
    50% { text-shadow:
      0 0 18px rgba(251,146,60,0.90),
      0 0 40px rgba(251,146,60,0.50),
      0 0 60px rgba(192,132,252,0.20),
      0 2px 0 rgba(100,30,0,0.70); }
  }

  /* Ocean — aqua shimmer */
  @keyframes titleGlowOcean {
    0%,100% { text-shadow:
      0 0 8px rgba(6,182,212,0.40),
      0 1px 0 rgba(0,80,100,0.30); }
    50% { text-shadow:
      0 0 18px rgba(6,182,212,0.65),
      0 0 34px rgba(6,182,212,0.25),
      0 1px 0 rgba(0,80,100,0.30); }
  }
  @keyframes titleGlowOceanDark {
    0%,100% { text-shadow:
      0 0 12px rgba(34,211,238,0.60),
      0 0 28px rgba(34,211,238,0.28),
      0 2px 0 rgba(0,60,80,0.70); }
    50% { text-shadow:
      0 0 22px rgba(34,211,238,0.90),
      0 0 44px rgba(34,211,238,0.45),
      0 2px 0 rgba(0,60,80,0.70); }
  }

  /* Summer — warm golden glow */
  @keyframes titleGlowSummer {
    0%,100% { text-shadow:
      0 0 8px rgba(245,158,11,0.40),
      0 1px 0 rgba(120,60,0,0.30); }
    50% { text-shadow:
      0 0 18px rgba(245,158,11,0.65),
      0 0 34px rgba(245,158,11,0.25),
      0 1px 0 rgba(120,60,0,0.30); }
  }
  @keyframes titleGlowSummerDark {
    0%,100% { text-shadow:
      0 0 12px rgba(251,191,36,0.60),
      0 0 28px rgba(251,191,36,0.28),
      0 2px 0 rgba(80,40,0,0.70); }
    50% { text-shadow:
      0 0 22px rgba(251,191,36,0.90),
      0 0 44px rgba(251,191,36,0.45),
      0 2px 0 rgba(80,40,0,0.70); }
  }

  .game-title {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 68px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
    z-index: 2;
    gap: 5px; /* increased from 2px — pulls subtitle clear of Hearty descender */
    padding: 0 60px; /* clear the hamburger on the left */
  }
  /* "Hearty" — the hero wordmark */
  .game-title-main {
    font-family: 'Lilita One', 'Nunito', sans-serif;
    font-weight: 400; /* Lilita One is inherently heavy */
    font-size: 32px;
    letter-spacing: 0.03em;
    color: #f43f5e;
    line-height: 1;
    text-align: center;
    animation: titleGlowLight 3.5s ease-in-out infinite;
    text-shadow:
      0 0 8px rgba(244,63,94,0.30),
      0 1px 0 rgba(180,40,80,0.35);
    position: relative;
  }
  body.dark-mode .game-title-main {
    color: #ff6b8a;
    animation: titleGlow 3.5s ease-in-out infinite;
  }

  /* "Noughts & Crosses" — subtitle: increased size + opacity for legibility */
  .game-title-sub {
    font-family: 'DM Mono', monospace;
    font-weight: 700; /* bumped from 500 — heavier at small sizes */
    font-size: 11px; /* bumped from 9px */
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--text-sub);
    opacity: 0.90; /* bumped from 0.75 — much more readable */
    line-height: 1;
    text-align: center;
  }
  /* Decorative ✦ glyphs flanking the sub text */
  .game-title-sub::before,
  .game-title-sub::after {
    content: ' ✦ ';
    font-size: 7px;
    opacity: 0.7; /* bumped from 0.6 */
  }

  /* ── PER-THEME TITLE OVERRIDES ── */

  /* Spring */
  body[data-theme="spring"]:not(.dark-mode) .game-title-main {
    color: #16a34a;
    animation: titleGlowSpring 3.5s ease-in-out infinite;
    text-shadow: 0 0 8px rgba(34,197,94,0.35), 0 1px 0 rgba(10,120,50,0.30);
  }
  body[data-theme="spring"].dark-mode .game-title-main {
    color: #86efac;
    animation: titleGlowSpringDark 3.5s ease-in-out infinite;
  }
  body[data-theme="spring"]:not(.dark-mode) .game-title-sub {
    color: #15803d;
    opacity: 0.85;
  }
  body[data-theme="spring"].dark-mode .game-title-sub {
    color: #4ade80;
    opacity: 0.90;
  }

  /* Neon — always "dark" canvas, same animation for both modes */
  body[data-theme="neon"] .game-title-main {
    color: #00ffff;
    animation: titleGlowNeon 2.5s ease-in-out infinite;
    text-shadow:
      0 0 6px rgba(0,255,255,0.70),
      0 0 20px rgba(0,255,255,0.50),
      0 0 1px rgba(255,0,255,0.90);
    letter-spacing: 0.06em; /* slightly wider — suits the retro digital feel */
  }
  body[data-theme="neon"] .game-title-sub {
    color: #ff00ff;
    opacity: 1;
    letter-spacing: 0.28em; /* extra tracking for neon arcade feel */
    text-shadow: 0 0 6px rgba(255,0,255,0.55);
  }
  body[data-theme="neon"] .game-title-sub::before,
  body[data-theme="neon"] .game-title-sub::after {
    content: ' ◆ '; /* diamond suits neon aesthetic better than ✦ */
    opacity: 0.85;
  }

  /* Halloween */
  body[data-theme="halloween"] .game-title-main {
    color: #fb923c;
    animation: titleGlowHalloween 3s ease-in-out infinite;
    text-shadow: 0 0 10px rgba(251,146,60,0.60), 0 2px 0 rgba(100,30,0,0.70);
  }
  body[data-theme="halloween"].dark-mode .game-title-main {
    color: #fdba74;
  }
  body[data-theme="halloween"] .game-title-sub {
    color: #fed7aa;
    opacity: 0.90;
    text-shadow: 0 0 4px rgba(251,146,60,0.30);
  }
  body[data-theme="halloween"] .game-title-sub::before,
  body[data-theme="halloween"] .game-title-sub::after {
    content: ' 🎃 ';
    font-size: 8px;
    opacity: 0.80;
  }

  /* Ocean */
  body[data-theme="ocean"]:not(.dark-mode) .game-title-main {
    color: #0e7490;
    animation: titleGlowOcean 3.5s ease-in-out infinite;
    text-shadow: 0 0 8px rgba(6,182,212,0.40), 0 1px 0 rgba(0,80,100,0.30);
  }
  body[data-theme="ocean"].dark-mode .game-title-main {
    color: #67e8f9;
    animation: titleGlowOceanDark 3.5s ease-in-out infinite;
  }
  body[data-theme="ocean"]:not(.dark-mode) .game-title-sub {
    color: #0891b2;
    opacity: 0.88;
  }
  body[data-theme="ocean"].dark-mode .game-title-sub {
    color: #22d3ee;
    opacity: 0.90;
  }
  body[data-theme="ocean"] .game-title-sub::before,
  body[data-theme="ocean"] .game-title-sub::after {
    content: ' ≋ '; /* wave tilde suits ocean */
    font-size: 9px;
    opacity: 0.75;
  }

  /* Summer */
  body[data-theme="summer"]:not(.dark-mode) .game-title-main {
    color: #b45309;
    animation: titleGlowSummer 3.5s ease-in-out infinite;
    text-shadow: 0 0 8px rgba(245,158,11,0.40), 0 1px 0 rgba(120,60,0,0.30);
  }
  body[data-theme="summer"].dark-mode .game-title-main {
    color: #fde68a;
    animation: titleGlowSummerDark 3.5s ease-in-out infinite;
  }
  body[data-theme="summer"]:not(.dark-mode) .game-title-sub {
    color: #d97706;
    opacity: 0.88;
  }
  body[data-theme="summer"].dark-mode .game-title-sub {
    color: #fbbf24;
    opacity: 0.90;
  }
  body[data-theme="summer"] .game-title-sub::before,
  body[data-theme="summer"] .game-title-sub::after {
    content: ' ☀ ';
    font-size: 9px;
    opacity: 0.80;
  }

  /* ── HEARTY (perched on P1 score card) ── */
  .hearty-svg-wrap {
    transition: filter 0.4s;
    transform-origin: center bottom;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%); /* fallback when no animation active */
    margin-bottom: -6px;
    z-index: 5;
    pointer-events: none;
    will-change: transform;
    /* Soft drop-shadow that follows the SVG heart shape — not the bounding box */
    filter: drop-shadow(0px 4px 8px rgba(180, 40, 80, 0.30))
            drop-shadow(0px 1px 2px rgba(100, 0, 40, 0.18));
  }
  .hearty-svg-wrap.breathing { animation: heartyBreathe 3s ease-in-out infinite; }
  .hearty-svg-wrap.speaking  { animation: heartySpeaking 0.7s ease-in-out; }
  .hearty-svg-wrap.wiggling  { animation: wiggle 0.5s ease-in-out infinite; }
  /* cup overlay: scaled for larger Hearty */
  .gold-cup-overlay {
    position: absolute; top: -4px; right: -4px; width: 38px; height: 38px;
    animation: cupPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; z-index: 10;
    filter: drop-shadow(0px 2px 5px rgba(160, 100, 0, 0.40))
            drop-shadow(0px 1px 1px rgba(80, 40, 0, 0.25));
  }

  /* ── SPEECH BUBBLE — sits to the right of Hearty, tail points left toward Hearty ── */
  .speech-bubble {
    position: absolute;
    /* vertically centred in the Hearty zone, to the right of Hearty on P1 card */
    bottom: calc(100% - 100px);  /* centres bubble on Hearty's body with 122px panel padding */
    left: 112px; /* starts just right of Hearty (which sits on P1 card ~left:50%) */
    background: var(--bubble-bg);
    border: 2.5px solid var(--bubble-border); border-radius: 20px;
    padding: 9px 13px;
    width: 222px; /* fixed canvas px — scaler handles device width */
    min-height: 62px;
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 2px 6px  rgba(180, 40, 90, 0.18),
      0 6px 24px rgba(244, 63, 94, 0.13);
    transition: opacity 0.3s, background 0.3s, border-color 0.3s;
    z-index: 10;
  }
  .speech-bubble.visible { opacity:1; animation: bubbleIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  .speech-bubble.hidden  { opacity:0; pointer-events:none; }
  .speech-bubble p { font-size: 14px; font-weight: 700; color: var(--bubble-text); line-height: 1.4; text-align: center; }
  /* tail points left toward Hearty */
  .bubble-tail {
    position: absolute;
    left: -10px;
    top: 50%;
    bottom: auto;
    transform: translateY(-50%);
    width:0; height:0;
    border-top: 10px solid transparent; border-bottom: 10px solid transparent;
    border-right: 12px solid var(--bubble-bg);
    transition: border-right-color 0.3s;
  }
  .bubble-tail-border {
    position: absolute;
    left: -14px;
    top: 50%;
    bottom: auto;
    transform: translateY(-50%);
    width:0; height:0;
    border-top: 13px solid transparent; border-bottom: 13px solid transparent;
    border-right: 15px solid var(--bubble-border); z-index: -1;
    transition: border-right-color 0.3s;
  }

  /* ── BOARD COL ── */
  .board-col { flex:1; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; max-width: 360px; min-height: 0; }


  /* Score panel — top padding for Hearty sitting on P1 card + bubble above */
  .score-panel {
    display: flex; gap: 10px; justify-content: center; flex-wrap: nowrap;
    position: relative; width: 100%;
    padding-top: 122px; /* room for Hearty (100px) + bubble height (~16px) + tight spacing */
  }
  /* Moved to #root::after so it starts at absolute pixel-0 of the screen
     canvas, runs behind the toolbar, controls, burger zone, and Hearty,
     and fades out at ~half the score-card height.
     z-index: 0 keeps it below all #root > * children (z-index: 1).
     The burger button is position:fixed z-index:400 so it is always above.
     Height = 64px mobile padding + 44px toolbar + 6px gap + 46px controls
              + 10px gap + 148px score-panel padding + 36px half-card = 354px.
     Expressed as a percentage of the 780px root canvas: 354/780 = 45.4%.
     Both the colour wash and symbol SVG use this same height so the bottom
     edge is always consistent regardless of device scaling.               */

  /* XO backdrop baked into #root background — see #root rule below */

  /* P1 card has relative positioning so Hearty can be absolutely placed on it */
  .score-card {
    display: flex; flex-direction: column; align-items: center;
    background: var(--card-bg); backdrop-filter: blur(8px);
    border: 2px solid var(--card-border); border-radius: 16px;
    padding: 8px 10px; flex: 1; min-width: 0;
    transition: background 0.3s, border-color 0.3s;
    position: relative; /* needed for .hearty-svg-wrap absolute positioning */
    z-index: 1; /* sit above the z-index:0 XO backdrop pseudo-elements */
  }
  .score-num { font-size: 26px; font-weight: 900; }
  .score-num.x    { color: var(--theme-x-color, #f43f5e); }
  .score-num.draw { color: #94a3b8; }
  .score-num.o    { color: var(--theme-o-color, #7c3aed); }
  .score-label { font-size: 12px; color: var(--score-label); margin-top: 2px; font-weight: 700; }

  /* ── SERIES PROGRESS ── */
  .series-bar {
    display: flex; align-items: center; gap: 10px; justify-content: center;
    background: var(--series-bg); border: 2px solid var(--card-border);
    border-radius: 14px; padding: 6px 16px;
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
    color: var(--text-sub); backdrop-filter: blur(8px);
    transition: all 0.3s;
  }
  .series-pips { display: flex; gap: 5px; align-items: center; }
  .pip {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid currentColor; transition: all 0.25s;
  }
  .pip.won-x   { background: var(--theme-x-color, #f43f5e); border-color: var(--theme-x-color, #f43f5e); }
  .pip.won-o   { background: var(--theme-o-color, #7c3aed); border-color: var(--theme-o-color, #7c3aed); }
  .pip.empty   { background: transparent; opacity: 0.4; }

  /* ── STATUS ── */
  .status-bar {
    text-align: center; padding: 8px 20px; border-radius: 14px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: var(--status-bg); border: 2px solid var(--card-border);
    transition: background 0.3s, border-color 0.3s;
  }
  .status-bar.result { border-color: rgba(244,63,94,0.45); background: rgba(255,240,248,0.9); animation: pulseGlow 2s ease-in-out infinite; }
  body.dark-mode .status-bar.result { background: rgba(60,10,30,0.9); }
  .status-text { font-family: 'DM Mono', monospace; font-weight: 700; font-size: 14px; color: #7a4060; }
  body.dark-mode .status-text { color: #e090b0; }
  .status-text.win-x { color: #f43f5e; }
  .status-text.win-o { color: #7c3aed; }

  /* ── BOARD ── */
  .board-wrap {
    border-radius: 28px; padding: 14px;
    background: var(--board-bg); border: 2px solid var(--card-border);
    backdrop-filter: blur(16px); box-shadow: 0 8px 40px rgba(244,63,94,0.1);
    width: 310px; transition: background 0.3s, border-color 0.3s;
    position: relative;
  }

  .board-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .cell {
    display: block; position: relative; width: 100%; padding-bottom: 100%;
    border-radius: 18px; border: 2px solid var(--card-border);
    background: var(--cell-bg); cursor: pointer; transition: all 0.15s; outline: none;
  }
  .cell-inner {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center; border-radius: 16px;
  }
  .cell:hover:not(.disabled):not(.filled) { background: var(--cell-hover); border-color: rgba(244,63,94,0.4); }
  .cell:not(.filled):not(.disabled):hover .cell-inner::before {
    content: 'X'; font-size: 42px; font-weight: 900;
    color: rgba(244, 63, 94, 0.22); pointer-events: none;
  }
  .board-grid.o-turn .cell:not(.filled):not(.disabled):hover .cell-inner::before {
    content: 'O'; color: rgba(124, 58, 237, 0.22);
  }
  .cell.disabled { cursor: default; }
  .cell:focus { outline: none; box-shadow: none; }
  .cell:focus-visible { outline: none; box-shadow: none; }
  .cell.win-cell { background: var(--win-cell-bg); border-color: color-mix(in srgb, var(--theme-accent) 55%, transparent); box-shadow: 0 0 22px 5px var(--theme-btn-shadow); }
  .cell svg { width: 42px; height: 42px; z-index: 2; }

  /* ── BUTTONS ROW ── */
  .btn-row {
    display: flex; gap: 8px; align-items: stretch;
    justify-content: center;
    width: 310px; /* match board width — scaler handles device fit */
  }

  .new-game-btn {
    background: var(--theme-btn-grad, linear-gradient(135deg,#f43f5e,#e879a0));
    color: white; font-weight: 900; font-size: 13px;
    padding: 0 8px; min-height: 44px; border-radius: 999px; border: none; cursor: pointer;
    box-shadow: 0 4px 20px var(--theme-btn-shadow, rgba(244,63,94,0.3)); font-family: 'Nunito', sans-serif;
    transition: all 0.18s; flex: 1; white-space: nowrap;
  }
  .new-game-btn:hover { transform: translateY(-2px); filter: brightness(1.07); }
  .rematch-btn {
    background: var(--theme-btn-grad, linear-gradient(135deg,#7c3aed,#a855f7));
    color: white; font-weight: 900; font-size: 12px;
    padding: 0 8px; min-height: 44px; border-radius: 999px; border: none; cursor: pointer;
    box-shadow: 0 4px 16px var(--theme-btn-shadow, rgba(124,58,237,0.3)); font-family: 'Nunito', sans-serif;
    transition: all 0.18s; animation: fadeSlideIn 0.4s ease-out;
    flex: 1; white-space: nowrap;
  }
  .rematch-btn:hover { transform: translateY(-2px); filter: brightness(1.07); }
  .undo-btn {
    background: var(--card-bg); color: var(--text-sub);
    font-weight: 900; font-size: 12px;
    padding: 0 8px; min-height: 44px; border-radius: 999px;
    border: 2px solid var(--card-border); cursor: pointer;
    font-family: 'Nunito', sans-serif; transition: all 0.18s;
    backdrop-filter: blur(8px); flex: 1; white-space: nowrap;
  }
  .undo-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.07); }
  .undo-btn:disabled { opacity: 0.35; cursor: default; }

  /* ── FOOTER ── */
  .footer { margin-top: 18px; font-size: 11px; color: var(--footer); text-align: center; font-weight: 600; }

  /* compact overrides removed — viewport scaler handles all screen sizes */

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.hidden { display: none; }
  .modal-box {
    background: var(--modal-bg); border: 2.5px solid var(--modal-border);
    border-radius: 28px; padding: 28px 32px; max-width: 360px; width: 92%;
    box-shadow: 0 16px 60px rgba(244,63,94,0.2);
    animation: modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    transition: background 0.3s, border-color 0.3s;
  }
  .modal-box h2 {
    font-size: 20px; font-weight: 900; color: var(--text-main);
    text-align: center; margin-bottom: 18px;
  }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    display: block; font-size: 12px; font-weight: 800; color: var(--text-sub);
    margin-bottom: 5px; letter-spacing: 0.04em;
  }
  .modal-field input {
    width: 100%; padding: 9px 14px; border-radius: 12px;
    border: 2px solid var(--input-border); background: var(--input-bg);
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
    color: var(--text-main); outline: none; transition: border-color 0.18s, background 0.3s;
  }
  .modal-field input:focus { border-color: #f43f5e; }
  .modal-field input::placeholder { color: #c0a0b0; opacity: 0.7; }
  .modal-btn {
    width: 100%; padding: 12px; border-radius: 999px; border: none; cursor: pointer;
    background: var(--theme-btn-grad, linear-gradient(135deg,#f43f5e,#e879a0));
    color: white; font-weight: 900; font-size: 15px;
    font-family: 'Nunito', sans-serif; margin-top: 6px;
    box-shadow: 0 4px 16px var(--theme-btn-shadow, rgba(244,63,94,0.3)); transition: all 0.18s;
  }
  .modal-btn:hover { filter: brightness(1.07); transform: translateY(-1px); }

  /* ── MATCH WINNER BANNER ── */
  .match-banner {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
  }
  .match-banner.hidden { display: none; }
  .match-banner-box {
    background: var(--modal-bg); border: 3px solid #f43f5e;
    border-radius: 32px; padding: 36px 40px; text-align: center;
    max-width: 380px; width: 92%;
    box-shadow: 0 20px 80px rgba(244,63,94,0.35);
    animation: matchBannerIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .match-banner-box .crown { width: 56px; height: 56px; margin: 0 auto 8px; display:flex; align-items:center; justify-content:center; }
  .match-banner-box h2 {
    font-size: 24px; font-weight: 900; color: var(--text-main);
    margin-bottom: 6px;
  }
  .match-banner-box p { font-size: 14px; color: var(--text-sub); font-weight: 700; margin-bottom: 22px; }
  .match-banner-score {
    display: flex; gap: 12px; justify-content: center; margin-bottom: 22px;
  }
  .match-score-chip {
    display: flex; flex-direction: column; align-items: center;
    background: var(--card-bg); border: 2px solid var(--card-border);
    border-radius: 16px; padding: 10px 20px; min-width: 80px;
  }
  .match-score-chip .num { font-size: 28px; font-weight: 900; }
  .match-score-chip .lbl { font-size: 11px; font-weight: 800; color: var(--score-label); margin-top: 2px; }
  .match-banner-btn {
    padding: 12px 32px; border-radius: 999px; border: none; cursor: pointer;
    background: var(--theme-btn-grad, linear-gradient(135deg,#f43f5e,#e879a0));
    color: white; font-weight: 900; font-size: 15px;
    font-family: 'Nunito', sans-serif;
    box-shadow: 0 4px 20px var(--theme-btn-shadow, rgba(244,63,94,0.3)); margin: 0 6px;
    transition: all 0.18s;
  }
  .match-banner-btn:hover { filter: brightness(1.07); transform: translateY(-1px); }

  /* ── AI WATCH BADGE ── */
  .watch-badge {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white; font-size: 11px; font-weight: 800;
    padding: 3px 10px; border-radius: 999px;
    letter-spacing: 0.05em; display: inline-block;
  }

  /* ── SIDE MENU ── */
  @keyframes menuSlideIn {
    from { transform: translateX(-100%); opacity: 0.6; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  @keyframes menuSlideOut {
    from { transform: translateX(0);    opacity: 1; }
    to   { transform: translateX(-100%); opacity: 0.6; }
  }

  /* Top toolbar and inline controls hidden — side menu handles all controls */
  .top-toolbar { display: none !important; }
  .controls    { display: none !important; }

  /* Hamburger button — fixed top-left, proper 44×44 tap target */
  .menu-tab {
    position: fixed; top: 12px; left: 12px;
    z-index: 400;
    width: 44px; height: 44px;
    background: var(--theme-burger-grad, linear-gradient(135deg,#f43f5e,#e879a0));
    border-radius: 14px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    cursor: pointer;
    box-shadow: 0 4px 18px var(--theme-burger-shadow, rgba(244,63,94,0.4));
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .menu-tab:active { transform: scale(0.92); box-shadow: 0 2px 10px rgba(244,63,94,0.3); }
  .menu-tab-line {
    width: 18px; height: 2px;
    background: rgba(255,255,255,0.95);
    border-radius: 2px;
    transition: transform 0.2s;
  }

  /* Tutorial button — fixed top-right, mirrors hamburger */
  .tutorial-tab {
    position: fixed; top: 12px; right: 12px;
    z-index: 400;
    width: 44px; height: 44px;
    background: var(--theme-burger-grad, linear-gradient(135deg,#f43f5e,#e879a0));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none; outline: none;
    color: white; font-size: 22px; font-weight: 900;
    font-family: 'Nunito', sans-serif;
    box-shadow: 0 4px 18px var(--theme-burger-shadow, rgba(244,63,94,0.4));
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    line-height: 1;
  }
  .tutorial-tab:active { transform: scale(0.92); box-shadow: 0 2px 10px var(--theme-burger-shadow, rgba(244,63,94,0.3)); }
  .tutorial-tab.active { filter: brightness(0.78) saturate(1.1); }

  /* Overlay backdrop */
  .menu-overlay {
    position: fixed; inset: 0; z-index: 450;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(3px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .menu-overlay.open { opacity: 1; pointer-events: all; }

  /* Menu panel */
  .side-menu {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 280px; z-index: 500;
    background: var(--modal-bg);
    border-right: 2px solid var(--modal-border);
    box-shadow: 6px 0 40px rgba(244,63,94,0.2);
    display: flex; flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .side-menu.open {
    transform: translateX(0);
  }

  /* Menu header */
  .menu-header {
    padding: 28px 22px 18px;
    border-bottom: 2px solid var(--card-border);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .menu-header-title {
    font-size: 18px; font-weight: 900;
    color: var(--text-main); letter-spacing: -0.01em;
  }
  .menu-header-sub {
    font-size: 11px; font-weight: 700; color: var(--text-sub);
    margin-top: 1px;
  }
  .menu-close-btn {
    margin-left: auto; width: 32px; height: 32px;
    border-radius: 50%; border: 2px solid var(--card-border);
    background: var(--card-bg); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  }
  .menu-close-btn:active { transform: scale(0.9); }
  body.dark-mode .menu-close-btn { color: #ffffff; }
  body[data-theme="halloween"] .menu-close-btn { color: #ffffff; }
  body[data-theme="neon"] .menu-close-btn { color: #ffffff; }

  /* Menu sections */
  .menu-section {
    padding: 14px 18px 6px;
    flex-shrink: 0;
  }
  .menu-section-label {
    font-size: 9px; font-weight: 900; letter-spacing: 0.12em;
    color: var(--score-label); text-transform: uppercase;
    margin-bottom: 10px; padding: 0 4px;
  }
  .menu-section-divider {
    height: 1px; background: var(--card-border);
    margin: 6px 18px 0; opacity: 0.6; flex-shrink: 0;
  }

  /* Toggle rows */
  .menu-toggle-row {
    display: flex; align-items: center;
    padding: 11px 4px; gap: 12px;
    border-radius: 12px; cursor: pointer;
    transition: background 0.15s;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .menu-toggle-row:active { background: var(--cell-hover); }
  .menu-toggle-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--cell-bg); border: 2px solid var(--card-border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
    color: var(--text-sub);
  }
  .menu-toggle-icon.active {
    background: var(--theme-btn-grad, linear-gradient(135deg,#f43f5e,#e879a0));
    border-color: var(--theme-accent, #f43f5e); color: white;
    box-shadow: 0 3px 12px var(--theme-btn-shadow, rgba(244,63,94,0.35));
  }
  .menu-toggle-icon.active-purple {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border-color: #7c3aed; color: white;
    box-shadow: 0 3px 12px rgba(124,58,237,0.3);
  }
  .menu-toggle-text { flex: 1; }
  .menu-toggle-label {
    font-size: 13px; font-weight: 800;
    color: var(--text-main); line-height: 1;
  }
  .menu-toggle-desc {
    font-size: 10px; font-weight: 600;
    color: var(--text-sub); margin-top: 2px;
  }

  /* Pill group inside menu */
  .menu-pill-group {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 2px 4px 10px;
  }
  .menu-pill {
    font-family: 'Nunito', sans-serif; font-weight: 800;
    border-radius: 999px; padding: 7px 16px; font-size: 12px;
    cursor: pointer; border: 2px solid transparent;
    transition: all 0.15s; outline: none;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  }
  .menu-pill:active { transform: scale(0.95); }
  .menu-pill.active-mode {
    background: linear-gradient(135deg,#f43f5e,#e879a0);
    color: white; box-shadow: 0 3px 12px rgba(244,63,94,0.3);
    border-color: transparent;
  }
  .menu-pill.inactive-mode {
    background: var(--btn-inactive-bg); color: var(--btn-inactive-color);
    border-color: var(--btn-inactive-border);
  }
  .menu-pill.active-diff {
    background: rgba(167,139,250,0.18); color: #7c3aed;
    border-color: rgba(124,58,237,0.4);
  }
  .menu-pill.inactive-diff {
    background: var(--btn-diff-inactive-bg); color: var(--btn-diff-inactive-color);
    border-color: rgba(124,58,237,0.12);
  }
  .menu-pill.active-series {
    background: var(--theme-btn-grad, linear-gradient(135deg,#f59e0b,#fbbf24));
    color: white; box-shadow: 0 3px 12px var(--theme-btn-shadow, rgba(245,158,11,0.3));
    border-color: transparent;
  }
  .menu-pill.inactive-series {
    background: var(--btn-diff-inactive-bg); color: var(--btn-diff-inactive-color);
    border-color: rgba(245,158,11,0.2);
  }

  /* Watch pill special */
  .menu-pill.active-watch {
    background: linear-gradient(135deg,#7c3aed,#a855f7);
    color: white; box-shadow: 0 3px 12px rgba(124,58,237,0.3);
    border-color: transparent;
  }
  .menu-pill.inactive-watch {
    background: var(--btn-diff-inactive-bg); color: var(--btn-diff-inactive-color);
    border-color: rgba(124,58,237,0.15);
  }

  /* Edit name button */
  .menu-edit-name-btn {
    width: 100%; padding: 10px 16px;
    border-radius: 12px; border: 2px solid var(--card-border);
    background: var(--card-bg); cursor: pointer;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 13px; color: var(--text-main);
    display: flex; align-items: center; gap: 10px;
    transition: all 0.15s; text-align: left;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    margin-bottom: 4px;
  }
  .menu-edit-name-btn:active { background: var(--cell-hover); transform: scale(0.98); }

  /* Menu footer */
  .menu-footer {
    margin-top: auto; padding: 16px 22px;
    border-top: 2px solid var(--card-border);
    font-size: 10px; font-weight: 700;
    color: var(--footer); text-align: center;
    flex-shrink: 0;
  }

  /* ── SIDE MENU COMPACT (short portrait screens) ── */
  @media (max-height: 700px) {
    .menu-header { padding: 14px 18px 12px; }
    .menu-section { padding: 8px 18px 4px; }
    .menu-section-label { margin-bottom: 6px; }
    .menu-toggle-row { padding: 7px 4px; }
    .menu-toggle-icon { width: 30px; height: 30px; border-radius: 8px; }
    .menu-toggle-icon svg { width: 15px; height: 15px; }
    .menu-toggle-label { font-size: 12px; }
    .menu-toggle-desc { font-size: 9px; margin-top: 1px; }
    .menu-pill { padding: 5px 12px; font-size: 11px; }
    .menu-pill-group { gap: 5px; padding-bottom: 6px; }
    .menu-edit-name-btn { padding: 8px 14px; font-size: 12px; }
    .menu-footer { padding: 10px 18px; }
    .menu-section-divider { margin: 4px 18px 0; }
    .menu-header-title { font-size: 16px; }
  }
  @media (max-height: 600px) {
    .menu-header { padding: 10px 16px 8px; }
    .menu-section { padding: 6px 16px 2px; }
    .menu-section-label { margin-bottom: 4px; font-size: 8px; }
    .menu-toggle-row { padding: 5px 4px; }
    .menu-toggle-icon { width: 28px; height: 28px; }
    .menu-pill { padding: 4px 10px; font-size: 11px; }
    .menu-pill-group { gap: 4px; padding-bottom: 4px; }
    .menu-footer { padding: 8px 16px; }
  }

  /* Burger menu and side menu always used — no desktop toolbar mode */


  /* ════════════════════════════════════════════════════
     ULTIMATE NOUGHTS & CROSSES
     Meta-board: 3×3 grid of mini 3×3 boards.
     ════════════════════════════════════════════════════ */

  .ultimate-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 0; width: 100%;
  }
  .ultimate-meta-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    width: 352px;
    padding: 10px;
    background: var(--board-bg);
    border: 2px solid var(--card-border);
    border-radius: 24px;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 40px rgba(244,63,94,0.1);
    position: relative;
  }

  /* Each of the 9 mini-boards */
  .u-mini-board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    padding: 4px;
    border-radius: 12px;
    border: 2.5px solid var(--card-border);
    background: var(--cell-bg);
    transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    position: relative;
    cursor: default;
  }
  /* Active board — player must play here */
  .u-mini-board.u-active {
    border-color: var(--theme-accent) !important;
    background: var(--cell-hover) !important;
    box-shadow: 0 0 12px 3px var(--theme-btn-shadow);
  }
  /* Won boards — show large X or O overlay */
  .u-mini-board.u-won-x { border-color: var(--theme-x-color) !important; background: var(--win-cell-bg) !important; }
  .u-mini-board.u-won-o { border-color: var(--theme-o-color) !important; background: var(--win-cell-bg) !important; }
  .u-mini-board.u-drawn { border-color: var(--card-border); background: rgba(148,163,184,0.12) !important; }
  /* Inactive (not your turn's target, game still open) */
  .u-mini-board.u-inactive { opacity: 0.55; }

  /* Big win symbol overlay on completed mini-boards */
  .u-board-result {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    pointer-events: none;

    background: var(--cell-bg);
    cursor: pointer;

    outline: none;
    min-width: 0; min-height: 0;

  .u-cell:hover:not(.disabled):not(.filled) {

    border-color: var(--theme-accent);
  }
  .u-cell.disabled { cursor: default; }
  .u-cell.filled   { cursor: default; }
  .u-cell.u-win-cell { background: var(--win-cell-bg); border-color: var(--theme-accent); }

  /* Meta-result status strip */

    display: none;

  .blitz-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .blitz-ring-bg { stroke: var(--card-border); }

    stroke: var(--theme-accent);

  .blitz-ring.urgent-pulse { animation: blitzUrgentPulse 0.5s ease-in-out infinite; }
  /* Blitz Start Game button — shown when blitz is armed, waiting for player */
  .blitz-start-row {

    margin: 4px 0 2px;

  .blitz-start-row.active { display: flex; }
  .blitz-start-btn {

  }
  .blitz-start-btn:active { transform: scale(0.96); filter: brightness(0.93); }


  /* ── Win-line sweep overlay ── */
  @keyframes winLineSweep {
    from { stroke-dashoffset: var(--win-line-len, 300); }

  }
  .win-line-overlay {
    position: absolute; inset: 0; pointer-events: none; z-index: 10;

  .win-line-overlay svg { width: 100%; height: 100%; }
  .win-line-path {
    fill: none;
    stroke: var(--theme-accent);
    stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: var(--win-line-len, 300);
    stroke-dashoffset: var(--win-line-len, 300);

  /* ── WIN LINE OVERLAY ── */

<script>
// ── VIEWPORT SCALER ──
// Scales #root (390×780 design canvas) and the side-menu to fill
// the viewport perfectly on any portrait screen, no scrolling ever.
(function() {
  var DESIGN_W = 390;
  var DESIGN_H = 780;

  function applyScale() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    // Use the smaller ratio so the content always fits fully
    var scale = Math.min(vw / DESIGN_W, vh / DESIGN_H);

    var root = document.getElementById('root');
    if (root) {
      root.style.width  = DESIGN_W + 'px';
      root.style.height = DESIGN_H + 'px';
      root.style.transform = 'scale(' + scale + ')';
      root.style.transformOrigin = 'top left';
      // Centre the scaled root in the viewport
      root.style.left = Math.round((vw - DESIGN_W * scale) / 2) + 'px';
      root.style.top  = '0px';
    }

    // Side menu, menu-tab, menu-overlay are position:fixed so they sit outside
    // #root. Scale them as a group using the same factor.
    // Menu elements (tab, overlay, side panel) are position:fixed in the real viewport
    // — they do not need scaling. The side menu has overflow-y:auto for long content.

    // Portrait-lock message covers real viewport — no scaling needed
  }

  // Run now (before DOMContentLoaded so layout doesn't flash)
  document.addEventListener('DOMContentLoaded', applyScale);
  window.addEventListener('resize', applyScale);
  // Also run immediately in case DOM is already ready
  if (document.readyState !== 'loading') { applyScale(); }
})();
</script>
