// ══════════════════════════════════════════════════════════════════════════
// THEME AMBIENT PARTICLES — per-theme canvas animations
// Canvas is appended to #root so it scales with the 390×780 design canvas.
// All loops check _appVisible and return early when the page is hidden.
// The global notifyAmbientMove(cellIdx) hook is called by handleClick /
// uHandleClick / mHandleClick to trigger move-reactive effects.
// ══════════════════════════════════════════════════════════════════════════
(function() {
  // ── Canvas setup ──────────────────────────────────────────────────────
  var pc = document.createElement('canvas');
  pc.id = 'particleCanvas';
  pc.style.cssText = 'position:absolute;inset:0;width:390px;height:780px;pointer-events:none;z-index:0;';
  pc.width  = 390;
  pc.height = 780;
  var cx = pc.getContext('2d');
  // Canvas must be appended AFTER initLayout() rewrites #root.innerHTML.
  // We expose a helper called right after initLayout() at boot.
  window._attachParticleCanvas = function() {
    var root = document.getElementById('root');
    if (root && !document.getElementById('particleCanvas')) root.appendChild(pc);
    ensureLoop(); // start the rAF loop now that canvas is in the DOM
  };

  // ── Shared state ──────────────────────────────────────────────────────
  var particles  = [];
  var rafHandle  = null;
  var frameCount = 0;
  var lastMove   = null; // {idx, time} — set by notifyAmbientMove

  // ── Cell centre helper (classic 3×3 grid sits at y≈430 in 390×780) ──
  // Board-wrap is ~282px wide, centred in 390px = left offset ≈54px, top ≈438px
  function cellCenter(idx) {
    var col = idx % 3, row = Math.floor(idx / 3);
    var bLeft = 54, bTop = 438, cellSize = 94;
    return { x: bLeft + col * cellSize + cellSize * 0.5,
             y: bTop  + row * cellSize + cellSize * 0.5 };
  }

  // ── rAF loop ──────────────────────────────────────────────────────────
  function loop() {
    if (!_appVisible) { rafHandle = null; return; }
    rafHandle = requestAnimationFrame(loop);
    frameCount++;
    cx.clearRect(0, 0, 390, 780);
    var theme = (typeof _currentTheme !== 'undefined') ? _currentTheme : 'default';
    switch (theme) {
      case 'default':    tickDefault();    break;
      case 'spring':     tickSpring();     break;
      case 'neon':       tickNeon();       break;
      case 'halloween':  tickHalloween();  break;
      case 'ocean':      tickOcean();      break;
      case 'summer':     tickSummer();     break;
      default:           tickDefault();    break;
    }
  }

  function ensureLoop() {
    if (!rafHandle && _appVisible) rafHandle = requestAnimationFrame(loop);
  }

  // Resume loop when page becomes visible again (hook into existing handler)
  var _origVisChange = document.onvisibilitychange;
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) ensureLoop();
  });

  // ────────────────────────────────────────────────────────────────────
  // DEFAULT — Hearts rising from the bottom: mixed darker/lighter pink & purple
  // ────────────────────────────────────────────────────────────────────
  // Darker pinks, lighter pinks, darker purples, lighter purples
  var HEART_COLORS = [
    '#c0154a','#e8185d','#f43f5e','#fb7185','#fda4af','#f9a8d4', // dark→light pink
    '#5b21b6','#7c3aed','#9333ea','#a855f7','#c084fc','#e9d5ff'  // dark→light purple
  ];

  function spawnHeart() {
    particles.push({
      type: 'heart',
      x: 20 + Math.random() * 350,
      y: 745 + Math.random() * 25,   // within #root's 780px — no clip artifact
      vy: -(0.55 + Math.random() * 0.7),
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.025 + Math.random() * 0.03,
      wobbleAmp: 5 + Math.random() * 8,
      size: 5 + Math.random() * 6,
      color: HEART_COLORS[Math.floor(Math.random() * HEART_COLORS.length)],
      alpha: 0,                        // start invisible — fade in to avoid pop-in at edge
      alphaTarget: 0.55 + Math.random() * 0.30,
      alphaDecay: 0.0008 + Math.random() * 0.0005
    });
  }

  function drawHeart(p) {
    cx.save();
    cx.globalAlpha = p.alpha;
    cx.translate(p.x, p.y);
    var s = p.size / 10;
    cx.scale(s, s);
    cx.fillStyle = p.color;
    cx.beginPath();
    cx.moveTo(0, 3);
    cx.bezierCurveTo(-5, -4,  -12, -2,  -10, 4);
    cx.bezierCurveTo(-8, 9,    0,  13,   0, 13);
    cx.bezierCurveTo(0, 13,   8,  9,    10, 4);
    cx.bezierCurveTo(12, -2,  5, -4,    0, 3);
    cx.fill();
    cx.restore();
  }

  function tickDefault() {
    // Keep 8-12 hearts rising at all times; spawn every ~40 frames
    var heartCount = particles.filter(function(p){return p.type==='heart';}).length;
    if (heartCount < 10 && (frameCount % 40 === 0)) spawnHeart();
    // Also occasionally spawn a burst of 2-3
    if (heartCount < 8 && (frameCount % 15 === 0)) spawnHeart();

    particles = particles.filter(function(p) {
      if (p.type !== 'heart') return false;
      p.wobble += p.wobbleSpeed;
      p.x += Math.sin(p.wobble) * p.wobbleAmp * 0.05;
      p.y += p.vy;
      // Fade in from spawn point, then decay normally once at target
      if (p.alpha < p.alphaTarget) {
        p.alpha = Math.min(p.alphaTarget, p.alpha + 0.04);
      } else {
        p.alpha -= p.alphaDecay;
      }
      drawHeart(p);
      return p.alpha > 0 && p.y > -20;
    });
  }

  // ────────────────────────────────────────────────────────────────────
  // SPRING — Falling petal shower (ellipses, white/pale-pink/lilac)
  // Burst on move via lastMove.
  // ────────────────────────────────────────────────────────────────────
  var PETAL_COLORS = ['rgba(255,255,255,0.7)','rgba(255,210,230,0.7)','rgba(220,180,250,0.7)',
                      'rgba(253,242,248,0.7)','rgba(230,255,230,0.7)'];
  var lastPetalSpawn = 0;

  function spawnPetal(x, y, burst) {
    var count = burst ? 6 : 1;
    for (var i = 0; i < count; i++) {
      particles.push({
        type: 'petal',
        x: x !== undefined ? x + (Math.random()-0.5)*40 : Math.random() * 430 - 20,
        y: y !== undefined ? y - 10 : -8,
        vx: (Math.random() - 0.5) * (burst ? 2.5 : 0.8),
        vy: 1.2 + Math.random() * 1.2,
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.08,
        w: 4 + Math.random() * 4,
        h: 2.5 + Math.random() * 2,
        color: PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)],
        alpha: 0.65 + Math.random() * 0.25
      });
    }
  }

  function tickSpring() {
    var now = Date.now();
    // Regular drizzle: 1 petal per ~600ms
    if (now - lastPetalSpawn > 600) { spawnPetal(); lastPetalSpawn = now; }
    // Move burst
    if (lastMove && now - lastMove.time < 80) {
      var cc = cellCenter(lastMove.idx);
      spawnPetal(cc.x, cc.y, true);
      lastMove = null;
    }

    particles = particles.filter(function(p) {
      if (p.type !== 'petal') return false;
      p.x += p.vx; p.y += p.vy; p.rot += p.rotSpeed;
      cx.save();
      cx.globalAlpha = p.alpha;
      cx.translate(p.x, p.y);
      cx.rotate(p.rot);
      cx.fillStyle = p.color;
      cx.beginPath();
      cx.ellipse(0, 0, p.w, p.h, 0, 0, Math.PI * 2);
      cx.fill();
      cx.restore();
      return p.y < 800;
    });
  }

  // ────────────────────────────────────────────────────────────────────
  // NEON — CRT 80s monitor effect on the game board
  // Scanlines, phosphor glow, screen curvature vignette, RGB fringing,
  // occasional static/flicker, glitch jitter.
  // ────────────────────────────────────────────────────────────────────
  var neonCSSInjected = false;
  var neonGlitchNext  = Date.now() + 8000;

  function injectNeonCSS() {
    if (neonCSSInjected) return;
    neonCSSInjected = true;
    var s = document.createElement('style');
    s.id = 'neon-ambient-css';
    s.textContent = [
      // Scanline sweep animation
      '@keyframes crtScan{0%{background-position:0 0}100%{background-position:0 100px}}',
      // Glitch jitter
      '@keyframes neonGlitch{0%,100%{transform:translateX(0) skewX(0deg)}',
      '15%{transform:translateX(3px) skewX(0.4deg)}',
      '30%{transform:translateX(-3px) skewX(-0.4deg)}',
      '50%{transform:translateX(2px) skewX(0.2deg)}',
      '70%{transform:translateX(-2px) skewX(-0.2deg)}',
      '85%{transform:translateX(1px)}}',
      // Phosphor flicker
      '@keyframes crtFlicker{0%,100%{opacity:1}50%{opacity:0.97}75%{opacity:0.99}}',
      // CRT board wrapper: phosphor green-cyan glow + scanlines overlay
      // Targets both classic board-wrap AND ultimate-meta-grid
      'body[data-theme="neon"] .board-wrap,body[data-theme="neon"] .ultimate-meta-grid{',
      '  animation:crtFlicker 0.1s steps(2) infinite;',
      '  box-shadow:0 0 0 2px #00ffff,0 0 18px 4px #00ffff88,0 0 40px 8px #ff00ff44,inset 0 0 30px rgba(0,0,0,0.6)!important;',
      '  border-color:#00ffff!important;',
      '  border-radius:8px!important;',
      '  overflow:hidden;',
      '}',
      // Scanlines pseudo-element on both boards
      'body[data-theme="neon"] .board-wrap::before,body[data-theme="neon"] .ultimate-meta-grid::before{',
      '  content:"";position:absolute;inset:0;z-index:60;pointer-events:none;border-radius:8px;',
      '  background:repeating-linear-gradient(0deg,',
      '    transparent,transparent 2px,',
      '    rgba(0,0,0,0.28) 2px,rgba(0,0,0,0.28) 4px);',
      '  animation:crtScan 1.2s linear infinite;',
      '}',
      // Screen curvature vignette on both boards
      'body[data-theme="neon"] .board-wrap::after,body[data-theme="neon"] .ultimate-meta-grid::after{',
      '  content:"";position:absolute;inset:0;z-index:61;pointer-events:none;border-radius:8px;',
      '  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.65) 100%);',
      '}',
      // RGB chromatic fringe on cells (classic + ultimate mini cells)
      'body[data-theme="neon"] .cell svg,body[data-theme="neon"] .u-cell svg{',
      '  filter:drop-shadow(1px 0 0 rgba(255,0,0,0.45)) drop-shadow(-1px 0 0 rgba(0,0,255,0.45));',
      '}',
      // Phosphor persistence glow on filled cells (classic + ultimate)
      'body[data-theme="neon"] .cell.filled .cell-inner,body[data-theme="neon"] .u-cell.filled{',
      '  filter:blur(0.3px) brightness(1.15);',
      '}',
      // Glitch class targets both boards
      'body.neon-glitch .board-wrap,body.neon-glitch .ultimate-meta-grid{animation:neonGlitch 0.14s steps(1) 1,crtFlicker 0.1s steps(2) infinite!important;}'
    ].join('');
    document.head.appendChild(s);
  }

  function removeNeonCSS() {
    var s = document.getElementById('neon-ambient-css');
    if (s) s.remove();
    document.body.classList.remove('neon-glitch');
    neonCSSInjected = false;
  }

  function tickNeon() {
    injectNeonCSS();
    var now = Date.now();
    if (now > neonGlitchNext) {
      document.body.classList.add('neon-glitch');
      setTimeout(function(){ document.body.classList.remove('neon-glitch'); }, 150);
      neonGlitchNext = now + 7000 + Math.random() * 8000;
    }
    // Canvas left clear — effects are pure CSS
  }

  // ────────────────────────────────────────────────────────────────────
  // HALLOWEEN — Bats AND ghosts flying/drifting across the screen
  // ────────────────────────────────────────────────────────────────────
  function spawnBat() {
    var fromLeft = Math.random() < 0.5;
    particles.push({
      type: 'bat',
      x: fromLeft ? -20 : 410,
      y: 200 + Math.random() * 380,
      vx: fromLeft ? (0.5 + Math.random() * 0.7) : -(0.5 + Math.random() * 0.7),
      flapPhase: Math.random() * Math.PI * 2,
      flapSpeed: 0.08 + Math.random() * 0.06,
      size: 10 + Math.random() * 8,
      alpha: 0.45 + Math.random() * 0.25
    });
  }

  function drawBat(p) {
    var flap = Math.sin(p.flapPhase) * 0.55;
    cx.save();
    cx.globalAlpha = p.alpha;
    cx.translate(p.x, p.y);
    cx.scale(p.size / 14, (p.size / 14) * (1 + flap));
    cx.fillStyle = '#1a0800';
    cx.beginPath();
    cx.moveTo(0, 0);
    cx.bezierCurveTo(-6, -10, -18, -8, -16, 2);
    cx.bezierCurveTo(-12, 6,  -4, 4,   0, 0);
    cx.moveTo(0, 0);
    cx.bezierCurveTo(6, -10,  18, -8,  16, 2);
    cx.bezierCurveTo(12, 6,   4, 4,    0, 0);
    cx.ellipse(0, 1, 3, 4, 0, 0, Math.PI * 2);
    cx.fill();
    cx.restore();
  }

  function spawnGhost() {
    var fromLeft = Math.random() < 0.5;
    particles.push({
      type: 'ghost',
      x: fromLeft ? -30 : 420,
      y: 100 + Math.random() * 500,
      vx: fromLeft ? (0.3 + Math.random() * 0.5) : -(0.3 + Math.random() * 0.5),
      bobPhase: Math.random() * Math.PI * 2,
      bobSpeed: 0.025 + Math.random() * 0.02,
      size: 14 + Math.random() * 10,
      alpha: 0.20 + Math.random() * 0.20
    });
  }

  function drawGhost(p) {
    var bob = Math.sin(p.bobPhase) * 3;
    var s = p.size;
    cx.save();
    cx.globalAlpha = p.alpha;
    cx.translate(p.x, p.y + bob);
    if (p.vx < 0) cx.scale(-1, 1);
    cx.fillStyle = 'rgba(220,200,255,0.9)';

    // Ghost body: dome top + wavy bottom
    cx.beginPath();
    cx.arc(0, -s * 0.3, s * 0.55, Math.PI, 0, false); // dome
    cx.lineTo(s * 0.55, s * 0.55);
    // Wavy skirt: 3 bumps
    var bumpW = (s * 1.1) / 3;
    cx.quadraticCurveTo( s*0.37, s*0.35,  s*0.18, s*0.55);
    cx.quadraticCurveTo( s*0,    s*0.75,  -s*0.18,s*0.55);
    cx.quadraticCurveTo(-s*0.37, s*0.35,  -s*0.55,s*0.55);
    cx.lineTo(-s * 0.55, -s * 0.3);
    cx.closePath();
    cx.fill();

    // Eyes
    cx.fillStyle = 'rgba(60,0,80,0.85)';
    cx.beginPath();
    cx.ellipse(-s * 0.18, -s * 0.28, s * 0.09, s * 0.11, 0, 0, Math.PI * 2);
    cx.fill();
    cx.beginPath();
    cx.ellipse( s * 0.18, -s * 0.28, s * 0.09, s * 0.11, 0, 0, Math.PI * 2);
    cx.fill();

    cx.restore();
  }

  function tickHalloween() {
    var batCount   = particles.filter(function(p){return p.type==='bat';}).length;
    var ghostCount = particles.filter(function(p){return p.type==='ghost';}).length;
    if (batCount   < 3 && (frameCount % 160 === 0)) spawnBat();
    if (ghostCount < 3 && (frameCount % 200 === 0)) spawnGhost();
    // Seed initial ghosts quickly
    if (ghostCount < 2 && (frameCount % 60 === 0)) spawnGhost();

    particles = particles.filter(function(p) {
      if (p.type === 'bat') {
        p.x += p.vx;
        p.flapPhase += p.flapSpeed;
        drawBat(p);
        return p.x > -40 && p.x < 430;
      }
      if (p.type === 'ghost') {
        p.x += p.vx;
        p.bobPhase += p.bobSpeed;
        drawGhost(p);
        return p.x > -60 && p.x < 460;
      }
      return false;
    });
  }

  // ────────────────────────────────────────────────────────────────────
  // OCEAN — Bubbles rising from the bottom of the screen
  // Many small circles drifting upward with gentle wobble, various sizes
  // ────────────────────────────────────────────────────────────────────
  function spawnBubble() {
    var r = 2 + Math.random() * 5;
    particles.push({
      type: 'bubble',
      x: 10 + Math.random() * 370,
      y: 745 + Math.random() * 25,    // within #root 780px — no clip artifact
      vy: -(0.4 + Math.random() * 0.7),
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.02 + Math.random() * 0.025,
      wobbleAmp: 3 + Math.random() * 4,
      r: r,
      alpha: 0,                        // fade in from bottom to avoid hard-edge pop
      alphaTarget: 0.45 + Math.random() * 0.35,
      alphaDecay: 0.0025 + Math.random() * 0.002
    });
  }

  function drawBubble(p) {
    cx.save();
    cx.globalAlpha = p.alpha;
    cx.strokeStyle = '#67e8f9';
    cx.lineWidth = 1;
    cx.beginPath();
    cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    cx.stroke();
    // Shine highlight
    cx.globalAlpha = p.alpha * 0.5;
    cx.fillStyle = 'rgba(255,255,255,0.6)';
    cx.beginPath();
    cx.arc(p.x - p.r * 0.3, p.y - p.r * 0.35, p.r * 0.28, 0, Math.PI * 2);
    cx.fill();
    cx.restore();
  }

  function tickOcean() {
    // Keep 15-25 bubbles rising at all times
    var bubCount = particles.filter(function(p){return p.type==='bubble';}).length;
    if (bubCount < 20 && (frameCount % 18 === 0)) spawnBubble();
    if (bubCount < 10 && (frameCount % 8 === 0)) spawnBubble();

    particles = particles.filter(function(p) {
      if (p.type !== 'bubble') return false;
      p.wobble += p.wobbleSpeed;
      p.x += Math.sin(p.wobble) * p.wobbleAmp * 0.04;
      p.y += p.vy;
      // Fade in from spawn, then decay
      if (p.alpha < p.alphaTarget) {
        p.alpha = Math.min(p.alphaTarget, p.alpha + 0.03);
      } else {
        p.alpha -= p.alphaDecay;
      }
      drawBubble(p);
      return p.alpha > 0 && p.y > -20;
    });
  }

  // ────────────────────────────────────────────────────────────────────
  // SUMMER — Colourful butterflies drifting across the screen
  // Each butterfly has two wing pairs that flap, in various bright colours
  // ────────────────────────────────────────────────────────────────────
  var BUTTERFLY_COLORS = [
    '#f59e0b','#fbbf24','#f97316','#ec4899','#a855f7',
    '#3b82f6','#10b981','#ef4444','#84cc16','#06b6d4'
  ];

  function spawnButterfly() {
    var fromLeft = Math.random() < 0.5;
    var col = BUTTERFLY_COLORS[Math.floor(Math.random() * BUTTERFLY_COLORS.length)];
    particles.push({
      type: 'butterfly',
      x: fromLeft ? -30 : 420,
      y: 80 + Math.random() * 600,
      vx: fromLeft ? (0.4 + Math.random() * 0.6) : -(0.4 + Math.random() * 0.6),
      vy: (Math.random() - 0.5) * 0.4,
      driftPhase: Math.random() * Math.PI * 2,
      driftSpeed: 0.03 + Math.random() * 0.02,
      flapPhase: Math.random() * Math.PI * 2,
      flapSpeed: 0.10 + Math.random() * 0.08,
      size: 9 + Math.random() * 7,
      color: col,
      alpha: 0.60 + Math.random() * 0.30
    });
  }

  function drawButterfly(p) {
    var flap = Math.cos(p.flapPhase); // -1 to 1
    var wingOpenX = p.size * 1.1;
    var wingH = p.size * 0.75 * Math.abs(flap);
    cx.save();
    cx.globalAlpha = p.alpha;
    cx.translate(p.x, p.y);
    if (p.vx < 0) cx.scale(-1, 1); // flip when going left
    cx.fillStyle = p.color;

    // Upper wing pair
    cx.beginPath();
    cx.moveTo(0, -2);
    cx.bezierCurveTo(-wingOpenX * 0.4, -wingH * 1.2, -wingOpenX, -wingH, -wingOpenX * 0.8, 0);
    cx.bezierCurveTo(-wingOpenX * 0.5, wingH * 0.3, 0, 2, 0, -2);
    cx.fill();
    cx.beginPath();
    cx.moveTo(0, -2);
    cx.bezierCurveTo(wingOpenX * 0.4, -wingH * 1.2, wingOpenX, -wingH, wingOpenX * 0.8, 0);
    cx.bezierCurveTo(wingOpenX * 0.5, wingH * 0.3, 0, 2, 0, -2);
    cx.fill();

    // Lower wing pair (smaller)
    cx.globalAlpha = p.alpha * 0.75;
    var lWingX = wingOpenX * 0.7;
    var lWingH = wingH * 0.55;
    cx.beginPath();
    cx.moveTo(0, 1);
    cx.bezierCurveTo(-lWingX * 0.4, lWingH * 0.5, -lWingX, lWingH * 1.3, -lWingX * 0.5, lWingH * 1.5);
    cx.bezierCurveTo(-lWingX * 0.2, lWingH * 1.6, 0, lWingH * 0.8, 0, 1);
    cx.fill();
    cx.beginPath();
    cx.moveTo(0, 1);
    cx.bezierCurveTo(lWingX * 0.4, lWingH * 0.5, lWingX, lWingH * 1.3, lWingX * 0.5, lWingH * 1.5);
    cx.bezierCurveTo(lWingX * 0.2, lWingH * 1.6, 0, lWingH * 0.8, 0, 1);
    cx.fill();

    // Body
    cx.globalAlpha = p.alpha;
    cx.fillStyle = '#1a0000';
    cx.beginPath();
    cx.ellipse(0, 0, 1.5, p.size * 0.45, 0, 0, Math.PI * 2);
    cx.fill();

    cx.restore();
  }

  function tickSummer() {
    var bfCount = particles.filter(function(p){return p.type==='butterfly';}).length;
    if (bfCount < 6 && (frameCount % 120 === 0)) spawnButterfly();
    if (bfCount < 3 && (frameCount % 40 === 0)) spawnButterfly();

    particles = particles.filter(function(p) {
      if (p.type !== 'butterfly') return false;
      p.flapPhase += p.flapSpeed;
      p.driftPhase += p.driftSpeed;
      p.x += p.vx;
      p.y += p.vy + Math.sin(p.driftPhase) * 0.35;
      drawButterfly(p);
      return p.x > -60 && p.x < 450;
    });
  }

  // ────────────────────────────────────────────────────────────────────
  // Theme change: clear particles + neon CSS on exit
  // ────────────────────────────────────────────────────────────────────
  var _origSetTheme = window.setTheme || function(){};
  // Hook: wrap setTheme to flush particles when theme changes
  (function patchSetTheme() {
    var orig = (typeof setTheme === 'function') ? setTheme : null;
    if (!orig) { setTimeout(patchSetTheme, 200); return; }
    setTheme = function(id) {
      // Clean up neon overlay if leaving neon
      if ((typeof _currentTheme !== 'undefined') && _currentTheme === 'neon' && id !== 'neon') {
        removeNeonCSS();
      }
      particles = [];
      orig(id);
      ensureLoop();
    };
  })();

  // ── Public API: called by handleClick and u/mHandleClick ──────────────
  window.notifyAmbientMove = function(cellIdx) {
    lastMove = { idx: cellIdx, time: Date.now() };
  };

})(); // end ambient particles IIFE

  _soundOn = !_soundOn;

  render();
}

  var newDark = !state.darkMode;

}

// ── Name Modal ──
let _nameModalCallback = null;
function showNameModal(isAI){
  document.getElementById('p2NameField').style.display = isAI ? 'none' : 'block';
  document.getElementById('inputP1').value = playerNames.X==='Player 1'?'':playerNames.X;
  document.getElementById('inputP2').value = playerNames.O==='Player 2'?'':playerNames.O;
  document.getElementById('nameModal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('inputP1').focus(), 100);
}
function closeNameModal(){
  const p1 = document.getElementById('inputP1').value.trim() || 'Player 1';
  const p2 = document.getElementById('inputP2').value.trim() || 'Player 2';
  playerNames.X = p1; playerNames.O = p2;
  document.getElementById('nameModal').classList.add('hidden');
  const greeting = state.mode==='2p'
    ? `${p1} vs ${p2}! Let the battle begin! ⚔️`
    : `Welcome, ${p1}! Let's play! 🎮`;
  speak(greeting);
  render();
}
document.getElementById('nameModalOk').addEventListener('click', closeNameModal);
['inputP1','inputP2'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown', e=>{ if(e.key==='Enter') closeNameModal(); });
});

            <button class="rematch-btn" id="mRematchBtn" onclick="mNewGame()" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;margin-right:4px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Rematch</button>
          </div>
        </div>

      </div>
    </div>
  `;

  dom.controls     = document.getElementById('controls');
  dom.scoreXVal    = document.getElementById('score-X-val');
  dom.scoreXLbl    = document.getElementById('score-X-lbl');
  dom.scoreDrawVal = document.getElementById('score-draw-val');
  dom.scoreOVal    = document.getElementById('score-O-val');
  dom.scoreOLbl    = document.getElementById('score-O-lbl');
  dom.grid         = document.getElementById('grid');
  dom.statusText   = document.getElementById('statusText');
  dom.statusBar    = document.getElementById('statusBar');
  dom.bubble       = document.getElementById('bubble');
  dom.bubbleContent= document.getElementById('bubbleContent');
  dom.heartyWrap   = document.getElementById('heartyWrap');
  dom.cells        = Array.from({length:9},(_,i)=>document.getElementById(`cell-${i}`));
  dom.undoBtn      = document.getElementById('undoBtn');
  dom.rematchBtn   = document.getElementById('rematchBtn');
  dom.seriesBar    = document.getElementById('seriesBar');
  dom.soundBtn     = document.getElementById('soundBtn');
  dom.darkBtn      = document.getElementById('darkBtn');
}

// ══════════════════════════════════════════════════════════════════════════
// TUTORIAL MODE — Hearty walks the player through each game type
// ══════════════════════════════════════════════════════════════════════════
var _tutorialActive = false;
var _tutorialStep   = 0;
var _tutorialMode   = 'classic'; // 'classic' | 'ultimate' | 'misere'

var TUTORIALS = {
  classic: [
    { text: "Hi there! I'm Hearty! 💕 Let me walk you through Noughts & Crosses — tap Next to begin!", highlight: null, waitForMove: false, nextLabel: "Let's go!" },
    { text: "The board has 9 squares in a 3×3 grid. You play as ✕ and I play as ○. We take turns placing our marks!", highlight: null, waitForMove: false, nextLabel: "Got it!" },
    { text: "To move, tap any empty square. Try the centre square first — it's the best opening move! 🎯", highlight: [4], waitForMove: true, nextLabel: null },
    { text: "Nice move! Now I'll take my turn, then you go again. We keep alternating until someone wins or it's a draw.", highlight: null, waitForMove: false, nextLabel: "OK!" },
    { text: "You win by getting THREE marks in a row — across, down, or diagonally! ✕✕✕ Try to make that happen!", highlight: null, waitForMove: false, nextLabel: "I'll try!" },
    { text: "If all 9 squares fill up with no winner, it's a draw! 🤝 Tap New Game anytime to start fresh.", highlight: null, waitForMove: false, nextLabel: "Understood!" },
    { text: "Pro tip: always BLOCK me if I have two in a row! And try setting up two winning threats at once — that's a fork! 🍴", highlight: null, waitForMove: false, nextLabel: "Great tip!" },
    { text: "You're all set for Classic mode! Come find me in Ultimate or Misère for more challenges! 💕", highlight: null, waitForMove: false, nextLabel: "Let's play!" }
  ],
  ultimate: [
    { text: "Welcome to Ultimate Noughts & Crosses! 🌟 It's a full Noughts & Crosses game played across 9 mini-boards at once!", highlight: null, waitForMove: false, nextLabel: "Tell me more!" },
    { text: "The big board is a 3×3 grid of 9 mini-boards. Win THREE mini-boards in a row — across, down, or diagonal — to win the whole game!", highlight: null, waitForMove: false, nextLabel: "Got it!" },
    { text: "Here's the key rule 🗺️: think of each mini-board as having 9 positions — top-left, top-centre... all the way to bottom-right.", highlight: null, waitForMove: false, nextLabel: "OK…" },
    { text: "Whichever POSITION you play inside a mini-board, your opponent must next play in the mini-board at that SAME POSITION on the big grid!", highlight: null, waitForMove: false, nextLabel: "Show me!" },
    { text: "All 9 mini-boards are open right now — tap any cell to make your first move. Watch which mini-board lights up next! 👀", highlight: null, waitForMove: true, nextLabel: null },
    { text: "See it? The position of the cell you just tapped matched a position on the big grid — that's the mini-board I must play in now!", highlight: null, waitForMove: false, nextLabel: "Clever!" },
    { text: "If I'm sent to a mini-board that's already been won or drawn, I get a FREE choice and can play anywhere! 🎯", highlight: null, waitForMove: false, nextLabel: "Useful!" },
    { text: "Think on two levels: win the mini-board in front of you, but choose your cell position wisely — it controls where I go next! 🏆", highlight: null, waitForMove: false, nextLabel: "Let's play!" }
  ],
  misere: [
    { text: "Welcome to Misère (Reverse) mode! 😈 Everything looks like Classic Noughts & Crosses… but one rule is completely flipped!", highlight: null, waitForMove: false, nextLabel: "Tell me!" },
    { text: "In Misère, the player who completes THREE IN A ROW… LOSES! 😱 Your goal is to FORCE ME to finish a line!", highlight: null, waitForMove: false, nextLabel: "Devious!" },
    { text: "Same 3×3 board, same turns — but now getting three of your marks in a row is the WORST thing you can do!", highlight: null, waitForMove: false, nextLabel: "Got it!" },
    { text: "Try a move now — but be careful! Avoid completing three in a row. Corners are usually safer to start! 🎭", highlight: [0,2,6,8], waitForMove: true, nextLabel: null },
    { text: "Good! The strategy flips completely. Instead of blocking my threats, you might sometimes want me to finish them... carefully!", highlight: null, waitForMove: false, nextLabel: "Tricky!" },
    { text: "A draw still happens if the board fills with no three-in-a-row. Sometimes that's your safest escape! 🤝", highlight: null, waitForMove: false, nextLabel: "Smart!" },
    { text: "You're ready! Remember: three in a row = YOU LOSE. Steer me into making a line to win! Good luck! 🌀", highlight: null, waitForMove: false, nextLabel: "Let's go!" }
  ]
};

function _stopTutorialIfActive() {
  if (!_tutorialActive) return;
  var mode = _tutorialMode; // capture before clearing
  _tutorialActive = false;
  _clearTutorialHighlights();
  if (dom.bubble) dom.bubble.classList.remove('tutorial-active');
  if (dom.heartyWrap) dom.heartyWrap._heartyKey = null;
  var btn = document.getElementById('tutorialBtn');
  if (btn) btn.classList.remove('active');
  // Clear the board so the player starts fresh after the tutorial
  // Use setTimeout so the calling mode-change function runs first
  setTimeout(function() {
    if (mode === 'ultimate' && uState) { uNewGame(); }
    else if (mode === 'misere' && mState) { mNewGame(); }
    else if (!uState && !mState) { newGame(); }
  }, 50);
  // No completion speech — the mode-change function speaks instead.
}

function _tutorialCurrentGame() {
  if (mState) return 'misere';
  if (uState) return 'ultimate';
  return 'classic';
}

function startTutorial() {
  if (_tutorialActive) { endTutorial(); return; }
  _tutorialMode   = _tutorialCurrentGame();
  _tutorialActive = true;
  _tutorialStep   = 0;
  var btn = document.getElementById('tutorialBtn');
  if (btn) btn.classList.add('active');
  // Force Hearty to redraw with teacher accessories
  if (dom.heartyWrap) dom.heartyWrap._heartyKey = null;
  if (_tutorialMode === 'classic') {
    if (uState) uToggleMode();
    if (mState) mToggleMode();
    state.mode = 'ai'; state.difficulty = 'easy';
    newGame();
  } else if (_tutorialMode === 'ultimate') {
    if (!uState) uToggleMode();
    uNewGame();
  } else {
    if (!mState) mToggleMode();
    mNewGame();
  }
  setTimeout(_renderTutorialStep, 400);
}

function _renderTutorialStep() {
  _clearTutorialHighlights();
  var steps = TUTORIALS[_tutorialMode];
  if (!steps || _tutorialStep >= steps.length) { endTutorial(); return; }
  var step = steps[_tutorialStep];
  if (step.highlight && step.highlight.length) _applyHighlights(step.highlight);
  _speakTutorial(step, _tutorialStep, steps.length);
}

function _applyHighlights(indices) {
  if (_tutorialMode === 'classic') {
    indices.forEach(function(i) {
      var el = document.getElementById('cell-' + i);
      if (el) el.classList.add('tutorial-highlight');
    });
  } else if (_tutorialMode === 'misere') {
    indices.forEach(function(i) {
      var el = document.getElementById('mcell-' + i);
      if (el) el.classList.add('tutorial-highlight');
    });
  }
}

function _clearTutorialHighlights() {
  document.querySelectorAll('.tutorial-highlight').forEach(function(el) {
    el.classList.remove('tutorial-highlight');
  });
}

// Write tutorial content directly into Hearty's speech bubble
function _speakTutorial(step, stepIdx, total) {
  var modeLabel = _tutorialMode === 'classic' ? 'Classic' : _tutorialMode === 'ultimate' ? 'Ultimate' : 'Mis\u00e8re';

  var btnRow = step.waitForMove
    ? '<div class="tut-btn-row"><button class="tut-skip" onclick="endTutorial()">\u2715 Exit</button><span class="tut-wait">\ud83d\udc46 tap to continue</span></div>'
    : '<div class="tut-btn-row"><button class="tut-skip" onclick="endTutorial()">\u2715 Exit</button><button class="tut-next" onclick="advanceTutorial()">' + (step.nextLabel || 'Next \u2192') + '</button></div>';

  var html =
    '<div class="tut-meta">\ud83d\udcd6 ' + modeLabel + ' \u00b7 ' + (stepIdx+1) + '\u00a0/\u00a0' + total + '</div>' +
    '<p class="tut-text">' + step.text + '</p>' +
    btnRow;

  // Hide bubble, swap content, then show — same pattern as speak()
  state.bubbleText    = step.text;
  state.bubbleVisible = false;
  dom.bubble.className = 'speech-bubble hidden';

  clearTimeout(speakAnimTimeout);
  setTimeout(function() {
    state.bubbleVisible = true;
    state.heartyAnim    = 'speaking';

    dom.bubbleContent.innerHTML = html;
    dom.bubble.className = 'speech-bubble tutorial-active visible';

    var heartyClass = 'hearty-svg-wrap speaking';
    if (dom.heartyWrap.className !== heartyClass) dom.heartyWrap.className = heartyClass;

    SFX.hearty();

    speakAnimTimeout = setTimeout(function() {
      state.heartyAnim = 'breathing';
      var breathClass = 'hearty-svg-wrap breathing';
      if (dom.heartyWrap.className !== breathClass) dom.heartyWrap.className = breathClass;
    }, 750);
  }, 80);
}

function advanceTutorial() {
  _tutorialStep++;
  _renderTutorialStep();
}

function tutorialOnMove() {
  if (!_tutorialActive) return;
  var steps = TUTORIALS[_tutorialMode];
  if (!steps) return;
  var step = steps[_tutorialStep];
  if (step && step.waitForMove) {
    _tutorialStep++;
    setTimeout(function() { _renderTutorialStep(); }, 900);
  }
}

function endTutorial() {
  var mode = _tutorialMode; // capture before clearing
  _tutorialActive = false;
  _clearTutorialHighlights();
  // Remove tutorial-active class from bubble so it snaps back to normal size
  if (dom.bubble) dom.bubble.classList.remove('tutorial-active');
  // Force Hearty to redraw without teacher accessories
  if (dom.heartyWrap) dom.heartyWrap._heartyKey = null;
  var btn = document.getElementById('tutorialBtn');
  if (btn) btn.classList.remove('active');
  // Clear the board so the player starts fresh after the tutorial
  if (mode === 'ultimate' && uState) { uNewGame(); }
  else if (mode === 'misere' && mState) { mNewGame(); }
  else { newGame(); }
  speak(pickArr([
    "Tutorial complete! You've got this — let's play for real! \ud83d\udc95",
    "All done! Now show me what you've learned! \ud83c\udfae",
    "Tutorial finished! I believe in you — good luck! \ud83c\udf1f"
  ]), true);
}


// ── Auto-tip timer — skipped when app is in background ──
setInterval(()=>{
  if(!_appVisible) return; // don't fire tips when backgrounded
  if(_tutorialActive) return; // don't interrupt tutorial
  const isEmpty = state.board.every(c=>c===null);
  const isFinished = state.result!==null;
  if((isEmpty||isFinished)&&!state.aiThinking){
    speak(pick('health'));
  }
}, 15000);

// ── Boot ──
// Restore saved theme before first render
(function(){
  try {
    var saved = localStorage.getItem('hearty-theme');
    if (saved && saved !== 'default') {
      _currentTheme = saved;
      document.body.setAttribute('data-theme', saved);
    }
  } catch(e){}
})();
// ── Portrait lock (Screen Orientation API) ──
// Locks the app to portrait on devices that support the API (PWA / standalone).
// Falls back silently — the CSS overlay already handles the landscape overlay
// for browsers that don't support lock().
(function() {
  try {
    var ori = screen.orientation || screen.mozOrientation || screen.msOrientation;
    if (ori && typeof ori.lock === 'function') {
      ori.lock('portrait').catch(function(){});
    }
  } catch(e) {}
})();
initLayout();
if (window._attachParticleCanvas) window._attachParticleCanvas();
render();
// Apply uniform scale so the 390×780 canvas fits any screen in both axes.
// Math.min(vw/W, vh/H) picks the axis that is more constrained — the canvas
// fills that axis fully and is centred (letterboxed) on the other.
(function() {
  var DESIGN_W = 390, DESIGN_H = 780;
  function applyScale() {
    var vw = window.innerWidth, vh = window.innerHeight;
    var scale = Math.min(vw / DESIGN_W, vh / DESIGN_H);
    var root = document.getElementById('root');
    if (root) {
      root.style.width  = DESIGN_W + 'px';
      root.style.height = DESIGN_H + 'px';
      root.style.transform = 'scale(' + scale + ')';
      root.style.transformOrigin = 'top left';
      root.style.left = Math.round((vw - DESIGN_W * scale) / 2) + 'px';
      root.style.top  = '0px';
    }
    // Keep letterbox colour in sync with current theme + palette
    if (typeof applyThemeLetterbox === 'function') applyThemeLetterbox();
  }
  applyScale();
  window.addEventListener('resize', applyScale);
})();
// Restore saved music volume
(function(){
  try {
    var saved = parseInt(localStorage.getItem('hearty-music-vol'));
    if (!isNaN(saved)) {
      var slider = document.getElementById('musicVolumeSlider');
      if (slider) slider.value = saved;
      var desc = document.getElementById('menuMusicDesc');
      if (desc) desc.textContent = 'Volume ' + saved + '%';
      if (window._musicSetVolume) window._musicSetVolume(saved / 100);
    }
  } catch(e) {}
})();
// Show name modal on first load in 2p mode — skip for ai mode
// (don't show modal on boot so the welcome message fires naturally)
</script>
