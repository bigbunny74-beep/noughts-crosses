<script>
// ── Prevent long-press context menu on mobile ──
document.addEventListener('contextmenu', function(e) {
  if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
  }
}, { passive: false });
// ── Side Menu ──
let menuOpen = false;
let swipeStartX = null, swipeStartY = null;

function openSideMenu() {
  menuOpen = true;
  document.getElementById('sideMenu').classList.add('open');
  document.getElementById('menuOverlay').classList.add('open');
  renderSideMenu();
}
function closeSideMenu() {
  menuOpen = false;
  document.getElementById('sideMenu').classList.remove('open');
  document.getElementById('menuOverlay').classList.remove('open');
}

// Swipe right to open, swipe left to close
document.addEventListener('touchstart', function(e) {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', function(e) {
  if (swipeStartX === null) return;
  const dx = e.changedTouches[0].clientX - swipeStartX;
  const dy = Math.abs(e.changedTouches[0].clientY - swipeStartY);
  if (dy > 60) { swipeStartX = null; return; } // mostly vertical, ignore
  if (!menuOpen && dx > 55 && swipeStartX < 40) {
    openSideMenu();
  } else if (menuOpen && dx < -55) {
    closeSideMenu();
  }
  swipeStartX = null;
}, { passive: true });

function menuEditName() {
  closeSideMenu();
  setTimeout(()=>showNameModal(state.mode==='ai'), 200);
}
function menuToggleSound() {
  toggleSound();
  renderSideMenu();
}
function menuToggleDark() {
  toggleDark();
  renderSideMenu();
}
function menuSwitchMode(m) {
  closeSideMenu();
  setTimeout(()=>{
    if (uState) { uToggleMode(); }   // exit Ultimate first
    if (mState) { mToggleMode(); }   // exit Misère first
    switchMode(m);
  }, 100);
}
function menuSetDiff(d) {
  setDiff(d);
  renderSideMenu();
}
function menuSetSeries(m) {
  setSeriesMode(m);
  renderSideMenu();
}

function renderSideMenu() {
  const s = state;

  // Mode pills
  const modeEl = document.getElementById('menuModePills');
  if (modeEl) {
    modeEl.innerHTML = [
      `<button class="menu-pill ${(uState?uState.mode==='ai':mState?mState.mode==='ai':s.mode==='ai')?'active-mode':'inactive-mode'}" onclick="menuSwitchMode('ai');closeSideMenu()">vs Hearty</button>`,
      `<button class="menu-pill ${(uState?uState.mode==='2p':mState?mState.mode==='2p':s.mode==='2p')?'active-mode':'inactive-mode'}" onclick="menuSwitchMode('2p');closeSideMenu()">2 Players</button>`
    ].join('');
  }

  // Diff section visibility
  const diffSection = document.getElementById('menuDiffSection');
  const diffDivider = document.getElementById('menuDiffDivider');
  const showDiff = s.mode==='ai';
  if (diffSection) diffSection.style.display = showDiff ? '' : 'none';

// ── Fireworks ──
const canvas = document.createElement('canvas');
canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:100;';
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');
let particles = [];
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resize); resize();

class Particle {
  constructor(x,y,color,big,isStar){
    this.x=x; this.y=y; this.color=color;
    this.angle=Math.random()*Math.PI*2;
    // Stars cluster near full angles for a starburst; sparks are fully random
    this.speed=Math.random()*(big?10:7)+(big?3:2);
    this.friction=0.94; this.gravity=0.10; this.alpha=1;
    // Stars fade fast (bright flash), sparks linger
    this.decay=isStar ? (Math.random()*0.03+0.04) : (Math.random()*0.012+0.012);
    this.size=isStar ? (Math.random()*3+3) : (big?(Math.random()*2+1.2):1.8);
    this.isStar=isStar;
    this.life=0; // frame counter for twinkle
  }
  update(){
    this.life++;
    this.speed*=this.friction;
    this.x+=Math.cos(this.angle)*this.speed;
    this.y+=Math.sin(this.angle)*this.speed+this.gravity;
    // Twinkle: sin-based flicker on alpha as particle fades out
    const twinkle = this.isStar ? 0 : Math.sin(this.life*0.8)*0.12;
    this.alpha=Math.max(0, this.alpha-this.decay+twinkle);
  }
  draw(){
    ctx.globalAlpha=Math.max(0,this.alpha);
    if(this.isStar){
      // Star particles: draw a short streak (line) in travel direction
      ctx.strokeStyle=this.color;
      ctx.lineWidth=this.size*0.7;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(this.x,this.y);
      ctx.lineTo(this.x-Math.cos(this.angle)*this.speed*2.2,
                 this.y-Math.sin(this.angle)*this.speed*2.2);
      ctx.stroke();
    } else {
      ctx.fillStyle=this.color;
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
      ctx.fill();
    }
  }
}

// Shell trail particle — brief white streak rising before burst
class ShellParticle {
  constructor(x,y){ this.x=x; this.y=y; this.vy=-6; this.alpha=0.9; this.size=2.5; }
  update(){ this.vy*=0.85; this.y+=this.vy; this.alpha-=0.12; }
  draw(){ ctx.globalAlpha=Math.max(0,this.alpha); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
}

// Palette: each burst picks a base hue; particles pick from a tight cluster
// around that hue plus white/gold highlights for realism
const FW_PALETTES = [
  ['#ff4d6d','#ff8fa3','#ffb3c1','#fff'],     // rose
  ['#ffb703','#ffd60a','#fff3b0','#fff'],     // gold
  ['#7c3aed','#a855f7','#d8b4fe','#fff'],     // purple
  ['#06d6a0','#34d399','#a7f3d0','#fff'],     // teal
  ['#3a86ff','#60a5fa','#bfdbfe','#fff'],     // blue
  ['#fb8500','#fb923c','#fed7aa','#fff'],     // orange
];

function createFirework(x,y,big){
  const palette=FW_PALETTES[Math.floor(Math.random()*FW_PALETTES.length)];
  const count=big?90:50;
  const starCount=big?18:10;
  // Add a brief shell trail rising to the burst point
  for(let t=0;t<5;t++) particles.push(new ShellParticle(x+Math.random()*4-2, y+t*8));
  // Star streaks — brighter, faster, shorter-lived
  for(let i=0;i<starCount;i++){
    const col=palette[Math.floor(Math.random()*palette.length)];
    particles.push(new Particle(x,y,col,big,true));
  }
  // Spark particles — linger, twinkle, fade slowly
  for(let i=0;i<count;i++){
    const col=palette[Math.floor(Math.random()*palette.length)];
    particles.push(new Particle(x,y,col,big,false));
  }
  SFX.firework();
}
// ── Page Visibility: pause rAF + audio when app goes to background ──────────
var _appVisible = true;
var _rafId = null;

function animateFireworks(){
  if(!_appVisible){ _rafId = null; return; } // pause when hidden
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.alpha>0);
  particles.forEach(p=>{p.update();p.draw();});
  // Only reschedule if there are live particles — avoids spinning when idle
  if(particles.length > 0){
    _rafId = requestAnimationFrame(animateFireworks);
  } else {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    _rafId = null;
  }
}

function _startFireworksLoop(){
  if(!_rafId && _appVisible){
    _rafId = requestAnimationFrame(animateFireworks);
  }
}

// Kick the loop when a new burst is launched
var _origCreateFirework = createFirework;
createFirework = function(x,y,color,big){
  _origCreateFirework(x,y,color,big);
  _startFireworksLoop();
};

document.addEventListener('visibilitychange', function(){
  _appVisible = !document.hidden;
  if(_appVisible){
    // Resume: remove paused class, restart rAF if particles waiting, resume audio
    document.body.classList.remove('app-hidden');
    if(particles.length > 0) _startFireworksLoop();
    if(_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume();
    if(window._musicHandleVisibility) window._musicHandleVisibility(true);
  } else {
    // Suspend: freeze CSS animations, stop rAF spinning, suspend audio
    document.body.classList.add('app-hidden');
    if(_audioCtx && _audioCtx.state === 'running') _audioCtx.suspend();
    if(window._musicHandleVisibility) window._musicHandleVisibility(false);
  }
});

const _audioCtx=(function(){ try{return new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;} })();
let _soundOn = true;
function playTone(freq,type,dur,vol){
  if(!_audioCtx||!_soundOn) return;
  type=type||'sine'; dur=dur||0.18; vol=vol||0.22;
  try{
    if(_audioCtx.state==='suspended') _audioCtx.resume();
    const osc=_audioCtx.createOscillator(), gain=_audioCtx.createGain();
    osc.connect(gain); gain.connect(_audioCtx.destination);
    osc.type=type; osc.frequency.setValueAtTime(freq,_audioCtx.currentTime);
    gain.gain.setValueAtTime(vol,_audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,_audioCtx.currentTime+dur);
    osc.start(_audioCtx.currentTime); osc.stop(_audioCtx.currentTime+dur);
  }catch(e){}
}

      gain.gain.linearRampToValueAtTime(vol, startTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + dur * 0.85);
      osc.start(startTime);
      osc.stop(startTime + dur);
    } catch(e) {}
  }

    if (!_audioCtx || _stopped) return;

      var t       = _nextBeatTime;
      var beatInBar = _beatCount % c.sig;

      // Melody
      var noteIdx = c.melody[beat];
      if (noteIdx >= 0) {
        _schedNote(c.scale[noteIdx], c.mtype, t, BEAT_DUR * c.noteDur, c.mVol);
      }

      // Pad chord on beat 1 of each bar
      if (beatInBar === 0) {
        var root  = c.chords[bar];
        var fifth = root * 1.498;
        _schedNote(root,  'sine', t, BEAT_DUR * c.padDur, c.pVol);
        _schedNote(fifth, 'sine', t, BEAT_DUR * c.padDur, c.pVol * 0.75,  5);
        _schedNote(fifth, 'sine', t, BEAT_DUR * c.padDur, c.pVol * 0.60, -5);
      }

      // Bass on configured interval
      if (_beatCount % c.bassEvery === 0) {
        _schedNote(c.bass[bar], 'sine', t, BEAT_DUR * c.bassDur, c.bVol);
      }

      _nextBeatTime += BEAT_DUR;
      _beatCount++;
    }

    return (_soundOn && _musicVol > 0) ? _musicVol * 0.6 : 0.001;

    if (!_audioCtx) return;
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    if (!_masterGain) {
      _masterGain = _audioCtx.createGain();
      _masterGain.connect(_audioCtx.destination);
    }
    _cfg = _getConfig();
    _masterGain.gain.setValueAtTime(_targetGain(), _audioCtx.currentTime);
    _nextBeatTime = _audioCtx.currentTime + 0.1;
    _beatCount = 0;
    _stopped = false;
    _scheduleBeat();
  }

// ── Minimax ──
const WIN_LINES=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function checkWinner(b){
  for(const[a,c,d]of WIN_LINES) if(b[a]&&b[a]===b[c]&&b[a]===b[d]) return{winner:b[a],line:[a,c,d]};
  if(b.every(Boolean)) return{winner:'draw',line:[]};
  return null;
}
function minimax(b,isMax,alpha,beta,depth){
  const r=checkWinner(b);
  if(r){if(r.winner==='O')return 10-depth;if(r.winner==='X')return depth-10;return 0;}
  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++)if(!b[i]){b[i]='O';best=Math.max(best,minimax(b,false,alpha,beta,depth+1));b[i]=null;alpha=Math.max(alpha,best);if(beta<=alpha)break;}
    return best;
  } else {
    let best=Infinity;
    for(let i=0;i<9;i++)if(!b[i]){b[i]='X';best=Math.min(best,minimax(b,true,alpha,beta,depth+1));b[i]=null;beta=Math.min(beta,best);if(beta<=alpha)break;}
    return best;
  }
}
function getBestMove(board,diff){
  const empty=board.map((v,i)=>!v?i:null).filter(i=>i!==null);
  if(diff==='easy'&&Math.random()<0.7) return empty[Math.floor(Math.random()*empty.length)];
  if(diff==='medium'&&Math.random()<0.35) return empty[Math.floor(Math.random()*empty.length)];
  let best=-Infinity,move=null;
  for(const i of empty){const b=[...board];b[i]='O';const s=minimax(b,false,-Infinity,Infinity,0);if(s>best){best=s;move=i;}}
  return move;
}

// ════════════════════════════════════════════════════════════════════════════
// ULTIMATE NOUGHTS & CROSSES — game logic
// State lives in uState (separate from the classic game's state object).
// ════════════════════════════════════════════════════════════════════════════

var uState = null; // null when not in ultimate mode

function uInitState() {
  return {
    boards: Array.from({length:9}, function(){ return Array(9).fill(null); }),
    meta: Array(9).fill(null),
    activeBoard: -1,
    xIsNext: (Math.random() < 0.5),
    result: null,
    mode: 'ai',
    difficulty: 'easy',
    aiThinking: false,
    scoresX: 0, scoresDraw: 0, scoresO: 0,
    _undoState: null,
  };
}

// Check ultimate meta-board for overall winner
function uCheckMeta(meta) {
  return checkWinner(meta.map(function(v){ return v==='draw'?null:v; }));
}

// Get valid cells in a mini-board (not yet won/drawn, cells still open)
function uValidBoards(us) {
  var ab = us.activeBoard;
  if (ab !== -1) {
    // Must play in activeBoard if it's still open
    if (!us.meta[ab] && us.boards[ab].some(function(c){return !c;})) return [ab];
    // Otherwise free choice of any open board
  }
  var open = [];
  for (var i = 0; i < 9; i++) {
    if (!us.meta[i] && us.boards[i].some(function(c){return !c;})) open.push(i);
  }
  return open;
}

// Ultimate AI — play in a valid mini-board
// Strategy: use Minimax for the target mini-board; pick the target board that
// most favours O on the meta-board. Simplified but plays sensibly.
function uGetAIMove(us) {
  var validBoards = uValidBoards(us);
  if (!validBoards.length) return null;

  // Pick the best (boardIdx, cellIdx) pair
  var bestBoard = -1, bestCell = -1, bestScore = -Infinity;

  validBoards.forEach(function(bi) {
    var b = us.boards[bi].slice();
    // Prefer boards where we can win immediately
    for (var ci = 0; ci < 9; ci++) {
      if (b[ci]) continue;
      b[ci] = 'O';
      var r = checkWinner(b);
      if (r && r.winner === 'O') {
        // Winning this mini-board is very valuable
        var score = 100 + minimax(b, false, -Infinity, Infinity, 0);
        if (score > bestScore) { bestScore = score; bestBoard = bi; bestCell = ci; }
      }
      b[ci] = null;
    }
    // Block X from winning a mini-board
    for (var ci2 = 0; ci2 < 9; ci2++) {
      if (b[ci2]) continue;
      b[ci2] = 'X';
      var r2 = checkWinner(b);
      if (r2 && r2.winner === 'X') {
        var score2 = 80;
        if (score2 > bestScore) { bestScore = score2; bestBoard = bi; bestCell = ci2; }
      }
      b[ci2] = null;
    }
  });

  // If no immediate win/block found, use minimax on a randomly chosen valid board
  if (bestBoard === -1) {
    var diff = us.difficulty;
    if (diff === 'easy' && Math.random() < 0.7) {
      bestBoard = validBoards[Math.floor(Math.random() * validBoards.length)];
      var empties = us.boards[bestBoard].map(function(v,i){return !v?i:null;}).filter(function(i){return i!==null;});
      bestCell = empties[Math.floor(Math.random() * empties.length)];
    } else if (diff === 'medium' && Math.random() < 0.4) {
      bestBoard = validBoards[Math.floor(Math.random() * validBoards.length)];
      var empties2 = us.boards[bestBoard].map(function(v,i){return !v?i:null;}).filter(function(i){return i!==null;});
      bestCell = empties2[Math.floor(Math.random() * empties2.length)];
    } else {
      // Hard: pick best move by minimax on each valid board
      validBoards.forEach(function(bi) {
        var b2 = us.boards[bi].slice();
        var move = getBestMove(b2, 'hard');
        if (move === null) return;
        b2[move] = 'O';
        var metaScore = minimax(b2, false, -Infinity, Infinity, 0);
        b2[move] = null;
        if (metaScore > bestScore) { bestScore = metaScore; bestBoard = bi; bestCell = move; }
      });
      if (bestBoard === -1) {
        bestBoard = validBoards[0];
        bestCell = getBestMove(us.boards[bestBoard], 'hard');
      }
    }
  }
  return bestBoard !== -1 && bestCell !== -1 ? {board: bestBoard, cell: bestCell} : null;
}

// Place a move in ultimate mode and return updated state (immutable)
function uApplyMove(us, boardIdx, cellIdx) {
  var marker = us.xIsNext ? 'X' : 'O';
  var newBoards = us.boards.map(function(b, i) {
    return i === boardIdx ? b.map(function(v, j){ return j === cellIdx ? marker : v; }) : b.slice();
  });
  var newMeta = us.meta.slice();
  var miniBoardResult = checkWinner(newBoards[boardIdx]);
  if (miniBoardResult) newMeta[boardIdx] = miniBoardResult.winner === 'draw' ? 'draw' : miniBoardResult.winner;

  // Next active board = the cell index the current player just played
  // If that board is already won/drawn/full, player can go anywhere
  var nextActive = cellIdx;
  if (newMeta[nextActive] || newBoards[nextActive].every(Boolean)) nextActive = -1;

  var metaResult = uCheckMeta(newMeta);

  return Object.assign({}, us, {
    boards: newBoards,
    meta: newMeta,
    activeBoard: metaResult ? -1 : nextActive,
    xIsNext: !us.xIsNext,
    result: metaResult || null,
    aiThinking: false,
  });
}

// ── Ultimate render ──────────────────────────────────────────────────────────
function uRender() {
  if (!uState) return;
  var us = uState;
  var validBoardSet = {};
  uValidBoards(us).forEach(function(i){ validBoardSet[i] = true; });

  var metaHtml = '';
  for (var bi = 0; bi < 9; bi++) {
    var boardWinner = us.meta[bi];
    var isActive = !us.result && !us.aiThinking && !!validBoardSet[bi];
    var isInactive = !us.result && !us.aiThinking && !validBoardSet[bi] && !boardWinner;
    var boardClass = 'u-mini-board'
      + (isActive ? ' u-active' : '')
      + (isInactive ? ' u-inactive' : '')
      + (boardWinner === 'X' ? ' u-won-x' : '')
      + (boardWinner === 'O' ? ' u-won-o' : '')
      + (boardWinner === 'draw' ? ' u-drawn' : '');

    // Win line for this mini-board
    var miniResult = checkWinner(us.boards[bi]);
    var winLine = (miniResult && miniResult.line) ? miniResult.line : [];

    var cellsHtml = '';
    for (var ci = 0; ci < 9; ci++) {
      var val = us.boards[bi][ci];
      var isWinCell = winLine.indexOf(ci) !== -1;
      var canPlay = isActive && !val && !boardWinner && !us.result && !us.aiThinking;
      var cellClass = 'u-cell'
        + (val ? ' filled' : '')
        + (!canPlay ? ' disabled' : '')
        + (isWinCell ? ' u-win-cell' : '');
      var inner = '';
      if (val === 'X') inner = '<svg viewBox="0 0 44 44" class="cell-x-svg"><line x1="8" y1="8" x2="36" y2="36" stroke="currentColor" stroke-width="5" stroke-linecap="round"/><line x1="36" y1="8" x2="8" y2="36" stroke="currentColor" stroke-width="5" stroke-linecap="round"/></svg>';
      else if (val === 'O') inner = '<svg viewBox="0 0 44 44" class="cell-o-svg"><circle cx="22" cy="22" r="14" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"/></svg>';
      var onclick = canPlay ? ('uHandleClick(' + bi + ',' + ci + ')') : '';
      cellsHtml += '<button class="' + cellClass + '"' + (onclick ? ' onclick="' + onclick + '"' : '') + '>' + inner + '</button>';
    }

    // Overlay for won/drawn boards
    var overlay = '';
    if (boardWinner === 'X') {
      overlay = '<div class="u-board-result u-result-x"><svg viewBox="0 0 44 44"><line x1="4" y1="4" x2="40" y2="40" stroke="currentColor" stroke-width="6" stroke-linecap="round"/><line x1="40" y1="4" x2="4" y2="40" stroke="currentColor" stroke-width="6" stroke-linecap="round"/></svg></div>';
    } else if (boardWinner === 'O') {
      overlay = '<div class="u-board-result u-result-o"><svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="17" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/></svg></div>';
    } else if (boardWinner === 'draw') {
      overlay = '<div class="u-board-result"><svg viewBox="0 0 44 44"><line x1="6" y1="22" x2="38" y2="22" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/></svg></div>';
    }

    metaHtml += '<div class="' + boardClass + '">' + overlay + cellsHtml + '</div>';
  }

  var container = document.getElementById('uBoard');
  if (container) container.innerHTML = metaHtml;

  // Shared status bar (same element used by classic)
  var res = us.result;
  var statusStr;
  if (res) {
    if (res.winner === 'draw') statusStr = "Ultimate Draw!";
    else if (res.winner === 'X') statusStr = playerNames.X + ' wins Ultimate!';
    else statusStr = us.mode==='2p' ? playerNames.O + ' wins Ultimate!' : 'Hearty wins Ultimate!';
  } else if (us.aiThinking) {
    statusStr = 'Hearty is thinking...';
  } else {
    var turnName = us.xIsNext ? playerNames.X : (us.mode==='2p' ? playerNames.O : 'Hearty');
    statusStr = turnName + (us.xIsNext ? ' (X)' : ' (O)') + "'s turn";
  }
  // Update the shared status bar elements
  if (dom.statusText) {
    dom.statusText.textContent = statusStr;
    dom.statusText.className = 'status-text' + ((res&&res.winner==='X')?' win-x':(res&&res.winner==='O')?' win-o':'');
  }
  if (dom.statusBar) dom.statusBar.className = 'status-bar' + (res?' result':'');

  // Shared score numbers
  if (dom.scoreXVal) dom.scoreXVal.textContent = us.scoresX || 0;
  if (dom.scoreDrawVal) dom.scoreDrawVal.textContent = us.scoresDraw || 0;
  if (dom.scoreOVal) dom.scoreOVal.textContent = us.scoresO || 0;
  if (dom.scoreXLbl) dom.scoreXLbl.textContent = playerNames.X + ' (X)';
  if (dom.scoreOLbl) dom.scoreOLbl.textContent = us.mode==='2p' ? playerNames.O + ' (O)' : 'Hearty (O)';

  // Bubble — show thinking dots when AI is active (mirrors classic render logic)
  if (dom.bubbleContent && !_tutorialActive) {
    if (us.aiThinking) {
      dom.bubbleContent.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
      dom.bubble.className = 'speech-bubble visible';
    } else {
      dom.bubbleContent.innerHTML = '<p>' + state.bubbleText + '</p>';
      dom.bubble.className = 'speech-bubble ' + (state.bubbleVisible ? 'visible' : 'hidden');
    }
  }

  // Shared Hearty
  if (dom.heartyWrap) {
    var uKey = (us.showCup?'1':'0') + '|' + (us.aiThinking?'1':'0') + '|' + us.difficulty + '|' + (us.mode==='2p'?'1':'0') + '|' + (typeof _currentTheme!=='undefined'?_currentTheme:'default') + '|' + (us.aiThinking?'t':'f') + '|' + (_tutorialActive?'T':'F');
    if (dom.heartyWrap._heartyKey !== uKey) {
      dom.heartyWrap._heartyKey = uKey;
      dom.heartyWrap.innerHTML = heartySVG(!!us.showCup, us.difficulty, us.mode==='2p', us.aiThinking, _tutorialActive);
    }
    var uClass = 'hearty-svg-wrap ' + (us.aiThinking ? 'wiggling' : 'breathing');
    if (dom.heartyWrap.className !== uClass) dom.heartyWrap.className = uClass;
  }

  // Undo btn
  var undoBtn = document.getElementById('uUndoBtn');
  if (undoBtn) undoBtn.disabled = !us._undoState || !!us.result || us.aiThinking;

  // Rematch btn
  var rematchBtn = document.getElementById('uRematchBtn');
  if (rematchBtn) rematchBtn.style.display = us.result ? 'inline-block' : 'none';
}

// ── Ultimate click handler ───────────────────────────────────────────────────
var _uAiTimeout = null;
function uHandleClick(boardIdx, cellIdx) {
  if (!uState) return;
  if (uState.result) return;   // game over — block all further input
  if (uState.aiThinking) return;
  if (uState.mode === 'ai' && !uState.xIsNext) return;
  var valid = uValidBoards(uState);
  if (valid.indexOf(boardIdx) === -1) return;
  if (uState.boards[boardIdx][cellIdx]) return;
  if (uState.meta[boardIdx]) return;   // mini-board already decided

  // Save undo snapshot
  uState._undoState = JSON.parse(JSON.stringify(uState));

  var prevMeta = uState.meta.slice();
  uState = uApplyMove(uState, boardIdx, cellIdx);
  SFX[uState.xIsNext ? 'O' : 'X'](); // marker just placed is opposite of xIsNext now
  HAP.place();
  tutorialOnMove();

  // Check if a mini-board was just won
  var justWonBoard = uState.meta.findIndex(function(v,i){ return v && !prevMeta[i]; });
  if (justWonBoard !== -1 && uState.meta[justWonBoard] !== 'draw') {
    speak(pickArr([
      'Mini-board captured! The meta-game shifts!',
      'Board ' + (justWonBoard+1) + ' is claimed! Strategy intensifies!',
      'A mini-board falls! Watch the bigger picture...',
      'Captured! Now where will they be sent next?'
    ]));
  }

  if (uState.result) {
    uHandleResult();
    return;
  }

  uRender();

  if (!uState.result && uState.mode === 'ai' && !uState.xIsNext) {
    uState.aiThinking = true;
    uRender();
    _uAiTimeout = setTimeout(uDoAIMove, 1100);
  } else if (!uState.result && uState.mode === '2p') {
    speak(pickArr([
      'Sent to board ' + (uState.activeBoard === -1 ? 'of their choice' : (uState.activeBoard+1)) + '!',
      'The board shifts! Think carefully...',
      'Next move must go to ' + (uState.activeBoard === -1 ? 'any open board' : 'board ' + (uState.activeBoard+1)) + '!',
      'Watch the whole grid — not just one board!'
    ]));
  }
}

function uDoAIMove() {
  if (!uState) return;
  if (uState.result) return;  // don't move if game already won
  var move = uGetAIMove(uState);
  if (!move) return;
  var prevMeta = uState.meta.slice();
  uState = uApplyMove(uState, move.board, move.cell);
  SFX.O();
  var justWonBoard = uState.meta.findIndex(function(v,i){ return v && !prevMeta[i]; });
  if (justWonBoard !== -1 && uState.meta[justWonBoard] !== 'draw') {
    speak(pickArr(['I claimed a board! The meta-battle continues!', 'Boop! Board secured! Now where to next?', 'Mini-board mine! Mwahaha! 😈']));
  } else {
    speak(pick('Omove'));
  }
  if (uState.result) { uHandleResult(); return; }
  uRender();
}

function uHandleResult() {
  var r = uState.result;
  // Draw animated win line across the three winning meta-boards (not on draws)
  if (r.line && r.line.length === 3) {
    setTimeout(function(){ if(window.drawUWinLine) window.drawUWinLine(r.line, r.winner); }, 80);
  }
  if (r.winner === 'X') {
    uState.scoresX = (uState.scoresX || 0) + 1;

    setState({ winStreakX: streak, winStreakP2: 0, lossStreak: 0 });
    var isStreakWin = streak >= 3;
    if (isStreakWin) SFX.streakFanfare(); else SFX.fanfare();
    HAP.win();
    launchVictoryCelebration(isStreakWin);
    setTimeout(function(){ uState.showCup = true; uRender(); }, 750);
    var msg;
    if (streak === 3) {
      msg = pick('streakX').replace('%s', streak);
    } else {
      msg = pickArr(['YOU WON ULTIMATE! Absolute genius! 🏆', 'ULTIMATE VICTORY! The whole grid is yours!', 'YOU DID IT! Ultimate champion!', 'Incredible — the entire meta-board conquered!']);
    }
    speak(msg, true);
  } else if (r.winner === 'O') {
    uState.scoresO = (uState.scoresO || 0) + 1;
    if (uState.mode === '2p') {
      var streakP2 = (state.winStreakP2 || 0) + 1;
      setState({ winStreakX: 0, winStreakP2: streakP2, lossStreak: 0 });
      var isStreakWinP2 = streakP2 >= 3;
      if (isStreakWinP2) SFX.streakFanfare(); else SFX.fanfare();
      HAP.win();
      launchVictoryCelebration(isStreakWinP2);
      setTimeout(function(){ uState.showCup = true; uRender(); }, 750);
      var msgP2;
      if (streakP2 === 3) {
        msgP2 = pickArr([
          playerNames.O + ' is on a ' + streakP2 + '-win streak! Unstoppable! 🔥',
          streakP2 + ' in a row for ' + playerNames.O + '! What a run!',
          playerNames.O + ' is dominating — ' + streakP2 + ' consecutive wins!'
        ]);
      } else {
        msgP2 = pickArr(['Ultimate victory for ' + playerNames.O + '! What a game!', 'The meta-board belongs to ' + playerNames.O + '! Well played!', playerNames.O + ' conquers Ultimate! Rematch?']);
      }
      speak(msgP2, true);
    } else {
      var newLossStreak = (state.lossStreak || 0) + 1;
      setState({ winStreakX: 0, winStreakP2: 0, lossStreak: newLossStreak });
      SFX.O();
      speak(pickArr(['Ultimate victory for Hearty! What a game!', 'The meta-board is mine! Well played though!', 'Hearty conquers Ultimate! Rematch?']), true);
    }
  } else {
    uState.scoresDraw = (uState.scoresDraw || 0) + 1;
    setState({ winStreakX: 0, winStreakP2: 0, lossStreak: 0 });
    SFX.draw();
    speak(pickArr(['An Ultimate Draw! Perfectly balanced!', 'The whole meta-board draws! Unbelievable!', 'Ultimate stalemate — you matched me perfectly!']), true);
  }
  uRender();
}

function uNewGame() {
  clearTimeout(_uAiTimeout);
  if(window.clearUWinLine) window.clearUWinLine();
  var prevScores = uState ? {scoresX: uState.scoresX||0, scoresDraw: uState.scoresDraw||0, scoresO: uState.scoresO||0} : {scoresX:0, scoresDraw:0, scoresO:0};
  uState = uInitState();
  uState.mode = state.mode;      // inherit current mode (ai / 2p)
  uState.difficulty = state.difficulty;
  uState.scoresX = prevScores.scoresX;
  uState.scoresDraw = prevScores.scoresDraw;
  uState.scoresO = prevScores.scoresO;
  state.bubbleLockedUntil = 0; // reset any stale lock before speaking
  speak(pickArr([
    'Ultimate Noughts & Crosses! Win three mini-boards in a row to win!',
    'The mega-game begins! Each move sends your opponent to a specific board!',
    'Ultimate mode! Think beyond the grid — think about the META-grid! 🧠',
    'Nine boards, one winner! Your move sends them to the matching board!'
  ]), true); // force=true — always show intro even if locked from previous mode
  state.bubbleLockedUntil = Date.now() + 10000;
  uRender();
  // If AI mode and O (Hearty) goes first, kick off the AI move
  if (uState.mode === 'ai' && !uState.xIsNext) {
    uState.aiThinking = true;
    uRender();
    _uAiTimeout = setTimeout(uDoAIMove, 1200);
  }
}

function uUndoMove() {
  if (!uState || !uState._undoState || uState.result || uState.aiThinking) return;
  uState = JSON.parse(JSON.stringify(uState._undoState));
  uState._undoState = null;
  SFX.undo();
  HAP.undo();
  speak(pickArr(["Undo in Ultimate — brave!", "Taking that back! The meta-game resets!", "Rewinding the mega-move!"]));

// ════════════════════════════════════════════════════════════════════════════
// MISÈRE (REVERSE) — game logic
// Same board as Classic but the player who completes three in a row LOSES.
// Their opponent wins. Draws are still draws.
// mState is null when not in Misère mode.
// ════════════════════════════════════════════════════════════════════════════

var mState = null;
var _mAiTimeout = null;

function mInitState() {
  return {
    board: Array(9).fill(null),
    xIsNext: (Math.random() < 0.5),
    result: null,       // null | {winner:'X'|'O'|'draw', line:[]}
    mode: 'ai',
    difficulty: 'easy',
    aiThinking: false,
    undoSnapshot: null, // single undo
    scoresX: 0, scoresDraw: 0, scoresO: 0,
  };
}

// In Misère: whoever completes a line LOSES — so their OPPONENT wins.
// A full board with no line is still a draw.
function mCheckResult(board) {
  var r = checkWinner(board);
  if (!r) return null;
  if (r.winner === 'draw') return { winner: 'draw', line: [] };
  // The player who just completed the line loses — invert winner
  var loser = r.winner;
  return { winner: loser === 'X' ? 'O' : 'X', line: r.line };
}

// Misère minimax — score is from O's perspective as normal minimax,
// but winning lines are bad for the player who makes them.
// We achieve this by swapping the sign: completing a line = score of -10
// for the player who did it (they lose in Misère).
function mMinimax(b, isMax, alpha, beta, depth) {
  // Check for a completed line (the completer loses)
  var raw = checkWinner(b);
  if (raw) {
    if (raw.winner === 'draw') return 0;
    // raw.winner is whoever completed the line — they LOSE
    // isMax = O's turn just ended (O maximises), isMin = X's turn just ended
    // If raw.winner === 'O' (O just made a line) → O loses → score is negative for O
    if (raw.winner === 'O') return depth - 10;  // O lost (bad for maximiser)
    if (raw.winner === 'X') return 10 - depth;  // X lost (good for maximiser = O)
  }
  if (isMax) {
    var best = -Infinity;
    for (var i = 0; i < 9; i++) {
      if (b[i]) continue;
      b[i] = 'O';
      best = Math.max(best, mMinimax(b, false, alpha, beta, depth + 1));
      b[i] = null;
      alpha = Math.max(alpha, best);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    var best2 = Infinity;
    for (var j = 0; j < 9; j++) {
      if (b[j]) continue;
      b[j] = 'X';
      best2 = Math.min(best2, mMinimax(b, true, alpha, beta, depth + 1));
      b[j] = null;
      beta = Math.min(beta, best2);
      if (beta <= alpha) break;
    }
    return best2;
  }
}

function mGetBestMove(board, diff) {
  var empty = board.map(function(v,i){ return !v ? i : null; }).filter(function(i){ return i !== null; });
  if (!empty.length) return null;
  if (diff === 'easy' && Math.random() < 0.7) return empty[Math.floor(Math.random() * empty.length)];
  if (diff === 'medium' && Math.random() < 0.35) return empty[Math.floor(Math.random() * empty.length)];
  var best = -Infinity, move = null;
  for (var k = 0; k < empty.length; k++) {
    var i = empty[k];
    var b = board.slice();
    b[i] = 'O';
    var s = mMinimax(b, false, -Infinity, Infinity, 0);
    if (s > best) { best = s; move = i; }
  }
  return move;
}

// ── Misère render ────────────────────────────────────────────────────────────
function mRender() {
  if (!mState) return;
  var ms = mState;
  var grid = document.getElementById('mGrid');
  if (!grid) return;

  // Rebuild cells
  var res = ms.result;
  var html = '';
  for (var i = 0; i < 9; i++) {
    var val = ms.board[i];
    var isWin = res && res.line && res.line.indexOf(i) !== -1;
    var isDisabled = !!res || ms.aiThinking ||
                     (ms.mode === 'ai' && !ms.xIsNext);
    var cls = 'cell' +
              (val ? ' filled' : '') +
              (isDisabled ? ' disabled' : '') +
              (isWin ? ' win-cell' : '');
    var inner = '';
    if (val === 'X') inner = '<svg viewBox="0 0 44 44" class="cell-x-svg"><line x1="8" y1="8" x2="36" y2="36" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" style="stroke-dasharray:40;stroke-dashoffset:40;animation:drawLine 0.25s ease-out forwards"/><line x1="36" y1="8" x2="8" y2="36" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" style="stroke-dasharray:40;stroke-dashoffset:40;animation:drawLine 0.25s ease-out 0.06s forwards"/></svg>';
    else if (val === 'O') inner = '<svg viewBox="0 0 44 44" class="cell-o-svg"><circle cx="22" cy="22" r="14" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" style="stroke-dasharray:88;stroke-dashoffset:88;animation:drawCircle 0.3s ease-out forwards"/></svg>';
    var onclick = (!val && !isDisabled) ? ' onclick="mHandleClick(' + i + ')"' : '';
    html += '<button id="mcell-' + i + '" class="' + cls + '"' + onclick + '>' +
            '<div class="cell-inner">' + inner + '</div></button>';
  }
  grid.innerHTML = html;
  // Restore o-turn class on grid
  if (!ms.xIsNext && ms.mode === '2p') grid.classList.add('o-turn');
  else grid.classList.remove('o-turn');

  // Shared status bar
  var statusStr;
  if (res) {
    if (res.winner === 'draw') statusStr = "It's a Draw!";
    else if (res.winner === 'X') statusStr = playerNames.X + ' wins Misère!';
    else statusStr = ms.mode === '2p' ? playerNames.O + ' wins Misère!' : 'You win! Hearty trapped itself! 😅';
  } else if (ms.aiThinking) {
    statusStr = 'Hearty is thinking...';
  } else {
    var turnName = ms.xIsNext ? playerNames.X : (ms.mode === '2p' ? playerNames.O : 'Hearty');
    statusStr = turnName + (ms.xIsNext ? ' (X)' : ' (O)') + "'s turn";
  }
  if (dom.statusText) {
    dom.statusText.textContent = statusStr;
    dom.statusText.className = 'status-text' +
      ((res && res.winner === 'X') ? ' win-x' : (res && res.winner === 'O') ? ' win-o' : '');
  }
  if (dom.statusBar) dom.statusBar.className = 'status-bar' + (res ? ' result' : '');

  // Scores
  if (dom.scoreXVal) dom.scoreXVal.textContent = ms.scoresX || 0;
  if (dom.scoreDrawVal) dom.scoreDrawVal.textContent = ms.scoresDraw || 0;
  if (dom.scoreOVal) dom.scoreOVal.textContent = ms.scoresO || 0;
  if (dom.scoreXLbl) dom.scoreXLbl.textContent = playerNames.X + ' (X)';
  if (dom.scoreOLbl) dom.scoreOLbl.textContent = ms.mode === '2p' ? playerNames.O + ' (O)' : 'Hearty (O)';

  // Bubble — show thinking dots when AI is active
  if (dom.bubbleContent && !_tutorialActive) {
    if (ms.aiThinking) {
      dom.bubbleContent.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
      dom.bubble.className = 'speech-bubble visible';
    } else {
      dom.bubbleContent.innerHTML = '<p>' + state.bubbleText + '</p>';
      dom.bubble.className = 'speech-bubble ' + (state.bubbleVisible ? 'visible' : 'hidden');
    }
  }

  // Hearty
  if (dom.heartyWrap) {
    var mKey = (ms.showCup?'1':'0') + '|' + (ms.aiThinking ? '1' : '0') + '|' + ms.difficulty + '|' + (ms.mode === '2p' ? '1' : '0') + '|' + (typeof _currentTheme!=='undefined'?_currentTheme:'default') + '|' + (ms.aiThinking?'t':'f') + '|' + (_tutorialActive?'T':'F');
    if (dom.heartyWrap._heartyKey !== mKey) {
      dom.heartyWrap._heartyKey = mKey;
      dom.heartyWrap.innerHTML = heartySVG(!!ms.showCup, ms.difficulty, ms.mode === '2p', ms.aiThinking, _tutorialActive);
    }
    var mHClass = 'hearty-svg-wrap ' + (ms.aiThinking ? 'wiggling' : 'breathing');
    if (dom.heartyWrap.className !== mHClass) dom.heartyWrap.className = mHClass;
  }

  // Buttons
  var undoBtn = document.getElementById('mUndoBtn');
  if (undoBtn) undoBtn.disabled = !ms.undoSnapshot || !!res || ms.aiThinking;
  var rematchBtn = document.getElementById('mRematchBtn');
  if (rematchBtn) rematchBtn.style.display = res ? 'inline-block' : 'none';
}

// ── Misère click ─────────────────────────────────────────────────────────────
function mHandleClick(idx) {
  if (!mState) return;
  if (mState.result) return;
  if (mState.aiThinking) return;
  if (mState.mode === 'ai' && !mState.xIsNext) return;
  if (mState.board[idx]) return;

  mState.undoSnapshot = { board: mState.board.slice(), xIsNext: mState.xIsNext };

  var b = mState.board.slice();
  var marker = mState.xIsNext ? 'X' : 'O';
  b[idx] = marker;
  mState.board = b;
  mState.xIsNext = !mState.xIsNext;
  SFX[marker]();
  HAP.place();
  tutorialOnMove();

  var r = mCheckResult(b);
  if (r) {
    mState.result = r;
    mHandleResult();
    return;
  }

  if (mState.mode === '2p') {
    speak(pickArr([
      'Careful — three in a row and you LOSE!',
      'Remember: avoid the line!',
      'Force your opponent into the trap!',
      'The goal is to NOT win — tricky!',
    ]));
  }
  mRender();

  if (!mState.result && mState.mode === 'ai' && !mState.xIsNext) {
    mState.aiThinking = true;
    mRender();
    _mAiTimeout = setTimeout(mDoAIMove, 1100);
  }
}

function mDoAIMove() {
  if (!mState || mState.result) return;
  var move = mGetBestMove(mState.board, mState.difficulty);
  if (move === null) return;
  mState.undoSnapshot = { board: mState.board.slice(), xIsNext: mState.xIsNext };
  var b = mState.board.slice();
  b[move] = 'O';
  mState.board = b;
  mState.xIsNext = true;
  mState.aiThinking = false;
  SFX.O();
  var r = mCheckResult(b);
  if (r) {
    mState.result = r;
    mHandleResult();
    return;
  }
  speak(pickArr([
    "Sneaky! I avoided that trap!",
    "Boop — but I won't complete a line!",
    "I'm trying NOT to win... this is hard!",
    "In Misère I lose if I get three in a row!",
  ]));
  mRender();
}

function mHandleResult() {
  var r = mState.result;
  if (r.winner === 'draw') {
    mState.scoresDraw = (mState.scoresDraw || 0) + 1;
    setState({ winStreakX: 0, winStreakP2: 0, lossStreak: 0 });
    SFX.draw();
    speak(pickArr([
      'A draw! Neither of you fell for it!',
      'Perfect Misère — nobody completed a line!',
      'Incredible defensive play from both sides!',
    ]), true);
  } else if (r.winner === 'X') {
    mState.scoresX = (mState.scoresX || 0) + 1;
    var streak = (state.winStreakX || 0) + 1;
    setState({ winStreakX: streak, winStreakP2: 0, lossStreak: 0 });
    var isStreakWin = streak >= 3;
    if (isStreakWin) SFX.streakFanfare(); else SFX.fanfare();
    HAP.win();
    launchVictoryCelebration(isStreakWin);
    setTimeout(function(){ mState.showCup = true; mRender(); }, 750);
    var msg;
    if (streak === 3) {
      msg = pick('streakX').replace('%s', streak);
    } else {
      msg = pickArr([
        playerNames.X + ' wins! You forced the line!',
        'Brilliant Misère play — ' + playerNames.X + ' wins!',
        'You made Hearty trap itself! Well played!',
        playerNames.X + ' is the Misère master!',
      ]);
    }
    speak(msg, true);
  } else {
    mState.scoresO = (mState.scoresO || 0) + 1;
    if (mState.mode === '2p') {
      var streakP2 = (state.winStreakP2 || 0) + 1;
      setState({ winStreakX: 0, winStreakP2: streakP2, lossStreak: 0 });
      var isStreakWinP2 = streakP2 >= 3;
      if (isStreakWinP2) SFX.streakFanfare(); else SFX.fanfare();
      HAP.win();
      launchVictoryCelebration(isStreakWinP2);
      setTimeout(function(){ mState.showCup = true; mRender(); }, 750);
      var msgP2;
      if (streakP2 === 3) {
        msgP2 = pickArr([
          playerNames.O + ' is on a ' + streakP2 + '-win streak! Unstoppable! 🔥',
          streakP2 + ' in a row for ' + playerNames.O + '! What a run!',
          playerNames.O + ' is dominating — ' + streakP2 + ' consecutive wins!'
        ]);
      } else {
        msgP2 = pickArr([
          playerNames.O + ' wins Misère!',
          playerNames.O + ' forced the win! Nicely done!',
          'Brilliant Misère play from ' + playerNames.O + '!',
        ]);
      }
      speak(msgP2, true);
    } else {
      var newLossStreak = (state.lossStreak || 0) + 1;
      setState({ winStreakX: 0, winStreakP2: 0, lossStreak: newLossStreak });
      SFX.O();
      speak(pickArr([
        'Hearty wins Misère! You completed a line!',
        'Caught in your own trap! Better luck next time!',
        'Hearty forced you into a line — clever!',
      ]), true);
    }
  }
  mRender();
}

function mNewGame() {
  clearTimeout(_mAiTimeout);
  var prev = mState ? { scoresX: mState.scoresX||0, scoresDraw: mState.scoresDraw||0, scoresO: mState.scoresO||0 } : { scoresX:0, scoresDraw:0, scoresO:0 };
  mState = mInitState();
  mState.mode = state.mode;
  mState.difficulty = state.difficulty;
  mState.scoresX = prev.scoresX;
  mState.scoresDraw = prev.scoresDraw;
  mState.scoresO = prev.scoresO;
  state.bubbleLockedUntil = 0; // reset any stale lock before speaking
  speak(pickArr([
    'Misère mode! Get three in a row and you LOSE! 😈',
    'Reverse rules! Avoid the line — force your opponent into it!',
    'Misère Noughts & Crosses — the loser makes a line!',
    'Think backwards! Three in a row is BAD!',
  ]), true); // force=true — always show intro
  state.bubbleLockedUntil = Date.now() + 10000;
  mRender();
  // If AI mode and O (Hearty) goes first, kick off the AI move
  if (mState.mode === 'ai' && !mState.xIsNext) {
    mState.aiThinking = true;
    mRender();
    _mAiTimeout = setTimeout(mDoAIMove, 1200);
  }
}

function mUndoMove() {
  if (!mState || !mState.undoSnapshot || mState.result || mState.aiThinking) return;
  mState.board = mState.undoSnapshot.board;
  mState.xIsNext = mState.undoSnapshot.xIsNext;
  mState.undoSnapshot = null;
  SFX.undo();
  HAP.undo();
  speak(pickArr(["Undo! Rethinking your trap...", "Taking that back in Misère!", "Rewinding — avoid that line!"]));
  mRender();
}

function mToggleMode() {
  _stopTutorialIfActive();
  var isMisere = !!mState;
  if (isMisere) {
    mState = null;
    clearTimeout(_mAiTimeout);
    clearWinLine(); if(window.clearWinLine) window.clearWinLine();
    document.getElementById('mContainer').style.display = 'none';
    document.getElementById('classicContainer').style.display = 'flex';
    state.bubbleLockedUntil = 0; // clear intro lock so classic speaks freely
    speak(pickArr(['Back to Classic — winning is good again!', 'Normal rules restored!', 'Classic Noughts & Crosses — welcome back!']), true);
    render();
  } else {
    // Exit Ultimate if active
    blitzStop(); blitzHideUI(); _blitzMode = false;
    if (uState) {
      if(window.clearUWinLine) window.clearUWinLine();
      uState = null;
      clearTimeout(_uAiTimeout);
      document.getElementById('uContainer').style.display = 'none';
    }
    blitzStop(); blitzHideUI(); _blitzMode = false;
    // Reset classic scores/streaks when entering Misère
    setState({scores:{X:0,O_Human:0,O_Hearty:0,draw:0}, winStreakX:0, winStreakP2:0, lossStreak:0,
      board:Array(9).fill(null), result:null, showCup:false, undoStack:[]});
    document.getElementById('classicContainer').style.display = 'none';
    document.getElementById('mContainer').style.display = 'flex';
    mNewGame();
  }
}

// ── Player names ──
let playerNames = { X: 'Player 1', O: 'Player 2', Hearty: 'Hearty' };

function pName(marker){ return marker === 'X' ? playerNames.X : (state && state.mode === 'ai' ? playerNames.Hearty : playerNames.O); }

// ── Contextual 2-player commentary ──
function getTwoPlayerComment(board, lastMarker, lastIdx) {
  const other = lastMarker === 'X' ? 'O' : 'X';
  const playerName = pName(lastMarker);
  const otherName  = pName(other);
  const filled = board.filter(Boolean).length;

  function findThreats(marker) {
    const threats = [];
    for (const line of WIN_LINES) {
      const marks = line.filter(i => board[i] === marker);
      const empties = line.filter(i => !board[i]);
      if (marks.length === 2 && empties.length === 1) threats.push(empties[0]);
    }
    return threats;
  }
  function wasABlock() {
    const temp = [...board]; temp[lastIdx] = null;
    const opponentThreats = findThreats(other);
    return opponentThreats.includes(lastIdx);
  }
  function createdFork() { return findThreats(lastMarker).length >= 2; }

  const myThreats  = findThreats(lastMarker);
  const oppThreats = findThreats(other);
  const blocked    = wasABlock();
  const fork       = createdFork();
  const tookCenter = lastIdx === 4;
  const tookCorner = [0,2,6,8].includes(lastIdx);

  if (myThreats.length >= 2) return pickArr([
    `Whoa — ${playerName} just set up TWO winning paths! ${otherName}, you can't block both! 😱`,
    `A FORK! ${playerName} is sneaky — two threats at once! ${otherName} is in big trouble!`,
    `${playerName} laid a trap — double threat! ${otherName} better think fast!`,
    `Uh oh! ${playerName} has a fork! There's no stopping them now! 🍴`
  ]);
  if (myThreats.length === 1 && filled >= 4) return pickArr([
    `${playerName} is one move away from winning! Can ${otherName} block in time?! 😬`,
    `Watch out ${otherName}! ${playerName} is threatening to win right now!`,
    `${playerName} has a winning line open — ${otherName}, don't miss that block!`,
    `One more move and ${playerName} wins! This is so tense! 🫣`
  ]);
  if (blocked && oppThreats.length === 0) return pickArr([
    `Nice block, ${playerName}! ${otherName} thought they had you there!`,
    `Phew! ${playerName} shut that down just in time! Great defence! 🛡️`,
    `${playerName} saw the danger and plugged it! Very sharp!`,
    `Blocked! ${playerName} is reading ${otherName}'s plans like a book! 📖`
  ]);
  if (fork) return pickArr([
    `${playerName} is setting up something sneaky! I see what you're doing! 😏`,
    `Ooh, ${playerName} is thinking two steps ahead! Very devious!`,
    `Clever positioning from ${playerName}! That could open up multiple routes...`
  ]);
  if (tookCenter && filled === 1) return pickArr([
    `Center square first! Classic power move from ${playerName}! The textbook opening! 📚`,
    `${playerName} grabs the center — always the hot seat! Smart start!`,
    `Oh, the center! ${playerName} knows their Noughts & Crosses theory!`
  ]);
  if (tookCorner && filled <= 3) return pickArr([
    `A corner play! ${playerName} is thinking strategically already!`,
    `Corners are powerful — ${playerName} knows the game! 💪`,
    `${playerName} taking corners early — that's solid fundamentals!`
  ]);
  if (oppThreats.length >= 2) return pickArr([
    `${otherName} is setting up forks left and right! ${playerName}, be very careful now!`,
    `Careful ${playerName}! ${otherName} has TWO threats brewing! 😬`,
    `${otherName} is playing a trap game! ${playerName} needs to start defending!`
  ]);
  if (filled === 2) return pickArr([
    `Only two moves in and it's already getting interesting! 👀`,
    `The opening moves have been made — now the real battle begins!`,
    `We're just getting started! May the best player win!`,
    `Two down, seven to go — anything could happen!`
  ]);
  if (filled >= 6) return pickArr([
    `We're in the endgame now! Every square counts! 💥`,
    `The board is filling up fast — this is where it gets real!`,
    `Not many moves left! The pressure is on! 😅`,
    `It's crunch time! One slip could change everything!`
  ]);
  return pickArr([

    `${playerName} is staking their claim on the grid! 🗺️`,

// ── State ──
let state = {

  scores: { X:0, O_Human:0, O_Hearty:0, draw:0 },
  mode: 'ai', difficulty: 'easy',
  bubbleText: pick('welcome'), bubbleVisible: true,
  heartyAnim: 'breathing', aiThinking: false, showCup: false,
  lastBubbleTime: Date.now(), winStreakX: 0, winStreakP2: 0,
  lossStreak: 0,         // how many times in a row Hearty has beaten the player (ai mode)
  // New state
  seriesMode: 'none',    // 'none' | 'bo3' | 'bo5'
  seriesX: 0, seriesO: 0, seriesD: 0,
  watchMode: false,      // removed — Watch mode eliminated
  undoStack: [],         // [{board, xIsNext}]
  darkMode: false,
  bubbleLockedUntil: 0,  // timestamp — speech bubble locked after trophy/streak/Hearty win

function setState(patch){ Object.assign(state, patch); render(); }

function render(){
  const s = state;

  // mode + diff buttons — include series
  const modeButtons = [
    `<button class="btn-pill ${s.mode==='ai'&&!uState&&!mState?'active-mode':'inactive-mode'}" onclick="if(uState)uToggleMode();if(mState)mToggleMode();switchMode('ai')">vs Hearty</button>`,
    `<button class="btn-pill ${s.mode==='2p'&&!uState&&!mState?'active-mode':'inactive-mode'}" onclick="if(uState)uToggleMode();if(mState)mToggleMode();switchMode('2p')">2 Players</button>`
  ].join('');
  const diffButtons = s.mode==='ai'
    ? ['easy','medium','hard'].map(d=>`<button class="btn-pill ${s.difficulty===d?'active-diff':'inactive-diff'}" onclick="setDiff('${d}')">${d[0].toUpperCase()+d.slice(1)}</button>`).join('')
    : '';
  const seriesButtons = ['none','bo3','bo5'].map(m=>`<button class="btn-pill ${!uState&&!mState&&!_blitzMode&&s.seriesMode===m?'active-series':'inactive-series'}" onclick="setSeriesMode('${m}')">${m==='none'?'Free Play':m==='bo3'?'Best of 3':'Best of 5'}</button>`).join('') + `<button class="btn-pill ${_blitzMode?'active-mode':'inactive-mode'}" onclick="blitzToggle()">⚡ Blitz</button>`;
  var controlsHTML = modeButtons + (diffButtons ? '<span style="margin:0 2px;color:var(--card-border)">|</span>' + diffButtons : '') + '<br style="width:100%"/>' + seriesButtons;
  if(dom.controls.innerHTML !== controlsHTML) dom.controls.innerHTML = controlsHTML;

  // Scores
  const currentOScore = s.mode==='2p' ? s.scores.O_Human : s.scores.O_Hearty;
  dom.scoreXVal.textContent = s.scores.X;
  dom.scoreXLbl.textContent = s.mode==='2p' ? `${playerNames.X} (X)` : `${playerNames.X} (X)`;
  dom.scoreDrawVal.textContent = s.scores.draw;
  dom.scoreOVal.textContent = currentOScore;
  dom.scoreOLbl.textContent = s.mode==='2p' ? `${playerNames.O} (O)` : 'Hearty (O)';

  // O-turn indicator
  if(!s.xIsNext && s.mode==='2p') dom.grid.classList.add('o-turn');
  else dom.grid.classList.remove('o-turn');

  // Status text
  const res = s.result;
  let statusStr;
  if(res){
    if(res.winner==='draw') statusStr = "It's a Draw!";
    else if(res.winner==='X') statusStr = `${playerNames.X} wins!`;
    else statusStr = s.mode==='2p' ? `${playerNames.O} wins!` : 'Hearty wins!';
  } else if(s.aiThinking){
    statusStr = 'Hearty is thinking...';
  } else {
    statusStr = `${s.xIsNext ? (s.mode==='2p'?`${playerNames.X} (X)`:'Your') : (s.mode==='2p'?`${playerNames.O} (O)`:"Hearty's")} turn`;
  }
  dom.statusText.textContent = statusStr;
  dom.statusText.className = 'status-text' + ((res&&res.winner==='X')?' win-x':(res&&res.winner==='O')?' win-o':'');
  dom.statusBar.className = 'status-bar' + (res?' result':'');

  // Board cells
  s.board.forEach((val, idx) => {
    const cell = dom.cells[idx];
    const isWin = res && res.line && res.line.indexOf(idx) !== -1;
    const isDisabled = !!res || s.aiThinking || (s.mode==='ai'&&!s.xIsNext);
    cell.className = `cell${isWin?' win-cell':''}${!!val?' filled':''}${isDisabled?' disabled':''}`;
    const prevVal = cell.dataset.val || '';
    if(val !== prevVal){
      cell.dataset.val = val||'';
      let inner = '';
      if(val==='X') inner=`<svg viewBox="0 0 44 44" class="cell-x-svg"><line x1="8" y1="8" x2="36" y2="36" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" style="stroke-dasharray:40;stroke-dashoffset:40;animation:drawLine 0.25s ease-out forwards"/><line x1="36" y1="8" x2="8" y2="36" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" style="stroke-dasharray:40;stroke-dashoffset:40;animation:drawLine 0.25s ease-out 0.06s forwards"/></svg>`;
      else if(val==='O') inner=`<svg viewBox="0 0 44 44" class="cell-o-svg"><circle cx="22" cy="22" r="14" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" style="stroke-dasharray:88;stroke-dashoffset:88;animation:drawCircle 0.3s ease-out forwards"/></svg>`;
      cell.innerHTML=`<div class="cell-inner">${inner}</div>`;
    }
  });

  // Bubble — skip during tutorial (tutorial owns the bubble content)

// ── speak ──
// force=true bypasses the bubble lock (used for win/streak/Hearty-win messages)
function speak(text, force, tier){
  if(!force && Date.now() < state.bubbleLockedUntil) return;
  // During tutorial, only _speakTutorial() (which sets force=false and uses
  // direct DOM writes) controls the bubble. Block all other speak() calls.
  if(_tutorialActive && !force) return;

  // Manipulate bubble and Hearty animation directly — no setState/render.
  // Going through setState triggers a full render() which repaints the
  // entire score panel, causing Hearty's drop-shadow filter to flicker.
  state.bubbleText    = text;
  state.bubbleVisible = false;
  state.lastBubbleTime = Date.now();

  // Hide bubble immediately, without touching Hearty
  dom.bubble.className = 'speech-bubble hidden';

  clearTimeout(speakAnimTimeout);

  setTimeout(function(){
    state.bubbleText    = text;
    state.bubbleVisible = true;
    state.heartyAnim    = 'speaking';

    // Update bubble content and show
    dom.bubbleContent.innerHTML = '<p>' + text + '</p>';
    var animClass = (tier==='cheer') ? 'cheer' : (tier==='encourage') ? 'encourage' : 'visible';
    dom.bubble.className = 'speech-bubble ' + animClass;

    // Switch Hearty animation class directly — no render(), no DOM rebuild
    var heartyClass = 'hearty-svg-wrap speaking';
    if(dom.heartyWrap.className !== heartyClass) dom.heartyWrap.className = heartyClass;

    SFX.hearty();

    speakAnimTimeout = setTimeout(function(){
      state.heartyAnim = 'breathing';
      var breathClass = 'hearty-svg-wrap breathing';
      if(dom.heartyWrap.className !== breathClass) dom.heartyWrap.className = breathClass;
    }, 750);
  }, 80); // reduced from 300ms — snappier feel, less dead time
}

// ── Win-line overlay ──────────────────────────────────────────────────────
// Maps WIN_LINES indices to SVG coordinate pairs inside the board-wrap (310px)
// Padding=14, cell≈87.33px, gap=10px  → cell_centre = 14 + col*97.33 + 43.67
const _WIN_LINE_COORDS = (function(){
  function centre(idx){
    const col = idx % 3, row = Math.floor(idx / 3);
    const c = 14 + col * 97.33 + 43.67;
    const r = 14 + row * 97.33 + 43.67;
    return [c, r];
  }
  return WIN_LINES.map(line => {
    const a = centre(line[0]), b = centre(line[line.length-1]);
    // extend 14px beyond the outer cell centres for a more dramatic line
    const dx = b[0]-a[0], dy = b[1]-a[1];
    const len = Math.sqrt(dx*dx+dy*dy);
    const ext = 22 / len;
    return {
      x1: a[0]-dx*ext, y1: a[1]-dy*ext,
      x2: b[0]+dx*ext, y2: b[1]+dy*ext,
      len: Math.round(len + ext*2*len)
    };
  });
})();

function drawWinLine(lineIdx, winner) {
  const el = document.getElementById('winLineOverlay');
  if (!el) return;
  // Find which WIN_LINES entry matches
  const match = WIN_LINES.findIndex(l => l.join() === lineIdx.join());
  if (match < 0) { el.innerHTML = ''; return; }
  const c = _WIN_LINE_COORDS[match];
  const len = Math.round(Math.sqrt((c.x2-c.x1)**2 + (c.y2-c.y1)**2));
  el.innerHTML = `<svg viewBox="0 0 310 310" preserveAspectRatio="xMidYMid meet">
    <line class="win-line-path" x1="${c.x1.toFixed(1)}" y1="${c.y1.toFixed(1)}"
      x2="${c.x2.toFixed(1)}" y2="${c.y2.toFixed(1)}"
      style="--win-line-len:${len}"/>
  </svg>`;
}

function clearWinLine() {
  const el = document.getElementById('winLineOverlay');
  if (el) el.innerHTML = '';
}

// ── FANFARE duration ──
const FANFARE_DURATION = 900;

// ── Handle result ──
function handleResult(r){
  blitzStop();
  blitzHideUI();
  setState({result:r});
  // Draw animated win line if there's a winning line (not a draw)
  if(r.line && r.line.length === 3){
    setTimeout(function(){ if(window.drawWinLine) window.drawWinLine(r.line, r.winner); }, 80);
  }
  if(r.line && r.line.length === 3) drawWinLine(r.line, r.winner);

  if(r.winner==='X'){
    const streak = state.winStreakX + 1;
    setState({scores:{...state.scores, X:state.scores.X+1}, winStreakX:streak, winStreakP2:0, lossStreak:0});
    const isStreakWin = streak >= 3;
    if(isStreakWin) SFX.streakFanfare(); else SFX.fanfare();
    HAP.win();
    setTimeout(()=>setState({showCup:true}), 750);
    setTimeout(()=>launchVictoryCelebration(isStreakWin), FANFARE_DURATION);
    setState({bubbleLockedUntil: Date.now() + 10000});
    setTimeout(()=>{
      let msg;
      if(streak === 3){
        msg = pick('streakX').replace('%s', streak);
      } else {
        msg = state.mode==='2p'
          ? pickArr([`Well played, ${playerNames.X}!`, `${playerNames.X} wins it! Brilliant!`, `Bravo ${playerNames.X}! The grid is yours!`])
          : pick('winX');
      }
      speak(msg, true);
    }, FANFARE_DURATION+100);

    // Series check
    if(state.seriesMode!=='none'){
      const target = state.seriesMode==='bo3'?2:3;
      const newSX = state.seriesX + 1;
      setState({seriesX: newSX});
      if(newSX >= target) setTimeout(()=>showMatchBanner('X'), 1800);
    }

  } else if(r.winner==='O'){
    if(state.mode==='ai'){
      const newLossStreak = (state.lossStreak || 0) + 1;
      setState({scores:{...state.scores, O_Hearty:state.scores.O_Hearty+1}, winStreakX:0, winStreakP2:0,
        lossStreak: newLossStreak, bubbleLockedUntil: Date.now() + 12000});
      SFX.O();
      // Pick message and animation tier based on how many times in a row the player has lost
      setTimeout(()=>{
        let msg, tier;
        if(newLossStreak >= 6){
          msg = pick('lossT4'); tier = 'cheer';
        } else if(newLossStreak >= 4){
          msg = pick('lossT3'); tier = 'cheer';
        } else if(newLossStreak >= 2){
          msg = pick('lossT2'); tier = 'encourage';
        } else {
          // First loss — gentle winO + tier1 encouragement combined
          msg = pick('winO') + ' ' + pick('lossT1'); tier = 'encourage';
        }
        speak(msg, true, tier);
      }, FANFARE_DURATION+100);
    } else {
      const streak = state.winStreakP2 + 1;
      setState({scores:{...state.scores, O_Human:state.scores.O_Human+1}, winStreakX:0, winStreakP2:streak});
      const isStreakWin = streak >= 3;
      if(isStreakWin) SFX.streakFanfare(); else SFX.fanfare();
      HAP.win();
      setTimeout(()=>setState({showCup:true}), 750);
      setTimeout(()=>launchVictoryCelebration(isStreakWin), FANFARE_DURATION);
      setState({bubbleLockedUntil: Date.now() + 10000});
      setTimeout(()=>{
        let msg;
        if(streak === 3){
          // First time hitting the streak threshold — announce it
          msg = pickArr([
            `${playerNames.O} is on a ${streak}-win streak! Unstoppable! 🔥`,
            `${streak} in a row for ${playerNames.O}! What a run!`,
            `${playerNames.O} is dominating — ${streak} consecutive wins!`
          ]);
        } else {
          // Normal win message whether below or above streak threshold
          msg = pickArr([`Well played, ${playerNames.O}!`, `${playerNames.O} wins! Brilliant!`, `Bravo ${playerNames.O}! The grid is yours!`]);
        }
        speak(msg, true);
      }, FANFARE_DURATION+100);

      // Series check
      if(state.seriesMode!=='none'){
        const target = state.seriesMode==='bo3'?2:3;
        const newSO = state.seriesO + 1;
        setState({seriesO: newSO});
        if(newSO >= target) setTimeout(()=>showMatchBanner('O'), 1800);
      }
    }
  } else {
    setState({scores:{...state.scores, draw:state.scores.draw+1}, winStreakX:0, winStreakP2:0, lossStreak:0});
    speak(pick('draw')); SFX.draw();
    if(state.seriesMode!=='none'){
      setState({seriesD: state.seriesD+1});
      // Check if series is exhausted (all games played, no winner yet) — e.g. bo3: after 3 games
      const target = state.seriesMode==='bo3'?2:3;
      const totalGames = state.seriesMode==='bo3'?3:5;
      const gamesPlayed = state.seriesX + state.seriesO + state.seriesD + 1;
      if(gamesPlayed >= totalGames && state.seriesX < target && state.seriesO < target){
        setTimeout(()=>showMatchBanner('draw'), 1800);
      }
    }
  }
}

// ── Haptic feedback ──
// Thin wrapper around the Vibration API. Silently no-ops on devices that
// don't support it (desktop, iOS Safari). All pattern durations in ms.
var HAP = (function() {
  var v = navigator.vibrate ? navigator.vibrate.bind(navigator) : function(){};
  return {
    tap:     function() { v(10); },          // light cell tap
    place:   function() { v(18); },          // marker placed
    win:     function() { v([40, 30, 80]); },// win fanfare pulse
    error:   function() { v([12, 8, 12]); }, // occupied-cell shake
    newGame: function() { v(22); },          // new-game / rematch
    undo:    function() { v([8, 6, 8]); }    // undo two-tap
  };
})();

// ── handleClick ──
function handleClick(idx){
  const cellEl = dom.cells[idx];
  // Immediately blur to prevent focus ring on mobile
  if(cellEl) cellEl.blur();
  if(state.board[idx] || state.result || (state.mode==='ai'&&!state.xIsNext)){
    if(cellEl && state.board[idx]){
      HAP.error();
      cellEl.classList.remove('shake-error');
      void cellEl.offsetWidth;
      cellEl.classList.add('shake-error');
      setTimeout(()=>cellEl.classList.remove('shake-error'), 400);
    }
    return;
  }
  // Push undo snapshot before placing
  const undoStack = [...state.undoStack, {board:[...state.board], xIsNext:state.xIsNext}];
  const b=[...state.board], marker=state.xIsNext?'X':'O';
  b[idx]=marker;
  setState({board:b, undoStack});
  SFX[marker]();
  HAP.place();
  if(window.notifyAmbientMove) window.notifyAmbientMove(idx);
  tutorialOnMove();
  const r=checkWinner(b);
  if(r){handleResult(r);return;}
  setState({xIsNext:!state.xIsNext});
  if(state.mode==='2p'){
    speak(getTwoPlayerComment(b, marker, idx));
    if(_blitzMode) blitzStart(); // restart timer for next player
  } else if(state.mode==='ai'){
    blitzStop(); // stop timer while AI thinks
    scheduleAI();
  }
}

// ── Undo ──
function undoMove(){
  if(state.undoStack.length===0||state.result||state.aiThinking) return;
  const stack = [...state.undoStack];
  const prev = stack.pop();
  dom.cells.forEach(c=>{ c.dataset.val=''; });
  setState({board:prev.board, xIsNext:prev.xIsNext, undoStack:stack, result:null, showCup:false});
  SFX.undo();
  HAP.undo();
  speak(pickArr([
    "Oops! Taking that back — fair enough! 😄",
    "Undo! Everyone deserves a second chance!",
    "Rewinding! This is why I love humans — always reconsidering! 🔄"
  ]));
}

// ── AI ──
function scheduleAI(){
  if(state.result||state.xIsNext) return;
  clearTimeout(aiTimeout);
  setState({aiThinking:true, heartyAnim:'wiggling'});
  aiTimeout=setTimeout(()=>{
    const b=[...state.board];
    const move=getBestMove(b, state.difficulty);
    if(move!=null){
      b[move]='O';
      setState({board:b, aiThinking:false, heartyAnim:'breathing'});
      SFX.O();
      const r=checkWinner(b);
      if(r){handleResult(r);return;}
      setState({xIsNext:true});
      speak(pick('Omove'));
      if(_blitzMode) blitzStart(); // restart timer for human's turn
    }
  }, 1200);
}

// ── newGame ──
function newGame(){
  clearTimeout(aiTimeout); clearTimeout(watchTimeout);
  clearWinLine();
  dom.cells.forEach(c=>{c.dataset.val='';});
  const firstX = Math.random() < 0.5;
  setState({board:Array(9).fill(null), xIsNext:firstX, result:null, aiThinking:false,
    heartyAnim:'breathing', showCup:false, lastBubbleTime:Date.now(), undoStack:[],
    bubbleLockedUntil:0});
  SFX.newGame();
  HAP.newGame();
  if(window.clearWinLine) window.clearWinLine();
  blitzStop();
  if (_blitzMode) {
    // Show Start button instead of auto-starting — player must press Start for each new game
    _blitzArmed = true;
    _blitzUpdateUI();
  }
  const goesFirst = firstX ? playerNames.X : (state.mode==='ai' ? 'Hearty' : playerNames.O);
  const greeting = state.mode==='2p'
    ? pickArr([`${playerNames.X} vs ${playerNames.O}! May the best player win!`, `Here we go! ${goesFirst} goes first!`, `New game! ${goesFirst} has the first move!`])
    : (firstX ? pick('welcome') : pickArr(['Hearty goes first this time! 😈', 'I\'ll start! Watch and learn! 😄', 'My turn to open! Let\'s go! 🤖']));
  speak(greeting);
  if(state.mode==='ai' && !firstX){
    setTimeout(scheduleAI, 800);
  }
}

// ── switchMode ──
function switchMode(m){
  _stopTutorialIfActive();
  clearTimeout(aiTimeout); clearTimeout(watchTimeout);
  blitzStop(); blitzHideUI(); _blitzMode = false;
  clearWinLine(); if(window.clearWinLine) window.clearWinLine();
  dom.cells.forEach(c=>{c.dataset.val='';});

    aiThinking:false, heartyAnim:'breathing', showCup:false,
    scores:{X:0, O_Human:0, O_Hearty:0, draw:0},
    winStreakX:0, winStreakP2:0, lossStreak:0, undoStack:[], seriesX:0, seriesO:0, seriesD:0,
    bubbleLockedUntil:0});

  if(m==='2p') showNameModal(false);

// ── Blitz Mode ────────────────────────────────────────────────────────────
// 10-second countdown per move. On timeout: a random legal cell is played
// automatically (fair for both human and AI — pressure applies to all).
// Blitz is a toggle; it can be combined with any series mode.
let _blitzMode  = false;
let _blitzArmed = false; // true when blitz is selected but waiting for player to press Start
let _blitzTimer = null;
let _blitzSec   = 10;
const BLITZ_SECS = 10;

function blitzToggle() {
  _stopTutorialIfActive();
  _blitzMode = !_blitzMode;
  _blitzArmed = false;
  // Reset board fully when toggling blitz mid-game
  clearWinLine(); if(window.clearWinLine) window.clearWinLine();
  dom.cells.forEach(c=>{c.dataset.val='';});
  setState({board:Array(9).fill(null), xIsNext:(Math.random()<0.5), result:null, aiThinking:false,
    showCup:false, undoStack:[], scores:{X:0,O_Human:0,O_Hearty:0,draw:0},
    winStreakX:0, winStreakP2:0, lossStreak:0, seriesMode:'none', seriesX:0, seriesO:0, seriesD:0,
    bubbleLockedUntil:0});
  blitzStop();
  if (_blitzMode) {
    _blitzArmed = true;
    state.bubbleLockedUntil = 0;
    speak(pick('blitzWelcome'), true);
    state.bubbleLockedUntil = Date.now() + 10000;
    render();
    renderSideMenu();
    _blitzUpdateUI(); // arm the Start button last, after all renders
  } else {

function blitzStart() {
  if (!_blitzMode || state.result) return;
  // Don't run timer during AI turn
  if (state.mode === 'ai' && !state.xIsNext) return;
  blitzStop();
  _blitzSec = BLITZ_SECS;
  _blitzUpdateUI();
  _blitzTimer = setInterval(_blitzTick, 1000);
}

function blitzStop() {
  clearInterval(_blitzTimer);
  _blitzTimer = null;
}

function blitzHideUI() {
  const row = document.getElementById('blitzTimerRow');
  if (row) row.classList.remove('active');
  const startRow = document.getElementById('blitzStartRow');
  if (startRow) startRow.classList.remove('active');
  _blitzArmed = false;
}

function _blitzUpdateUI() {
  const row  = document.getElementById('blitzTimerRow');
  const num  = document.getElementById('blitzNumber');
  const ring = document.getElementById('blitzRingFg');
  const ringWrap = document.getElementById('blitzRing');
  const numEl    = document.getElementById('blitzNumber');
  const startRow = document.getElementById('blitzStartRow');
  if (!row) return;
  // Show start button when armed (timer not yet running), timer when running
  if (_blitzArmed) {
    row.classList.remove('active');
    if (startRow) startRow.classList.add('active');
    return;
  }
  if (startRow) startRow.classList.remove('active');
  row.classList.add('active');
  const frac = _blitzSec / BLITZ_SECS;
  const dash = 113; // 2π×18
  const urgent = _blitzSec <= 3;
  if (num) { num.textContent = _blitzSec; num.className = 'blitz-number' + (urgent?' urgent':''); }
  if (ring) { ring.style.strokeDashoffset = dash * (1 - frac); ring.className = 'blitz-ring-fg' + (urgent?' urgent':''); }
  if (ringWrap) ringWrap.className = 'blitz-ring' + (urgent?' urgent-pulse':'');
}

function _blitzTick() {
  if (!_blitzMode || state.result) { blitzStop(); blitzHideUI(); return; }
  _blitzSec--;
  _blitzUpdateUI();
  if (_blitzSec === 3) {
    speak(pick('blitzUrgent'));
    SFX.hearty();
  }
  if (_blitzSec <= 0) {
    blitzStop();
    _blitzTimeout();
  }
}

function _blitzTimeout() {
  speak(pick('blitzTimeout'), true);
  SFX.draw();
  // Play a random legal move for the current player
  const empty = state.board.map((v,i)=>!v?i:null).filter(i=>i!==null);
  if (empty.length === 0) return;
  const idx = empty[Math.floor(Math.random() * empty.length)];
  const b = [...state.board];
  const marker = state.xIsNext ? 'X' : 'O';
  b[idx] = marker;
  dom.cells[idx].dataset.val = '';  // force re-render of this cell
  setState({board:b});
  const r = checkWinner(b);
  if (r) { handleResult(r); return; }
  setState({xIsNext: !state.xIsNext});
  if (state.mode === 'ai') {
    scheduleAI();
  } else {
    blitzStart();
  }
}

var THEMES = [
  { id: 'default',    label: '🩷 Hearty Pink',     swatch: 'linear-gradient(135deg,#f43f5e,#e879a0)', dark: false },

function applyThemeLetterbox() {
  // Find letterbox colour from the active theme's CSS variable
  var isDark = document.body.classList.contains('dark-mode');
  var lbMap = {
    'default':   { light: '#ffeaf4', dark: '#1a0a12' },
    'spring':    { light: '#f0faf4', dark: '#052e16' },

  var pair = lbMap[_currentTheme] || lbMap['default'];
  var col  = isDark ? pair.dark : pair.light;
  document.documentElement.style.background = col;
  document.body.style.background = col;
}

function setTheme(id) {
  _stopTutorialIfActive();
  _currentTheme = id;

  if (id === 'default') {
    document.body.removeAttribute('data-theme');
  } else {
    document.body.setAttribute('data-theme', id);
  }
  applyThemeLetterbox();
  // Force Hearty to redraw immediately with the new theme's accessories.
  // The heartyKey guard caches the last render — clear it so the next
  // render() / uRender() / mRender() always rebuilds the SVG.
  if (dom.heartyWrap) dom.heartyWrap._heartyKey = null;
