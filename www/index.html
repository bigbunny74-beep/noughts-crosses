<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f43f5e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hearty">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Hearty%20%E2%80%94%20Noughts%20%26%20Crosses%22%2C%22short_name%22%3A%22Hearty%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22portrait%22%2C%22background_color%22%3A%22%231a0a12%22%2C%22theme_color%22%3A%22%23f43f5e%22%2C%22start_url%22%3A%22.%2F%22%7D">
<style>
  /* ── PORTRAIT LOCK ── */
  @media screen and (orientation: landscape) and (max-width: 900px) and (min-height: 400px) {
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      background: #1a0a12;
    }
    #portrait-msg {
      display: flex !important;
    }
  }
  #portrait-msg {
    display: none;
    position: fixed; inset: 0; z-index: 10000;
    background: linear-gradient(160deg, #1a0a12 0%, #12100e 50%, #0a1020 100%);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 24px; color: #f9a8d4; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 16px; text-align: center; padding: 40px;
  }
  #portrait-msg svg { opacity: 0.85; }
  #portrait-msg p { color: #e879a0; font-size: 14px; font-weight: 700; max-width: 260px; line-height: 1.5; margin-top: -8px; }
</style>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes heartyBreathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.045); }
  }
  @keyframes heartySpeaking {
    0%   { transform: scale(1) rotate(0deg); }
    15%  { transform: scale(1.08) rotate(-4deg); }
    30%  { transform: scale(1.06) rotate(4deg); }
    45%  { transform: scale(1.09) rotate(-3deg); }
    60%  { transform: scale(1.07) rotate(3deg); }
    75%  { transform: scale(1.05) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  @keyframes drawLine {
    from { stroke-dashoffset: 40; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes drawCircle {
    from { stroke-dashoffset: 88; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes fadeSlideIn {
    from { opacity:0; transform: translateY(14px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,120,180,0); }
    50%      { box-shadow: 0 0 28px 8px rgba(255,120,180,0.2); }
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-7deg); }
    75% { transform: rotate(7deg); }
  }
  @keyframes cupPop {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    70% { transform: scale(1.2) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  @keyframes dotTyping {
    0% { transform: translateY(0px); opacity: 0.3; }
    50% { transform: translateY(-5px); opacity: 1; }
    100% { transform: translateY(0px); opacity: 0.3; }
  }
  @keyframes modalIn {
    from { opacity:0; transform: scale(0.88) translateY(20px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }
  @keyframes matchBannerIn {
    from { opacity:0; transform: scale(0.7) rotate(-4deg); }
    to   { opacity:1; transform: scale(1) rotate(0deg); }
  }
  @keyframes bubbleIn {
    from { opacity:0; transform: translateY(8px) scale(0.92); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  .shake-error {
    animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
    border-color: #f43f5e !important;
    background: rgba(254, 226, 226, 0.8) !important;
    z-index: 10;
  }
  .thinking-dots { display: flex; gap: 6px; align-items: center; justify-content: center; }
  .thinking-dots span {
    width: 8px; height: 8px; background-color: #be185d; border-radius: 50%;
    display: inline-block; animation: dotTyping 1s infinite ease-in-out;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* ── DARK MODE ── */
  body.dark-mode {
    --bg: linear-gradient(160deg, #1a0a12 0%, #12100e 30%, #0a1020 65%, #130a22 100%);
    --bg-before1: rgba(120,30,70,0.3);
    --bg-before2: rgba(20,50,120,0.25);
    --bg-before3: rgba(60,20,120,0.22);
    --bg-before4: rgba(120,70,20,0.2);
    --card-bg: rgba(30,15,25,0.85);
    --card-border: rgba(180,60,110,0.35);
    --status-bg: rgba(30,15,25,0.8);
    --board-bg: rgba(25,12,22,0.75);
    --cell-bg: rgba(40,18,35,0.7);
    --cell-hover: rgba(60,20,45,0.95);
    --bubble-bg: #1e0e1a;
    --bubble-border: #8b3060;
    --bubble-text: #f9a8d4;
    --text-main: #f9a8d4;
    --text-sub: #e879a0;
    --text-label: #c080a0;
    --score-label: #b06080;
    --footer: #906070;
    --btn-inactive-bg: rgba(40,15,30,0.8);
    --btn-inactive-color: #d080a0;
    --btn-inactive-border: rgba(244,63,94,0.3);
    --btn-diff-inactive-bg: rgba(30,15,50,0.7);
    --btn-diff-inactive-color: #c0a0e0;
    --win-cell-bg: rgba(80,20,50,0.9);
    --history-bg: rgba(25,10,20,0.7);
    --history-border: rgba(180,60,110,0.25);
    --modal-bg: #1e0e1a;
    --modal-border: rgba(180,60,110,0.5);
    --input-bg: rgba(40,18,35,0.9);
    --input-border: rgba(180,60,110,0.4);
    --series-bg: rgba(25,10,20,0.8);
  }
  body:not(.dark-mode) {
    --bg: linear-gradient(160deg, #ffeaf4 0%, #fff0e8 30%, #eaf4ff 65%, #f0eaff 100%);
    --card-bg: rgba(255,255,255,0.75);
    --card-border: rgba(255,182,213,0.4);
    --status-bg: rgba(255,255,255,0.7);
    --board-bg: rgba(255,255,255,0.65);
    --cell-bg: rgba(255,255,255,0.6);
    --cell-hover: rgba(255,240,248,0.95);
    --bubble-bg: white;
    --bubble-border: #fbb6ce;
    --bubble-text: #be185d;
    --text-main: #c0386e;
    --text-sub: #d4648a;
    --text-label: #d4648a;
    --score-label: #9d6d80;
    --footer: #c08090;
    --btn-inactive-bg: rgba(255,255,255,0.7);
    --btn-inactive-color: #a0657e;
    --btn-inactive-border: rgba(244,63,94,0.2);
    --btn-diff-inactive-bg: rgba(255,255,255,0.6);
    --btn-diff-inactive-color: #a89fc0;
    --win-cell-bg: rgba(255,220,235,0.8);
    --history-bg: rgba(255,255,255,0.55);
    --history-border: rgba(255,182,213,0.3);
    --modal-bg: white;
    --modal-border: rgba(255,182,213,0.6);
    --input-bg: rgba(255,255,255,0.9);
    --input-border: rgba(244,63,94,0.3);
    --series-bg: rgba(255,255,255,0.7);
  }

  #root {
    height: 100vh;
    height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 10px 16px 20px;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    position: relative; overflow: hidden;
    transition: background 0.4s;
  }
  /* On mobile, pad top enough to clear the hamburger button */
  @media (max-width: 699px) {
    #root { padding-top: 64px; padding-bottom: 8px; }
  }
  #root::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 420px 320px at 10% 15%, rgba(255,182,213,0.28) 0%, transparent 70%),
      radial-gradient(ellipse 350px 280px at 90% 10%, rgba(180,210,255,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 80% 90%, rgba(210,180,255,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 300px 250px at 5% 85%,  rgba(255,220,180,0.25) 0%, transparent 70%);
    transition: opacity 0.4s;
  }
  body.dark-mode #root::before { opacity: 0.4; }

  .bg-hearts { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .bg-heart { position:absolute; opacity:0.13; animation: floatCloud linear infinite; display:flex; align-items:center; justify-content:center; }
  .bg-heart svg { width:100%; height:100%; }

  #root > * { position: relative; z-index: 1; }

  /* ── TOP TOOLBAR (toggles) ── */
  .top-toolbar {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 6px;
    animation: fadeSlideIn 0.6s ease-out;
  }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--card-border);
    background: var(--card-bg); cursor: pointer; font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; outline: none; backdrop-filter: blur(8px);
  }
  .icon-btn:hover { transform: scale(1.12); filter: brightness(1.1); }
  .icon-btn.muted { opacity: 0.5; }

  /* ── CONTROLS ── */
  .controls {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    margin-bottom: 10px; animation: fadeSlideIn 0.7s ease-out;
  }
  .btn-pill {
    font-family: 'Nunito', sans-serif; font-weight: 800;
    border-radius: 999px; padding: 7px 20px; font-size: 13px;
    cursor: pointer; border: 2px solid transparent;
    transition: all 0.18s; outline: none;
  }
  .btn-pill:hover { transform: translateY(-2px); filter: brightness(1.07); }
  .btn-pill:active { transform: scale(0.96); }
  .btn-pill.active-mode {
    background: linear-gradient(135deg,#f43f5e,#e879a0);
    color: white; box-shadow: 0 3px 14px rgba(244,63,94,0.3);
  }
  .btn-pill.inactive-mode {
    background: var(--btn-inactive-bg); color: var(--btn-inactive-color);
    border-color: var(--btn-inactive-border);
  }
  .btn-pill.active-diff {
    background: rgba(167,139,250,0.18); color: #7c3aed;
    border-color: rgba(124,58,237,0.35);
  }
  .btn-pill.inactive-diff {
    background: var(--btn-diff-inactive-bg); color: var(--btn-diff-inactive-color);
    border-color: rgba(124,58,237,0.12);
  }

  /* ── SERIES MODE PILL ── */
  .btn-pill.active-series {
    background: linear-gradient(135deg,#f59e0b,#fbbf24);
    color: white; box-shadow: 0 3px 14px rgba(245,158,11,0.3);
  }
  .btn-pill.inactive-series {
    background: var(--btn-diff-inactive-bg); color: var(--btn-diff-inactive-color);
    border-color: rgba(245,158,11,0.2);
  }

  /* ── LAYOUT ── */
  .main-layout {
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; width: 100%; max-width: 720px;
    flex: 1; min-height: 0;
  }
  @media (min-width: 700px) {
    .main-layout { flex-direction: row; align-items: center; justify-content: center; gap: 20px; }
  }

  /* ── HEARTY (perched on P1 score card) ── */
  .hearty-svg-wrap {
    transition: filter 0.4s;
    transform-origin: center bottom;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: -6px;
    z-index: 5;
    pointer-events: none;
  }
  .hearty-svg-wrap.breathing { animation: heartyBreathe 3s ease-in-out infinite; }
  .hearty-svg-wrap.speaking  { animation: heartySpeaking 0.7s ease-in-out; }
  .hearty-svg-wrap.wiggling  { animation: wiggle 0.5s ease-in-out infinite; }
  /* cup overlay: scaled for smaller Hearty */
  .gold-cup-overlay {
    position: absolute; top: -4px; right: -4px; width: 26px; height: 26px;
    animation: cupPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; z-index: 10;
  }

  /* ── SPEECH BUBBLE — floats above the score panel, to the right of Hearty ── */
  .speech-bubble {
    position: absolute;
    /* sits above the score panel row, aligned to start just right of Hearty on P1 card */
    bottom: calc(100% - 52px); /* pull it up: aligns bubble top with Hearty's head area */
    left: clamp(90px, 25vw, 115px); /* prevent clipping on narrow screens */
    background: var(--bubble-bg);
    border: 2.5px solid var(--bubble-border); border-radius: 20px;
    padding: 8px 12px;
    width: clamp(150px, 52vw, 185px); /* fluid width, won't overflow viewport */
    min-height: 54px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(244,63,94,0.1);
    transition: opacity 0.3s, background 0.3s, border-color 0.3s;
    z-index: 10;
  }
  .speech-bubble.visible { opacity:1; animation: bubbleIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  .speech-bubble.hidden  { opacity:0; pointer-events:none; }
  .speech-bubble p { font-size: 11px; font-weight: 700; color: var(--bubble-text); line-height: 1.4; text-align: center; }
  /* tail points down-left toward Hearty below */
  .bubble-tail {
    position: absolute;
    left: 22px;
    bottom: -12px;
    top: auto;
    transform: none;
    width:0; height:0;
    border-left: 10px solid transparent; border-right: 10px solid transparent;
    border-top: 12px solid var(--bubble-bg);
    transition: border-top-color 0.3s;
  }
  .bubble-tail-border {
    position: absolute;
    left: 19px;
    bottom: -16px;
    top: auto;
    transform: none;
    width:0; height:0;
    border-left: 13px solid transparent; border-right: 13px solid transparent;
    border-top: 15px solid var(--bubble-border); z-index: -1;
    transition: border-top-color 0.3s;
  }

  /* ── BOARD COL ── */
  .board-col { flex:1; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; max-width: 360px; min-height: 0; }
  @media (max-height: 700px) and (max-width: 699px) {
    .board-col { gap: 4px; }
  }

  /* Score panel — top padding for Hearty sitting on P1 card + bubble above */
  .score-panel {
    display: flex; gap: 10px; justify-content: center; flex-wrap: nowrap;
    position: relative; width: 100%;
    padding-top: 118px; /* room for Hearty (60px) + bubble height above (~54px) + spacing */
  }
  @media (max-height: 700px) and (max-width: 699px) {
    .score-panel { padding-top: 90px; }
  }
  @media (max-height: 600px) and (max-width: 699px) {
    .score-panel { padding-top: 76px; }
  }
  /* P1 card has relative positioning so Hearty can be absolutely placed on it */
  .score-card {
    display: flex; flex-direction: column; align-items: center;
    background: var(--card-bg); backdrop-filter: blur(8px);
    border: 2px solid var(--card-border); border-radius: 16px;
    padding: 8px 10px; flex: 1; min-width: 0;
    transition: background 0.3s, border-color 0.3s;
    position: relative; /* needed for .hearty-svg-wrap absolute positioning */
  }
  .score-num { font-size: clamp(20px, 6vw, 28px); font-weight: 900; }
  .score-num.x    { color: #f43f5e; }
  .score-num.draw { color: #94a3b8; }
  .score-num.o    { color: #7c3aed; }
  .score-label { font-size: clamp(10px, 2.8vw, 12px); color: var(--score-label); margin-top: 2px; font-weight: 700; }

  /* ── SERIES PROGRESS ── */
  .series-bar {
    display: flex; align-items: center; gap: 10px; justify-content: center;
    background: var(--series-bg); border: 2px solid var(--card-border);
    border-radius: 14px; padding: 6px 16px;
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
    color: var(--text-sub); backdrop-filter: blur(8px);
    transition: all 0.3s;
  }
  .series-pips { display: flex; gap: 5px; align-items: center; }
  .pip {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid currentColor; transition: all 0.25s;
  }
  .pip.won-x   { background: #f43f5e; border-color: #f43f5e; }
  .pip.won-o   { background: #7c3aed; border-color: #7c3aed; }
  .pip.empty   { background: transparent; opacity: 0.4; }

  /* ── STATUS ── */
  .status-bar {
    text-align: center; padding: 8px 20px; border-radius: 14px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: var(--status-bg); border: 2px solid var(--card-border);
    transition: background 0.3s, border-color 0.3s;
  }
  .status-bar.result { border-color: rgba(244,63,94,0.45); background: rgba(255,240,248,0.9); animation: pulseGlow 2s ease-in-out infinite; }
  body.dark-mode .status-bar.result { background: rgba(60,10,30,0.9); }
  .status-text { font-family: 'DM Mono', monospace; font-weight: 700; font-size: clamp(12px, 3.5vw, 14px); color: #7a4060; }
  body.dark-mode .status-text { color: #e090b0; }
  .status-text.win-x { color: #f43f5e; }
  .status-text.win-o { color: #7c3aed; }

  /* ── BOARD ── */
  .board-wrap {
    border-radius: 28px; padding: 14px;
    background: var(--board-bg); border: 2px solid var(--card-border);
    backdrop-filter: blur(16px); box-shadow: 0 8px 40px rgba(244,63,94,0.1);
    width: min(310px, calc(100vw - 48px)); transition: background 0.3s, border-color 0.3s;
  }
  /* On short screens shrink the board so everything fits without scrolling */
  @media (max-height: 700px) and (max-width: 699px) {
    .board-wrap { width: min(270px, calc(100vw - 48px)); padding: 10px; border-radius: 22px; }
  }
  @media (max-height: 620px) and (max-width: 699px) {
    .board-wrap { width: min(240px, calc(100vw - 48px)); padding: 8px; border-radius: 18px; }
  }
  .board-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .cell {
    display: block; position: relative; width: 100%; padding-bottom: 100%;
    border-radius: 18px; border: 2px solid var(--card-border);
    background: var(--cell-bg); cursor: pointer; transition: all 0.15s; outline: none;
  }
  .cell-inner {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center; border-radius: 16px;
  }
  .cell:hover:not(.disabled):not(.filled) { background: var(--cell-hover); border-color: rgba(244,63,94,0.4); }
  .cell:not(.filled):not(.disabled):hover .cell-inner::before {
    content: 'X'; font-size: 42px; font-weight: 900;
    color: rgba(244, 63, 94, 0.22); pointer-events: none;
  }
  .board-grid.o-turn .cell:not(.filled):not(.disabled):hover .cell-inner::before {
    content: 'O'; color: rgba(124, 58, 237, 0.22);
  }
  .cell.disabled { cursor: default; }
  .cell:focus { outline: none; box-shadow: none; }
  .cell:focus-visible { outline: none; box-shadow: none; }
  .cell.win-cell { background: var(--win-cell-bg); border-color: rgba(244,63,94,0.55); box-shadow: 0 0 22px 5px rgba(255,100,160,0.25); }
  .cell svg { width: 42px; height: 42px; z-index: 2; }

  /* ── BUTTONS ROW ── */
  .btn-row {
    display: flex; gap: 8px; align-items: stretch;
    justify-content: center;
    width: min(310px, calc(100vw - 48px)); /* match fluid board width */
  }
  @media (max-height: 700px) and (max-width: 699px) {
    .btn-row { width: min(270px, calc(100vw - 48px)); }
  }
  @media (max-height: 620px) and (max-width: 699px) {
    .btn-row { width: min(240px, calc(100vw - 48px)); }
  }
  .new-game-btn {
    background: linear-gradient(135deg, #f43f5e 0%, #e879a0 100%);
    color: white; font-weight: 900; font-size: 13px;
    padding: 0 8px; min-height: 44px; border-radius: 999px; border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(244,63,94,0.3); font-family: 'Nunito', sans-serif;
    transition: all 0.18s; flex: 1; white-space: nowrap;
  }
  .new-game-btn:hover { transform: translateY(-2px); filter: brightness(1.07); }
  .rematch-btn {
    background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
    color: white; font-weight: 900; font-size: 12px;
    padding: 0 8px; min-height: 44px; border-radius: 999px; border: none; cursor: pointer;
    box-shadow: 0 4px 16px rgba(124,58,237,0.3); font-family: 'Nunito', sans-serif;
    transition: all 0.18s; animation: fadeSlideIn 0.4s ease-out;
    flex: 1; white-space: nowrap;
  }
  .rematch-btn:hover { transform: translateY(-2px); filter: brightness(1.07); }
  .undo-btn {
    background: var(--card-bg); color: var(--text-sub);
    font-weight: 900; font-size: 12px;
    padding: 0 8px; min-height: 44px; border-radius: 999px;
    border: 2px solid var(--card-border); cursor: pointer;
    font-family: 'Nunito', sans-serif; transition: all 0.18s;
    backdrop-filter: blur(8px); flex: 1; white-space: nowrap;
  }
  .undo-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.07); }
  .undo-btn:disabled { opacity: 0.35; cursor: default; }

  /* ── HISTORY LOG ── */
  .history-log {
    background: var(--history-bg); border: 2px solid var(--history-border);
    border-radius: 14px; padding: 6px 14px;
    font-size: 11px; font-weight: 700; color: var(--score-label);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    justify-content: center; max-width: min(310px, calc(100vw - 48px));
    backdrop-filter: blur(8px); transition: all 0.3s;
  }
  .history-label { color: var(--text-sub); font-size: 10px; letter-spacing: 0.06em; }
  .hist-chip {
    font-size: 13px; display: inline-block;
  }

  /* ── FOOTER ── */
  .footer { margin-top: 18px; font-size: 11px; color: var(--footer); text-align: center; font-weight: 600; }

  /* ── COMPACT SCREEN OVERRIDES (short portrait phones like Xperia L1) ── */
  @media (max-height: 700px) and (max-width: 699px) {
    .new-game-btn, .rematch-btn, .undo-btn { min-height: 38px; font-size: 12px; }
    .status-bar { height: 34px; padding: 6px 16px; }
    .score-card { padding: 6px 8px; }
    .score-num { font-size: clamp(18px, 5vw, 24px); }
    .top-toolbar { margin-bottom: 4px; }
    .controls { margin-bottom: 8px; }
    .footer { display: none; }
    .series-bar { padding: 4px 12px; }
  }
  @media (max-height: 620px) and (max-width: 699px) {
    .new-game-btn, .rematch-btn, .undo-btn { min-height: 34px; font-size: 11px; }
    .status-bar { height: 30px; padding: 4px 12px; }
    .score-num { font-size: clamp(16px, 4.5vw, 20px); }
  }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  @media (max-width: 699px) {
    .modal-overlay {
      align-items: flex-start;
      padding-top: 40px;
    }
  }
  .modal-overlay.hidden { display: none; }
  .modal-box {
    background: var(--modal-bg); border: 2.5px solid var(--modal-border);
    border-radius: 28px; padding: 28px 32px; max-width: 360px; width: 92%;
    box-shadow: 0 16px 60px rgba(244,63,94,0.2);
    animation: modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    transition: background 0.3s, border-color 0.3s;
  }
  .modal-box h2 {
    font-size: 20px; font-weight: 900; color: var(--text-main);
    text-align: center; margin-bottom: 18px;
  }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    display: block; font-size: 12px; font-weight: 800; color: var(--text-sub);
    margin-bottom: 5px; letter-spacing: 0.04em;
  }
  .modal-field input {
    width: 100%; padding: 9px 14px; border-radius: 12px;
    border: 2px solid var(--input-border); background: var(--input-bg);
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
    color: var(--text-main); outline: none; transition: border-color 0.18s, background 0.3s;
  }
  .modal-field input:focus { border-color: #f43f5e; }
  .modal-field input::placeholder { color: #c0a0b0; opacity: 0.7; }
  .modal-btn {
    width: 100%; padding: 12px; border-radius: 999px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #f43f5e, #e879a0);
    color: white; font-weight: 900; font-size: 15px;
    font-family: 'Nunito', sans-serif; margin-top: 6px;
    box-shadow: 0 4px 16px rgba(244,63,94,0.3); transition: all 0.18s;
  }
  .modal-btn:hover { filter: brightness(1.07); transform: translateY(-1px); }

  /* ── MATCH WINNER BANNER ── */
  .match-banner {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
  }
  .match-banner.hidden { display: none; }
  .match-banner-box {
    background: var(--modal-bg); border: 3px solid #f43f5e;
    border-radius: 32px; padding: 36px 40px; text-align: center;
    max-width: 380px; width: 92%;
    box-shadow: 0 20px 80px rgba(244,63,94,0.35);
    animation: matchBannerIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .match-banner-box .crown { width: 56px; height: 56px; margin: 0 auto 8px; display:flex; align-items:center; justify-content:center; }
  .match-banner-box h2 {
    font-size: 24px; font-weight: 900; color: var(--text-main);
    margin-bottom: 6px;
  }
  .match-banner-box p { font-size: 14px; color: var(--text-sub); font-weight: 700; margin-bottom: 22px; }
  .match-banner-score {
    display: flex; gap: 12px; justify-content: center; margin-bottom: 22px;
  }
  .match-score-chip {
    display: flex; flex-direction: column; align-items: center;
    background: var(--card-bg); border: 2px solid var(--card-border);
    border-radius: 16px; padding: 10px 20px; min-width: 80px;
  }
  .match-score-chip .num { font-size: 28px; font-weight: 900; }
  .match-score-chip .lbl { font-size: 11px; font-weight: 800; color: var(--score-label); margin-top: 2px; }
  .match-banner-btn {
    padding: 12px 32px; border-radius: 999px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #f43f5e, #e879a0);
    color: white; font-weight: 900; font-size: 15px;
    font-family: 'Nunito', sans-serif;
    box-shadow: 0 4px 20px rgba(244,63,94,0.3); margin: 0 6px;
    transition: all 0.18s;
  }
  .match-banner-btn:hover { filter: brightness(1.07); transform: translateY(-1px); }
  .match-banner-btn.secondary {
    background: var(--card-bg); color: var(--text-sub);
    border: 2px solid var(--card-border);
    box-shadow: none;
  }

  /* ── AI WATCH BADGE ── */
  .watch-badge {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white; font-size: 11px; font-weight: 800;
    padding: 3px 10px; border-radius: 999px;
    letter-spacing: 0.05em; display: inline-block;
  }

  /* ── SIDE MENU ── */
  @keyframes menuSlideIn {
    from { transform: translateX(-100%); opacity: 0.6; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  @keyframes menuSlideOut {
    from { transform: translateX(0);    opacity: 1; }
    to   { transform: translateX(-100%); opacity: 0.6; }
  }

  /* Hide the top-toolbar on mobile (handled by side menu) */
  @media (max-width: 699px) {
    .top-toolbar { display: none !important; }
    .controls { display: none !important; }
  }

  /* Hamburger button — fixed top-left, proper 44×44 tap target */
  .menu-tab {
    position: fixed; top: 12px; left: 12px;
    z-index: 400;
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #f43f5e, #e879a0);
    border-radius: 14px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(244,63,94,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .menu-tab:active { transform: scale(0.92); box-shadow: 0 2px 10px rgba(244,63,94,0.3); }
  .menu-tab-line {
    width: 18px; height: 2px;
    background: rgba(255,255,255,0.95);
    border-radius: 2px;
    transition: transform 0.2s;
  }

  /* Overlay backdrop */
  .menu-overlay {
    position: fixed; inset: 0; z-index: 450;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(3px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .menu-overlay.open { opacity: 1; pointer-events: all; }

  /* Menu panel */
  .side-menu {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 280px; z-index: 500;
    background: var(--modal-bg);
    border-right: 2px solid var(--modal-border);
    box-shadow: 6px 0 40px rgba(244,63,94,0.2);
    display: flex; flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .side-menu.open {
    transform: translateX(0);
  }

  /* Menu header */
  .menu-header {
    padding: 28px 22px 18px;
    border-bottom: 2px solid var(--card-border);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .menu-header-title {
    font-size: 18px; font-weight: 900;
    color: var(--text-main); letter-spacing: -0.01em;
  }
  .menu-header-sub {
    font-size: 11px; font-weight: 700; color: var(--text-sub);
    margin-top: 1px;
  }
  .menu-close-btn {
    margin-left: auto; width: 32px; height: 32px;
    border-radius: 50%; border: 2px solid var(--card-border);
    background: var(--card-bg); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  }
  .menu-close-btn:active { transform: scale(0.9); }

  /* Menu sections */
  .menu-section {
    padding: 14px 18px 6px;
    flex-shrink: 0;
  }
  .menu-section-label {
    font-size: 9px; font-weight: 900; letter-spacing: 0.12em;
    color: var(--score-label); text-transform: uppercase;
    margin-bottom: 10px; padding: 0 4px;
  }
  .menu-section-divider {
    height: 1px; background: var(--card-border);
    margin: 6px 18px 0; opacity: 0.6; flex-shrink: 0;
  }

  /* Toggle rows */
  .menu-toggle-row {
    display: flex; align-items: center;
    padding: 11px 4px; gap: 12px;
    border-radius: 12px; cursor: pointer;
    transition: background 0.15s;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .menu-toggle-row:active { background: var(--cell-hover); }
  .menu-toggle-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--cell-bg); border: 2px solid var(--card-border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
    color: var(--text-sub);
  }
  .menu-toggle-icon.active {
    background: linear-gradient(135deg, #f43f5e, #e879a0);
    border-color: #f43f5e; color: white;
    box-shadow: 0 3px 12px rgba(244,63,94,0.35);
  }
  .menu-toggle-icon.active-purple {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border-color: #7c3aed; color: white;
    box-shadow: 0 3px 12px rgba(124,58,237,0.3);
  }
  .menu-toggle-text { flex: 1; }
  .menu-toggle-label {
    font-size: 13px; font-weight: 800;
    color: var(--text-main); line-height: 1;
  }
  .menu-toggle-desc {
    font-size: 10px; font-weight: 600;
    color: var(--text-sub); margin-top: 2px;
  }

  /* Pill group inside menu */
  .menu-pill-group {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 2px 4px 10px;
  }
  .menu-pill {
    font-family: 'Nunito', sans-serif; font-weight: 800;
    border-radius: 999px; padding: 7px 16px; font-size: 12px;
    cursor: pointer; border: 2px solid transparent;
    transition: all 0.15s; outline: none;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  }
  .menu-pill:active { transform: scale(0.95); }
  .menu-pill.active-mode {
    background: linear-gradient(135deg,#f43f5e,#e879a0);
    color: white; box-shadow: 0 3px 12px rgba(244,63,94,0.3);
    border-color: transparent;
  }
  .menu-pill.inactive-mode {
    background: var(--btn-inactive-bg); color: var(--btn-inactive-color);
    border-color: var(--btn-inactive-border);
  }
  .menu-pill.active-diff {
    background: rgba(167,139,250,0.18); color: #7c3aed;
    border-color: rgba(124,58,237,0.4);
  }
  .menu-pill.inactive-diff {
    background: var(--btn-diff-inactive-bg); color: var(--btn-diff-inactive-color);
    border-color: rgba(124,58,237,0.12);
  }
  .menu-pill.active-series {
    background: linear-gradient(135deg,#f59e0b,#fbbf24);
    color: white; box-shadow: 0 3px 12px rgba(245,158,11,0.3);
    border-color: transparent;
  }
  .menu-pill.inactive-series {
    background: var(--btn-diff-inactive-bg); color: var(--btn-diff-inactive-color);
    border-color: rgba(245,158,11,0.2);
  }

  /* Watch pill special */
  .menu-pill.active-watch {
    background: linear-gradient(135deg,#7c3aed,#a855f7);
    color: white; box-shadow: 0 3px 12px rgba(124,58,237,0.3);
    border-color: transparent;
  }
  .menu-pill.inactive-watch {
    background: var(--btn-diff-inactive-bg); color: var(--btn-diff-inactive-color);
    border-color: rgba(124,58,237,0.15);
  }

  /* Edit name button */
  .menu-edit-name-btn {
    width: 100%; padding: 10px 16px;
    border-radius: 12px; border: 2px solid var(--card-border);
    background: var(--card-bg); cursor: pointer;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 13px; color: var(--text-main);
    display: flex; align-items: center; gap: 10px;
    transition: all 0.15s; text-align: left;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    margin-bottom: 4px;
  }
  .menu-edit-name-btn:active { background: var(--cell-hover); transform: scale(0.98); }

  /* Menu footer */
  .menu-footer {
    margin-top: auto; padding: 16px 22px;
    border-top: 2px solid var(--card-border);
    font-size: 10px; font-weight: 700;
    color: var(--footer); text-align: center;
    flex-shrink: 0;
  }

  /* ── SIDE MENU COMPACT (short portrait screens) ── */
  @media (max-height: 700px) {
    .menu-header { padding: 14px 18px 12px; }
    .menu-section { padding: 8px 18px 4px; }
    .menu-section-label { margin-bottom: 6px; }
    .menu-toggle-row { padding: 7px 4px; }
    .menu-toggle-icon { width: 30px; height: 30px; border-radius: 8px; }
    .menu-toggle-icon svg { width: 15px; height: 15px; }
    .menu-toggle-label { font-size: 12px; }
    .menu-toggle-desc { font-size: 9px; margin-top: 1px; }
    .menu-pill { padding: 5px 12px; font-size: 11px; }
    .menu-pill-group { gap: 5px; padding-bottom: 6px; }
    .menu-edit-name-btn { padding: 8px 14px; font-size: 12px; }
    .menu-footer { padding: 10px 18px; }
    .menu-section-divider { margin: 4px 18px 0; }
    .menu-header-title { font-size: 16px; }
  }
  @media (max-height: 600px) {
    .menu-header { padding: 10px 16px 8px; }
    .menu-section { padding: 6px 16px 2px; }
    .menu-section-label { margin-bottom: 4px; font-size: 8px; }
    .menu-toggle-row { padding: 5px 4px; }
    .menu-toggle-icon { width: 28px; height: 28px; }
    .menu-pill { padding: 4px 10px; font-size: 11px; }
    .menu-pill-group { gap: 4px; padding-bottom: 4px; }
    .menu-footer { padding: 8px 16px; }
  }

  /* Swipe hint on desktop shows menu-tab only on small screens */
  @media (min-width: 700px) {
    .menu-tab { display: none; }
  }

  /* Desktop: show controls as normal */
  @media (min-width: 700px) {
    .top-toolbar { display: flex !important; }
    .controls { display: flex !important; }
  }

  /* Disable long-press / text selection everywhere on mobile */
  @media (max-width: 900px) {
    * {
      -webkit-user-select: none !important;
      user-select: none !important;
      -webkit-touch-callout: none !important;
      -webkit-tap-highlight-color: transparent !important;
    }
    input, textarea {
      -webkit-user-select: text !important;
      user-select: text !important;
    }
    img, a {
      -webkit-user-drag: none;
      pointer-events: auto;
    }
  }
</style>
</head>

<script>
// ── Prevent long-press context menu on mobile ──

  if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {

}, { passive: false });
// ── Side Menu ──
let menuOpen = false;
let swipeStartX = null, swipeStartY = null;

function openSideMenu() {
  menuOpen = true;
  document.getElementById('sideMenu').classList.add('open');
  document.getElementById('menuOverlay').classList.add('open');
  renderSideMenu();
}
function closeSideMenu() {
  menuOpen = false;
  document.getElementById('sideMenu').classList.remove('open');
  document.getElementById('menuOverlay').classList.remove('open');
}

// Swipe right to open, swipe left to close
document.addEventListener('touchstart', function(e) {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', function(e) {
  if (swipeStartX === null) return;
  const dx = e.changedTouches[0].clientX - swipeStartX;
  const dy = Math.abs(e.changedTouches[0].clientY - swipeStartY);
  if (dy > 60) { swipeStartX = null; return; } // mostly vertical, ignore
  if (!menuOpen && dx > 55 && swipeStartX < 40) {
    openSideMenu();
  } else if (menuOpen && dx < -55) {
    closeSideMenu();
  }
  swipeStartX = null;
}, { passive: true });

// ── Fireworks ──
const canvas = document.createElement('canvas');
canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:100;';
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');
let particles = [];
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resize); resize();

class Particle {
  constructor(x,y,color,big){
    this.x=x; this.y=y; this.color=color;
    this.angle=Math.random()*Math.PI*2;
    this.speed=Math.random()*(big?9:6)+(big?3:2);
    this.friction=0.95; this.gravity=0.12; this.alpha=1;
    this.decay=Math.random()*0.015+0.015;
    this.size=big?(Math.random()*2+2):2.5;
  }
  update(){ this.speed*=this.friction; this.x+=Math.cos(this.angle)*this.speed; this.y+=Math.sin(this.angle)*this.speed+this.gravity; this.alpha-=this.decay; }
  draw(){ ctx.globalAlpha=this.alpha; ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
}

function createFirework(x,y,big){
  const colors=['#ff4d6d','#ffb703','#8ecae6','#fb8500','#7c3aed','#06d6a0'];
  const color=colors[Math.floor(Math.random()*colors.length)];
  const count=big?80:45;
  for(let i=0;i<count;i++) particles.push(new Particle(x,y,color,big));
  SFX.firework();
}
function animateFireworks(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.alpha>0);
  particles.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(animateFireworks);
}
animateFireworks();

function launchVictoryCelebration(big){
  let count=0;
  const total = big ? 14 : 8;
  const interval=setInterval(()=>{
    createFirework(Math.random()*canvas.width, Math.random()*(canvas.height*0.6), big);
    count++;
    if(count>total) clearInterval(interval);
  }, big ? 250 : 350);
}

// ── Audio ──
const _audioCtx=(function(){ try{return new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;} })();
let _soundOn = true;
function playTone(freq,type,dur,vol){
  if(!_audioCtx||!_soundOn) return;
  type=type||'sine'; dur=dur||0.18; vol=vol||0.22;
  try{
    if(_audioCtx.state==='suspended') _audioCtx.resume();
    const osc=_audioCtx.createOscillator(), gain=_audioCtx.createGain();
    osc.connect(gain); gain.connect(_audioCtx.destination);
    osc.type=type; osc.frequency.setValueAtTime(freq,_audioCtx.currentTime);
    gain.gain.setValueAtTime(vol,_audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,_audioCtx.currentTime+dur);
    osc.start(_audioCtx.currentTime); osc.stop(_audioCtx.currentTime+dur);
  }catch(e){}
}
const SFX={
  X:()=>{playTone(440,'triangle',0.12,0.18);setTimeout(()=>playTone(550,'triangle',0.1,0.14),80);},
  O:()=>{playTone(330,'sine',0.2,0.2);setTimeout(()=>playTone(280,'sine',0.15,0.12),90);},
  fanfare:()=>{ const notes=[523.25,523.25,523.25,659.25,783.99,1046.50]; notes.forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.3,0.15),i*150)); },
  streakFanfare:()=>{ const notes=[523,659,784,1047,784,1047,1319]; notes.forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.35,0.18),i*140)); },
  firework:()=>{ playTone(100,'sawtooth',0.4,0.08); setTimeout(()=>playTone(Math.random()*400+300,'sine',0.1,0.04),60); },
  draw:()=>{ playTone(300,'sawtooth',0.3,0.15); setTimeout(()=>playTone(260,'sawtooth',0.3,0.12),160); },
  hearty:()=>{ [600,800,700].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.1,0.18),i*90)); },
  newGame:()=>{ playTone(440,'sine',0.1); setTimeout(()=>playTone(660,'sine',0.15),100); },
  undo:()=>{ playTone(400,'sine',0.1,0.14); setTimeout(()=>playTone(300,'sine',0.1,0.1),80); }
};

// ── Minimax ──
const WIN_LINES=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function checkWinner(b){
  for(const[a,c,d]of WIN_LINES) if(b[a]&&b[a]===b[c]&&b[a]===b[d]) return{winner:b[a],line:[a,c,d]};
  if(b.every(Boolean)) return{winner:'draw',line:[]};
  return null;
}
function minimax(b,isMax,alpha,beta,depth){
  const r=checkWinner(b);
  if(r){if(r.winner==='O')return 10-depth;if(r.winner==='X')return depth-10;return 0;}
  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++)if(!b[i]){b[i]='O';best=Math.max(best,minimax(b,false,alpha,beta,depth+1));b[i]=null;alpha=Math.max(alpha,best);if(beta<=alpha)break;}
    return best;
  } else {
    let best=Infinity;
    for(let i=0;i<9;i++)if(!b[i]){b[i]='X';best=Math.min(best,minimax(b,true,alpha,beta,depth+1));b[i]=null;beta=Math.min(beta,best);if(beta<=alpha)break;}
    return best;
  }
}
function getBestMove(board,diff){
  const empty=board.map((v,i)=>!v?i:null).filter(i=>i!==null);
  if(diff==='easy'&&Math.random()<0.7) return empty[Math.floor(Math.random()*empty.length)];
  if(diff==='medium'&&Math.random()<0.35) return empty[Math.floor(Math.random()*empty.length)];
  let best=-Infinity,move=null;
  for(const i of empty){const b=[...board];b[i]='O';const s=minimax(b,false,-Infinity,Infinity,0);if(s>best){best=s;move=i;}}
  return move;
}

// ── Player names ──
let playerNames = { X: 'Player 1', O: 'Player 2', Hearty: 'Hearty' };

function pName(marker){ return marker === 'X' ? playerNames.X : (state && state.mode === 'ai' ? playerNames.Hearty : playerNames.O); }

// ── Contextual 2-player commentary ──
function getTwoPlayerComment(board, lastMarker, lastIdx) {
  const other = lastMarker === 'X' ? 'O' : 'X';
  const playerName = pName(lastMarker);
  const otherName  = pName(other);
  const filled = board.filter(Boolean).length;

  function findThreats(marker) {
    const threats = [];
    for (const line of WIN_LINES) {
      const marks = line.filter(i => board[i] === marker);
      const empties = line.filter(i => !board[i]);
      if (marks.length === 2 && empties.length === 1) threats.push(empties[0]);
    }
    return threats;
  }
  function wasABlock() {
    const temp = [...board]; temp[lastIdx] = null;
    const opponentThreats = findThreats(other);
    return opponentThreats.includes(lastIdx);
  }
  function createdFork() { return findThreats(lastMarker).length >= 2; }

  const myThreats  = findThreats(lastMarker);
  const oppThreats = findThreats(other);
  const blocked    = wasABlock();
  const fork       = createdFork();
  const tookCenter = lastIdx === 4;
  const tookCorner = [0,2,6,8].includes(lastIdx);

  if (myThreats.length >= 2) return pickArr([
    `Whoa — ${playerName} just set up TWO winning paths! ${otherName}, you can't block both! 😱`,
    `A FORK! ${playerName} is sneaky — two threats at once! ${otherName} is in big trouble!`,
    `${playerName} laid a trap — double threat! ${otherName} better think fast!`,
    `Uh oh! ${playerName} has a fork! There's no stopping them now! 🍴`
  ]);
  if (myThreats.length === 1 && filled >= 4) return pickArr([
    `${playerName} is one move away from winning! Can ${otherName} block in time?! 😬`,
    `Watch out ${otherName}! ${playerName} is threatening to win right now!`,
    `${playerName} has a winning line open — ${otherName}, don't miss that block!`,
    `One more move and ${playerName} wins! This is so tense! 🫣`
  ]);
  if (blocked && oppThreats.length === 0) return pickArr([
    `Nice block, ${playerName}! ${otherName} thought they had you there!`,
    `Phew! ${playerName} shut that down just in time! Great defence! 🛡️`,
    `${playerName} saw the danger and plugged it! Very sharp!`,
    `Blocked! ${playerName} is reading ${otherName}'s plans like a book! 📖`
  ]);
  if (fork) return pickArr([
    `${playerName} is setting up something sneaky! I see what you're doing! 😏`,
    `Ooh, ${playerName} is thinking two steps ahead! Very devious!`,
    `Clever positioning from ${playerName}! That could open up multiple routes...`
  ]);
  if (tookCenter && filled === 1) return pickArr([
    `Center square first! Classic power move from ${playerName}! The textbook opening! 📚`,
    `${playerName} grabs the center — always the hot seat! Smart start!`,
    `Oh, the center! ${playerName} knows their Noughts & Crosses theory!`
  ]);
  if (tookCorner && filled <= 3) return pickArr([
    `A corner play! ${playerName} is thinking strategically already!`,
    `Corners are powerful — ${playerName} knows the game! 💪`,
    `${playerName} taking corners early — that's solid fundamentals!`
  ]);
  if (oppThreats.length >= 2) return pickArr([
    `${otherName} is setting up forks left and right! ${playerName}, be very careful now!`,
    `Careful ${playerName}! ${otherName} has TWO threats brewing! 😬`,
    `${otherName} is playing a trap game! ${playerName} needs to start defending!`
  ]);
  if (filled === 2) return pickArr([
    `Only two moves in and it's already getting interesting! 👀`,
    `The opening moves have been made — now the real battle begins!`,
    `We're just getting started! May the best player win!`,
    `Two down, seven to go — anything could happen!`
  ]);
  if (filled >= 6) return pickArr([
    `We're in the endgame now! Every square counts! 💥`,
    `The board is filling up fast — this is where it gets real!`,
    `Not many moves left! The pressure is on! 😅`,
    `It's crunch time! One slip could change everything!`
  ]);
  return pickArr([
    `${playerName} has made their mark! Your move, ${otherName}!`,
    `Interesting choice from ${playerName}! Let's see what ${otherName} does...`,
    `${playerName} is staking their claim on the grid! 🗺️`,
    `Good move, ${playerName}! The plot thickens! ${otherName}, the floor is yours.`,
    `${playerName} plays! Now ${otherName} has some thinking to do...`,
    `Ooh, ${playerName} went there! Bold! What's the counter-play, ${otherName}?`,
    `${playerName} is carving out territory! This is heating up! 🔥`,
    `Nice spot, ${playerName}! This game is beautifully balanced right now!`
  ]);
}

  bubbleText: pick('welcome'), bubbleVisible: true,
  heartyAnim: 'breathing', aiThinking: false, showCup: false,

  seriesMode: 'none',    // 'none' | 'bo3' | 'bo5'
  seriesX: 0, seriesO: 0, seriesD: 0,
  history: [],           // array of 'X'|'O'|'D'

};
let aiTimeout=null, speakAnimTimeout=null, watchTimeout=null;
const dom = {};

  } else if(s.aiThinking){
    statusStr = s.watchMode ? 'Hearty is thinking...' : 'Hearty is thinking...';
  } else {

  // Sync side menu if open

// ── speak ──
function speak(text){
  setState({bubbleVisible:false});
  setTimeout(()=>{
    setState({bubbleText:text, bubbleVisible:true, heartyAnim:'speaking', lastBubbleTime:Date.now()});
    SFX.hearty();
    clearTimeout(speakAnimTimeout);
    speakAnimTimeout = setTimeout(()=>setState({heartyAnim:'breathing'}), 750);
  }, 300);
}

// ── FANFARE duration ──
const FANFARE_DURATION = 900;

// ── Handle result ──
function handleResult(r){
  setState({result:r});
  const newHistory = [...state.history, r.winner==='draw'?'D':r.winner];
  setState({history: newHistory});

  if(r.winner==='X'){
    const streak = state.winStreakX + 1;
    setState({scores:{...state.scores, X:state.scores.X+1}, winStreakX:streak, winStreakP2:0});
    const isStreakWin = streak >= 3;
    if(isStreakWin) SFX.streakFanfare(); else SFX.fanfare();
    setTimeout(()=>setState({showCup:true}), 750);
    setTimeout(()=>launchVictoryCelebration(isStreakWin), FANFARE_DURATION);
    setTimeout(()=>{
      let msg;
      if(streak === 3){
        // First time hitting the streak threshold — announce it
        msg = pick('streakX').replace('%s', streak);
      } else {
        // Normal win message whether below or above streak threshold
        msg = state.mode==='2p'
          ? pickArr([`Well played, ${playerNames.X}!`, `${playerNames.X} wins it! Brilliant!`, `Bravo ${playerNames.X}! The grid is yours!`])
          : pick('winX');
      }
      speak(msg);
    }, FANFARE_DURATION+100);

    // Series check
    if(state.seriesMode!=='none'){
      const target = state.seriesMode==='bo3'?2:3;
      const newSX = state.seriesX + 1;
      setState({seriesX: newSX});
      if(newSX >= target) setTimeout(()=>showMatchBanner('X'), 1800);
    }

  } else if(r.winner==='O'){
    if(state.mode==='ai'){
      setState({scores:{...state.scores, O_Hearty:state.scores.O_Hearty+1}, winStreakX:0, winStreakP2:0});
      speak(pick('winO')); SFX.O();
    } else {
      const streak = state.winStreakP2 + 1;
      setState({scores:{...state.scores, O_Human:state.scores.O_Human+1}, winStreakX:0, winStreakP2:streak});
      const isStreakWin = streak >= 3;
      if(isStreakWin) SFX.streakFanfare(); else SFX.fanfare();
      setTimeout(()=>setState({showCup:true}), 750);
      setTimeout(()=>launchVictoryCelebration(isStreakWin), FANFARE_DURATION);
      setTimeout(()=>{
        let msg;
        if(streak === 3){
          // First time hitting the streak threshold — announce it
          msg = pickArr([
            `${playerNames.O} is on a ${streak}-win streak! Unstoppable! 🔥`,
            `${streak} in a row for ${playerNames.O}! What a run!`,
            `${playerNames.O} is dominating — ${streak} consecutive wins!`
          ]);
        } else {
          // Normal win message whether below or above streak threshold
          msg = pickArr([`Well played, ${playerNames.O}!`, `${playerNames.O} wins! Brilliant!`, `Bravo ${playerNames.O}! The grid is yours!`]);
        }
        speak(msg);
      }, FANFARE_DURATION+100);

      // Series check
      if(state.seriesMode!=='none'){
        const target = state.seriesMode==='bo3'?2:3;
        const newSO = state.seriesO + 1;
        setState({seriesO: newSO});
        if(newSO >= target) setTimeout(()=>showMatchBanner('O'), 1800);
      }
    }
  } else {
    setState({scores:{...state.scores, draw:state.scores.draw+1}, winStreakX:0, winStreakP2:0});
    speak(pick('draw')); SFX.draw();
    if(state.seriesMode!=='none'){
      setState({seriesD: state.seriesD+1});
      // Check if series is exhausted (all games played, no winner yet) — e.g. bo3: after 3 games
      const target = state.seriesMode==='bo3'?2:3;
      const totalGames = state.seriesMode==='bo3'?3:5;
      const gamesPlayed = state.seriesX + state.seriesO + state.seriesD + 1;
      if(gamesPlayed >= totalGames && state.seriesX < target && state.seriesO < target){
        setTimeout(()=>showMatchBanner('draw'), 1800);
      }
    }
  }
}

// ── Match banner ──
function showMatchBanner(winner){
  const target = state.seriesMode==='bo3'?2:3;
  const oLabel = state.mode==='2p' ? playerNames.O : 'Hearty';
  let title, subtitle, crown;
  if(winner==='draw'){
    crown=`<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 17a1 1 0 0 1 1 1a1 1 0 0 1 1-1"/><path d="M8 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4"/><path d="M16 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4"/><path d="M5 9a7 7 0 0 0 7 7"/><path d="M12 16a7 7 0 0 0 7-7"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`; title="It's a Tie!"; subtitle="The series ends level — a rematch is needed!";
  } else {
    const name = winner==='X' ? playerNames.X : oLabel;
    crown=`<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6-6 6 6 3-3v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6l3 3z" fill="#fbbf24" fill-opacity="0.3"/><path d="M6 9l6-6 6 6 3-3v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"/><path d="M9 21v-6h6v6"/></svg>`; title=`${name} wins the Match!`;
    subtitle = state.seriesMode==='bo3' ? 'Best of 3 complete!' : 'Best of 5 complete!';
  }
  document.getElementById('matchCrown').innerHTML = crown;
  document.getElementById('matchTitle').textContent = title;
  document.getElementById('matchSubtitle').textContent = subtitle;

  const xLabel = playerNames.X;
  document.getElementById('matchScore').innerHTML = `
    <div class="match-score-chip"><span class="num" style="color:#f43f5e">${state.seriesX}</span><span class="lbl">${xLabel}</span></div>
    <div class="match-score-chip"><span class="num" style="color:#94a3b8">${state.seriesD}</span><span class="lbl">Draws</span></div>
    <div class="match-score-chip"><span class="num" style="color:#7c3aed">${state.seriesO}</span><span class="lbl">${oLabel}</span></div>
  `;
  document.getElementById('matchBanner').classList.remove('hidden');

}
function closeMatchBanner(){ document.getElementById('matchBanner').classList.add('hidden'); }
function startNewMatch(){
  closeMatchBanner();
  setState({seriesX:0, seriesO:0, seriesD:0});
  newGame();
}

// ── handleClick ──
function handleClick(idx){
  if(state.watchMode) return;
  const cellEl = dom.cells[idx];
  // Immediately blur to prevent focus ring on mobile
  if(cellEl) cellEl.blur();
  if(state.board[idx] || state.result || (state.mode==='ai'&&!state.xIsNext)){
    if(cellEl && state.board[idx]){
      cellEl.classList.remove('shake-error');
      void cellEl.offsetWidth;
      cellEl.classList.add('shake-error');
      setTimeout(()=>cellEl.classList.remove('shake-error'), 400);
    }
    return;
  }
  // Push undo snapshot before placing
  const undoStack = [...state.undoStack, {board:[...state.board], xIsNext:state.xIsNext}];
  const b=[...state.board], marker=state.xIsNext?'X':'O';
  b[idx]=marker;
  setState({board:b, undoStack});
  SFX[marker]();
  const r=checkWinner(b);
  if(r){handleResult(r);return;}
  setState({xIsNext:!state.xIsNext});
  if(state.mode==='2p'){
    speak(getTwoPlayerComment(b, marker, idx));
  } else if(state.mode==='ai'){
    scheduleAI();
  }
}

// ── Undo ──
function undoMove(){
  if(state.undoStack.length===0||state.result||state.aiThinking||state.watchMode) return;
  const stack = [...state.undoStack];
  const prev = stack.pop();
  dom.cells.forEach(c=>{ c.dataset.val=''; });
  setState({board:prev.board, xIsNext:prev.xIsNext, undoStack:stack, result:null, showCup:false});
  SFX.undo();
  speak(pickArr([
    "Oops! Taking that back — fair enough! 😄",
    "Undo! Everyone deserves a second chance!",
    "Rewinding! This is why I love humans — always reconsidering! 🔄"
  ]));
}

// ── AI ──
function scheduleAI(){
  if(state.result||state.xIsNext) return;
  clearTimeout(aiTimeout);
  setState({aiThinking:true, heartyAnim:'wiggling'});
  aiTimeout=setTimeout(()=>{
    const b=[...state.board];
    const move=getBestMove(b, state.difficulty);
    if(move!=null){
      b[move]='O';
      setState({board:b, aiThinking:false, heartyAnim:'breathing'});
      SFX.O();
      const r=checkWinner(b);
      if(r){handleResult(r);return;}
      setState({xIsNext:true});
      speak(pick('Omove'));
    }
  }, 1200);
}

// ── AI Watch mode ──
function scheduleWatchMove(){
  if(!state.watchMode||state.result) return;
  clearTimeout(watchTimeout);
  setState({aiThinking:true, heartyAnim:'wiggling'});
  watchTimeout=setTimeout(()=>{
    const b=[...state.board];
    const marker=state.xIsNext?'X':'O';
    // Both play optimal minimax. X minimises O's score (minimax returns from O's POV so X picks lowest)
    let move;
    const empty=b.map((v,i)=>!v?i:null).filter(i=>i!==null);
    if(empty.length===0){setState({aiThinking:false,heartyAnim:'breathing'});return;}
    if(marker==='X'){
      let best=Infinity, bestMove=empty[0];
      for(const i of empty){
        const tb=[...b]; tb[i]='X';
        const s=minimax(tb,true,-Infinity,Infinity,0);
        if(s<best){best=s;bestMove=i;}
      }
      move=bestMove;
    } else {
      move=getBestMove(b,'hard');
    }
    if(move!=null){
      b[move]=marker;
      setState({board:b, aiThinking:false, heartyAnim:'breathing', xIsNext:!state.xIsNext});
      SFX[marker]();
      const r=checkWinner(b);
      if(r){handleResult(r);return;}
      speak(pickArr(["Fascinating!", "Calculated!", "Optimal play!", "Logic prevails!", "The machines are thinking..."]));
      scheduleWatchMove();
    }
  }, 900);
}

function toggleWatch(){
  clearTimeout(aiTimeout); clearTimeout(watchTimeout);
  const newWatch = !state.watchMode;
  dom.cells.forEach(c=>{c.dataset.val='';});
  setState({watchMode:newWatch, board:Array(9).fill(null), xIsNext:true, result:null,
    aiThinking:false, heartyAnim:'breathing', showCup:false, undoStack:[]});
  if(newWatch){
    speak("AI vs AI — let's see who's smarter! 🤖");
    setTimeout(scheduleWatchMove, 800);
  } else {
    speak(state.mode==='2p'?pick('twoPlayer'):pick('welcome'));
  }
}

// ── newGame ──
function newGame(){
  clearTimeout(aiTimeout); clearTimeout(watchTimeout);
  dom.cells.forEach(c=>{c.dataset.val='';});
  setState({board:Array(9).fill(null), xIsNext:true, result:null, aiThinking:false,
    heartyAnim:'breathing', showCup:false, lastBubbleTime:Date.now(), undoStack:[]});
  SFX.newGame();
  if(state.watchMode){
    speak("New round — AI vs AI! 🤖");
    setTimeout(scheduleWatchMove, 800);
  } else {
    const greeting = state.mode==='2p'
      ? pickArr([`${playerNames.X} vs ${playerNames.O}! May the best player win!`, `Here we go, ${playerNames.X} and ${playerNames.O}! Let's play!`, `New game! ${playerNames.X} goes first! Good luck both!`])
      : pick('welcome');
    speak(greeting);
  }
}

// ── switchMode ──
function switchMode(m){
  clearTimeout(aiTimeout); clearTimeout(watchTimeout);
  dom.cells.forEach(c=>{c.dataset.val='';});
  setState({mode:m, watchMode:false, board:Array(9).fill(null), xIsNext:true, result:null,
    aiThinking:false, heartyAnim:'breathing', showCup:false,
    winStreakX:0, winStreakP2:0, undoStack:[], seriesX:0, seriesO:0, seriesD:0});
  SFX.newGame();
  if(m==='2p') showNameModal(false);
  else speak(pick('welcome'));
}

function setDiff(d){ state.difficulty=d; render(); }

function setSeriesMode(m){
  setState({seriesMode:m, seriesX:0, seriesO:0, seriesD:0});
  const msgs = {none:"Free play mode — just for fun!", bo3:"Best of 3 — first to win 2 games wins the match!", bo5:"Best of 5 — first to win 3 games takes the trophy!"};
  speak(msgs[m]);
}

// ── Sound / Dark ──
function toggleSound(){
  _soundOn = !_soundOn;
  render();
}
function toggleDark(){
  const newDark = !state.darkMode;
  setState({darkMode: newDark});
  document.body.classList.toggle('dark-mode', newDark);
}

// ── Name Modal ──
let _nameModalCallback = null;
function showNameModal(isAI){
  document.getElementById('p2NameField').style.display = isAI ? 'none' : 'block';
  document.getElementById('inputP1').value = playerNames.X==='Player 1'?'':playerNames.X;
  document.getElementById('inputP2').value = playerNames.O==='Player 2'?'':playerNames.O;
  document.getElementById('nameModal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('inputP1').focus(), 100);
}
function closeNameModal(){
  const p1 = document.getElementById('inputP1').value.trim() || 'Player 1';
  const p2 = document.getElementById('inputP2').value.trim() || 'Player 2';
  playerNames.X = p1; playerNames.O = p2;
  document.getElementById('nameModal').classList.add('hidden');
  const greeting = state.mode==='2p'
    ? `${p1} vs ${p2}! Let the battle begin! ⚔️`
    : `Welcome, ${p1}! Let's play! 🎮`;
  speak(greeting);
  render();
}
document.getElementById('nameModalOk').addEventListener('click', closeNameModal);
['inputP1','inputP2'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown', e=>{ if(e.key==='Enter') closeNameModal(); });
});

// ── Auto-tip timer ──
setInterval(()=>{
  const isEmpty = state.board.every(c=>c===null);
  const isFinished = state.result!==null;
  if((isEmpty||isFinished)&&!state.aiThinking&&!state.watchMode){
    speak(pick('health'));
  }
}, 15000);

// ── Boot ──
initLayout();
render();
// Show name modal on first load in 2p mode — skip for ai mode

</script>
