<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes heartyBreathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.045); }
  }
  @keyframes heartySpeaking {
    0%   { transform: scale(1) rotate(0deg); }
    15%  { transform: scale(1.08) rotate(-4deg); }
    30%  { transform: scale(1.06) rotate(4deg); }
    45%  { transform: scale(1.09) rotate(-3deg); }
    60%  { transform: scale(1.07) rotate(3deg); }
    75%  { transform: scale(1.05) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  @keyframes drawLine {
    from { stroke-dashoffset: 40; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes drawCircle {
    from { stroke-dashoffset: 88; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes fadeSlideIn {
    from { opacity:0; transform: translateY(14px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,120,180,0); }
    50%      { box-shadow: 0 0 28px 8px rgba(255,120,180,0.2); }
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-7deg); }
    75% { transform: rotate(7deg); }
  }
  @keyframes cupPop {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    70% { transform: scale(1.2) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  @keyframes dotTyping {
    0% { transform: translateY(0px); opacity: 0.3; }
    50% { transform: translateY(-5px); opacity: 1; }
    100% { transform: translateY(0px); opacity: 0.3; }
  }
  @keyframes modalIn {
    from { opacity:0; transform: scale(0.88) translateY(20px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }
  @keyframes matchBannerIn {
    from { opacity:0; transform: scale(0.7) rotate(-4deg); }
    to   { opacity:1; transform: scale(1) rotate(0deg); }
  }
  @keyframes bubbleIn {
    from { opacity:0; transform: translateY(8px) scale(0.92); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  .shake-error {
    animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
    border-color: #f43f5e !important;
    background: rgba(254, 226, 226, 0.8) !important;
    z-index: 10;
  }
  .thinking-dots { display: -webkit-box; display: -webkit-flex; display: flex; align-items: center; justify-content: center; }
  .thinking-dots span {
    width: 8px; height: 8px; background-color: #be185d; border-radius: 50%;
    display: inline-block; animation: dotTyping 1s infinite ease-in-out;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* ── LIGHT MODE (default) ── */
  body {
    background: #ffeaf4;
  }
  #root {
    min-height: 100vh;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    -webkit-box-pack: center;
    -webkit-justify-content: center;
    justify-content: center;
    padding: 20px 16px;
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #ffeaf4 0%, #fff0e8 30%, #eaf4ff 65%, #f0eaff 100%);
    position: relative;
    overflow: hidden;
    transition: background 0.4s;
  }
  #root::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 420px 320px at 10% 15%, rgba(255,182,213,0.28) 0%, transparent 70%),
      radial-gradient(ellipse 350px 280px at 90% 10%, rgba(180,210,255,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 80% 90%, rgba(210,180,255,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 300px 250px at 5% 85%,  rgba(255,220,180,0.25) 0%, transparent 70%);
  }
  body.dark-mode #root::before { opacity: 0.4; }

  /* ── DARK MODE overrides ── */
  body.dark-mode #root {
    background: linear-gradient(160deg, #1a0a12 0%, #12100e 30%, #0a1020 65%, #130a22 100%);
  }

  .bg-hearts { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:0; overflow:hidden; }
  .bg-heart { position:absolute; opacity:0.13; display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-align:center; -webkit-align-items:center; align-items:center; -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center; }
  .bg-heart svg { width:100%; height:100%; }

  #root > * { position: relative; z-index: 1; }

  /* ── TITLE ── */
  .title { animation: fadeSlideIn 0.6s ease-out; text-align: center; margin-bottom: 14px; }
  .title h1 {
    font-size: 26px; font-weight: 900;
    color: #c0386e; letter-spacing: -0.02em;
    text-shadow: 0 2px 12px rgba(192,56,110,0.18);
  }
  body.dark-mode .title h1 { color: #f9a8d4; }
  .title-sub {
    color: #d4648a; font-size: 14px; margin-top: 4px; font-weight: 700;
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center;
    -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
  }
  body.dark-mode .title-sub { color: #e879a0; }

  /* ── TOP TOOLBAR ── */
  .top-toolbar {
    display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    margin-bottom: 8px; animation: fadeSlideIn 0.6s ease-out;
  }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid rgba(255,182,213,0.4);
    background: rgba(255,255,255,0.75);
    cursor: pointer; font-size: 17px;
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center;
    -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    transition: all 0.18s; outline: none;
  }
  body.dark-mode .icon-btn { background: rgba(30,15,25,0.85); border-color: rgba(180,60,110,0.35); }
  .icon-btn:hover { transform: scale(1.12); -webkit-filter: brightness(1.1); filter: brightness(1.1); }
  .icon-btn.muted { opacity: 0.5; }

  /* ── CONTROLS ── */
  .controls {
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-flex-wrap: wrap; flex-wrap: wrap; -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    margin-bottom: 16px; animation: fadeSlideIn 0.7s ease-out;
  }
  .btn-pill {
    font-family: 'Nunito', sans-serif; font-weight: 800;
    border-radius: 999px; padding: 7px 20px; font-size: 13px;
    cursor: pointer; border: 2px solid transparent;
    transition: all 0.18s; outline: none;
  }
  .btn-pill:hover { transform: translateY(-2px); -webkit-filter: brightness(1.07); filter: brightness(1.07); }
  .btn-pill:active { transform: scale(0.96); }
  .btn-pill.active-mode {
    background: linear-gradient(135deg,#f43f5e,#e879a0);
    color: white; box-shadow: 0 3px 14px rgba(244,63,94,0.3);
  }
  .btn-pill.inactive-mode {
    background: rgba(255,255,255,0.7); color: #a0657e;
    border-color: rgba(244,63,94,0.2);
  }
  body.dark-mode .btn-pill.inactive-mode { background: rgba(40,15,30,0.8); color: #d080a0; border-color: rgba(244,63,94,0.3); }
  .btn-pill.active-diff {
    background: rgba(167,139,250,0.18); color: #7c3aed;
    border-color: rgba(124,58,237,0.35);
  }
  .btn-pill.inactive-diff {
    background: rgba(255,255,255,0.6); color: #a89fc0;
    border-color: rgba(124,58,237,0.12);
  }
  body.dark-mode .btn-pill.inactive-diff { background: rgba(30,15,50,0.7); color: #c0a0e0; }
  .btn-pill.active-series {
    background: linear-gradient(135deg,#f59e0b,#fbbf24);
    color: white; box-shadow: 0 3px 14px rgba(245,158,11,0.3);
  }
  .btn-pill.inactive-series {
    background: rgba(255,255,255,0.6); color: #a89fc0;
    border-color: rgba(245,158,11,0.2);
  }
  body.dark-mode .btn-pill.inactive-series { background: rgba(30,15,50,0.7); color: #c0a0e0; }

  /* ── LAYOUT ── */
  .main-layout {
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-orient: vertical; -webkit-box-direction: normal;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center; width: 100%; max-width: 720px;
  }
  @media (min-width: 700px) {
    .main-layout {
      -webkit-box-orient: horizontal; -webkit-box-direction: normal;
      -webkit-flex-direction: row; flex-direction: row;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    }
  }

  /* ── HEARTY ── */
  .hearty-col {
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-orient: vertical; -webkit-box-direction: normal;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center; animation: fadeSlideIn 0.8s ease-out; width: 220px;
    -webkit-flex-shrink: 0; flex-shrink: 0;
    -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
  }
  .hearty-svg-wrap {
    transition: -webkit-filter 0.4s; transition: filter 0.4s;
    -webkit-transform-origin: center bottom; transform-origin: center bottom;
    position: relative;
  }
  .hearty-svg-wrap.breathing { animation: heartyBreathe 3s ease-in-out infinite; }
  .hearty-svg-wrap.speaking  { animation: heartySpeaking 0.7s ease-in-out; }
  .hearty-svg-wrap.wiggling  { animation: wiggle 0.5s ease-in-out infinite; }
  .gold-cup-overlay {
    position: absolute; top: -10px; right: -10px; width: 60px; height: 60px;
    animation: cupPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; z-index: 10;
  }
  .hearty-label {
    color: #d4648a; font-weight: 800; font-size: 13px;
    letter-spacing: 0.04em;
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  }
  body.dark-mode .hearty-label { color: #c080a0; }

  /* ── SPEECH BUBBLE ── */
  .speech-bubble {
    position: relative; background: white;
    border: 2.5px solid #fbb6ce; border-radius: 20px;
    padding: 8px 12px; width: 190px; height: 70px;
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center;
    -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(244,63,94,0.1);
    transition: opacity 0.3s, transform 0.3s, background 0.3s, border-color 0.3s;
  }
  body.dark-mode .speech-bubble { background: #1e0e1a; border-color: #8b3060; }
  .speech-bubble.visible { opacity:1; transform: translateY(0) scale(1); animation: bubbleIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  .speech-bubble.hidden  { opacity:0; transform: translateY(8px) scale(0.92); pointer-events:none; }
  .speech-bubble p { font-size: 12px; font-weight: 700; color: #be185d; line-height: 1.4; text-align: center; }
  body.dark-mode .speech-bubble p { color: #f9a8d4; }
  .bubble-tail {
    position: absolute; bottom: -12px; left: 50%; -webkit-transform: translateX(-50%); transform: translateX(-50%);
    width:0; height:0;
    border-left: 10px solid transparent; border-right: 10px solid transparent;
    border-top: 12px solid white;
    transition: border-top-color 0.3s;
  }
  body.dark-mode .bubble-tail { border-top-color: #1e0e1a; }
  .bubble-tail-border {
    position: absolute; bottom: -16px; left: 50%; -webkit-transform: translateX(-50%); transform: translateX(-50%);
    width:0; height:0;
    border-left: 13px solid transparent; border-right: 13px solid transparent;
    border-top: 15px solid #fbb6ce; z-index: -1;
    transition: border-top-color 0.3s;
  }
  body.dark-mode .bubble-tail-border { border-top-color: #8b3060; }

  /* ── BOARD COL ── */
  .board-col {
    -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-orient: vertical; -webkit-box-direction: normal;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center; min-width: 320px;
  }
  .score-panel {
    display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    -webkit-flex-wrap: wrap; flex-wrap: wrap;
  }
  .score-card {
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-orient: vertical; -webkit-box-direction: normal;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center;
    background: rgba(255,255,255,0.75);
    border: 2px solid rgba(255,182,213,0.4); border-radius: 16px;
    padding: 8px 16px; min-width: 80px;
    transition: background 0.3s, border-color 0.3s;
  }
  body.dark-mode .score-card { background: rgba(30,15,25,0.85); border-color: rgba(180,60,110,0.35); }
  .score-num { font-size: 26px; font-weight: 900; }
  .score-num.x    { color: #f43f5e; }
  .score-num.draw { color: #94a3b8; }
  .score-num.o    { color: #7c3aed; }
  .score-label { font-size: 11px; color: #9d6d80; margin-top: 2px; font-weight: 700; }
  body.dark-mode .score-label { color: #b06080; }

  /* ── SERIES PROGRESS ── */
  .series-bar {
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    background: rgba(255,255,255,0.7);
    border: 2px solid rgba(255,182,213,0.4);
    border-radius: 14px; padding: 6px 16px;
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
    color: #d4648a;
    transition: all 0.3s;
  }
  body.dark-mode .series-bar { background: rgba(25,10,20,0.8); border-color: rgba(180,60,110,0.35); color: #e879a0; }
  .series-pips {
    display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  }
  .pip {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid currentColor; transition: all 0.25s;
  }
  .pip.won-x   { background: #f43f5e; border-color: #f43f5e; }
  .pip.won-o   { background: #7c3aed; border-color: #7c3aed; }
  .pip.empty   { background: transparent; opacity: 0.4; }

  /* ── STATUS ── */
  .status-bar {
    text-align: center; padding: 8px 20px; border-radius: 14px; height: 40px;
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center;
    -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    background: rgba(255,255,255,0.7); border: 2px solid rgba(255,182,213,0.4);
    transition: background 0.3s, border-color 0.3s;
  }
  body.dark-mode .status-bar { background: rgba(30,15,25,0.8); border-color: rgba(180,60,110,0.35); }
  .status-bar.result { border-color: rgba(244,63,94,0.45); background: rgba(255,240,248,0.9); animation: pulseGlow 2s ease-in-out infinite; }
  body.dark-mode .status-bar.result { background: rgba(60,10,30,0.9); }
  .status-text { font-family: 'DM Mono', monospace; font-weight: 700; font-size: 14px; color: #7a4060; }
  body.dark-mode .status-text { color: #e090b0; }
  .status-text.win-x { color: #f43f5e; }
  .status-text.win-o { color: #7c3aed; }

  /* ── BOARD ── */
  .board-wrap {
    border-radius: 28px; padding: 14px;
    background: rgba(255,255,255,0.65); border: 2px solid rgba(255,182,213,0.4);
    box-shadow: 0 8px 40px rgba(244,63,94,0.1);
    width: 310px; transition: background 0.3s, border-color 0.3s;
  }
  body.dark-mode .board-wrap { background: rgba(25,12,22,0.75); border-color: rgba(180,60,110,0.35); }
  .board-grid { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; margin: -5px; }
  .cell-wrapper { width: 33.333%; padding: 5px; box-sizing: border-box; }
  .cell {
    display: block; position: relative; width: 100%; padding-bottom: 100%;
    border-radius: 18px; border: 2px solid rgba(255,182,213,0.4);
    background: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.15s; outline: none;
  }
  body.dark-mode .cell { background: rgba(40,18,35,0.7); border-color: rgba(180,60,110,0.35); }
  .cell-inner {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center;
    -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    border-radius: 16px;
  }
  .cell.disabled { cursor: default; }
  .cell.win-cell { background: rgba(255,220,235,0.8); border-color: rgba(244,63,94,0.55); box-shadow: 0 0 22px 5px rgba(255,100,160,0.25); }
  body.dark-mode .cell.win-cell { background: rgba(80,20,50,0.9); }
  .cell svg { width: 42px; height: 42px; z-index: 2; }

  /* ── BUTTONS ROW ── */
  .btn-row {
    display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center;
    -webkit-flex-wrap: wrap; flex-wrap: wrap;
    -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
  }
  .new-game-btn {
    background: linear-gradient(135deg, #f43f5e 0%, #e879a0 100%);
    color: white; font-weight: 900; font-size: 15px;
    padding: 12px 38px; border-radius: 999px; border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(244,63,94,0.3); font-family: 'Nunito', sans-serif;
    transition: all 0.18s;
  }
  .new-game-btn:hover { transform: translateY(-2px); -webkit-filter: brightness(1.07); filter: brightness(1.07); }
  .rematch-btn {
    background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
    color: white; font-weight: 900; font-size: 13px;
    padding: 10px 22px; border-radius: 999px; border: none; cursor: pointer;
    box-shadow: 0 4px 16px rgba(124,58,237,0.3); font-family: 'Nunito', sans-serif;
    transition: all 0.18s; animation: fadeSlideIn 0.4s ease-out;
  }
  .rematch-btn:hover { transform: translateY(-2px); -webkit-filter: brightness(1.07); filter: brightness(1.07); }
  .undo-btn {
    background: rgba(255,255,255,0.7); color: #d4648a;
    font-weight: 900; font-size: 13px;
    padding: 10px 18px; border-radius: 999px;
    border: 2px solid rgba(255,182,213,0.4); cursor: pointer;
    font-family: 'Nunito', sans-serif; transition: all 0.18s;
  }
  body.dark-mode .undo-btn { background: rgba(30,15,25,0.85); color: #e879a0; border-color: rgba(180,60,110,0.35); }
  .undo-btn:hover { transform: translateY(-2px); -webkit-filter: brightness(1.07); filter: brightness(1.07); }
  .undo-btn:disabled { opacity: 0.35; cursor: default; transform: none; -webkit-filter: none; filter: none; }

  /* ── HISTORY LOG ── */
  .history-log {
    background: rgba(255,255,255,0.55);
    border: 2px solid rgba(255,182,213,0.3);
    border-radius: 14px; padding: 6px 14px;
    font-size: 11px; font-weight: 700; color: #9d6d80;
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-flex-wrap: wrap; flex-wrap: wrap;
    -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    max-width: 310px;
    transition: all 0.3s;
  }
  body.dark-mode .history-log { background: rgba(25,10,20,0.7); border-color: rgba(180,60,110,0.25); color: #b06080; }
  .history-label { color: #d4648a; font-size: 10px; letter-spacing: 0.06em; }
  body.dark-mode .history-label { color: #e879a0; }
  .hist-chip { font-size: 13px; display: inline-block; }

  /* ── FOOTER ── */
  .footer { margin-top: 18px; font-size: 11px; color: #c08090; text-align: center; font-weight: 600; }

// ── Minimax ──
var WIN_LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function checkWinner(b) {
  for (var wi = 0; wi < WIN_LINES.length; wi++) {
    var a = WIN_LINES[wi][0], c = WIN_LINES[wi][1], d = WIN_LINES[wi][2];
    if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a, c, d] };

function minimax(b, isMax, alpha, beta, depth) {
  var r = checkWinner(b);
  if (r) {
    if (r.winner === 'O') return 10 - depth;
    if (r.winner === 'X') return depth - 10;
    return 0;

    var best = -_INF;
    for (var i = 0; i < 9; i++) {

        var s = minimax(b, false, alpha, beta, depth + 1);
        if (s > best) best = s;
        b[i] = null;
        if (best > alpha) alpha = best;
        if (beta <= alpha) break;
      }
    }
    return best;
  } else {
    var best2 = _INF;
    for (var j = 0; j < 9; j++) {
      if (!b[j]) {
        b[j] = 'X';
        var s2 = minimax(b, true, alpha, beta, depth + 1);
        if (s2 < best2) best2 = s2;
        b[j] = null;
        if (best2 < beta) beta = best2;
        if (beta <= alpha) break;

    return best2;
  }

  var empty = arrFilter(arrMap(board, function(v,i){ return v ? null : i; }), function(i){ return i !== null; });

  for (var i = 0; i < empty.length; i++) {
    var b = copyBoard(board);

    var sc = minimax(b, false, -_INF, _INF, 0);

  var playerName = pName(lastMarker);
  var otherName  = pName(other);
  var filled = arrFilter(board, function(v){ return !!v; }).length;

  function findThreats(marker) {
    var threats = [];
    for (var li = 0; li < WIN_LINES.length; li++) {
      var line = WIN_LINES[li];
      var marks = 0, empties = [];
      for (var j = 0; j < 3; j++) {
        if (board[line[j]] === marker) marks++;
        else if (!board[line[j]]) empties.push(line[j]);
      }
      if (marks === 2 && empties.length === 1) threats.push(empties[0]);
    }
    return threats;
  }
  function wasABlock() {
    var temp = copyBoard(board); temp[lastIdx] = null;
    var oppThreats = findThreats(other);
    return arrIncludes(oppThreats, lastIdx);
  }
  function createdFork() { return findThreats(lastMarker).length >= 2; }

  var myThreats  = findThreats(lastMarker);
  var oppThreats = findThreats(other);
  var blocked    = wasABlock();
  var tookCenter = lastIdx === 4;
  var tookCorner = arrIncludes([0,2,6,8], lastIdx);

  if (myThreats.length >= 2) return pickArr([
    'Whoa -- ' + playerName + ' just set up TWO winning paths! ' + otherName + ', you cannot block both!',
    'A FORK! ' + playerName + ' is sneaky -- two threats at once! ' + otherName + ' is in big trouble!',
    playerName + ' laid a trap -- double threat! ' + otherName + ' better think fast!'
  ]);
  if (myThreats.length === 1 && filled >= 4) return pickArr([
    playerName + ' is one move away from winning! Can ' + otherName + ' block in time?!',
    'Watch out ' + otherName + '! ' + playerName + ' is threatening to win right now!',
    'One more move and ' + playerName + ' wins! This is so tense!'
  ]);
  if (blocked && oppThreats.length === 0) return pickArr([
    'Nice block, ' + playerName + '! ' + otherName + ' thought they had you there!',
    'Phew! ' + playerName + ' shut that down just in time! Great defence!',
    playerName + ' saw the danger and plugged it! Very sharp!'
  ]);
  if (createdFork()) return pickArr([
    playerName + ' is setting up something sneaky! I see what you\'re doing!',
    'Ooh, ' + playerName + ' is thinking two steps ahead! Very devious!',
    'Clever positioning from ' + playerName + '! That could open up multiple routes...'
  ]);
  if (tookCenter && filled === 1) return pickArr([
    'Center square first! Classic power move from ' + playerName + '! The textbook opening!',
    playerName + ' grabs the center -- always the hot seat! Smart start!',
    'Oh, the center! ' + playerName + ' knows their Noughts & Crosses theory!'
  ]);
  if (tookCorner && filled <= 3) return pickArr([
    'A corner play! ' + playerName + ' is thinking strategically already!',
    'Corners are powerful -- ' + playerName + ' knows the game!',
    playerName + ' taking corners early -- that\'s solid fundamentals!'
  ]);
  if (oppThreats.length >= 2) return pickArr([
    otherName + ' is setting up forks left and right! ' + playerName + ', be very careful now!',
    'Careful ' + playerName + '! ' + otherName + ' has TWO threats brewing!',
    otherName + ' is playing a trap game! ' + playerName + ' needs to start defending!'
  ]);
  if (filled === 2) return pickArr([
    'Only two moves in and it\'s already getting interesting!',
    'The opening moves have been made -- now the real battle begins!',
    'We\'re just getting started! May the best player win!'
  ]);
  if (filled >= 6) return pickArr([
    'We\'re in the endgame now! Every square counts!',
    'The board is filling up fast -- this is where it gets real!',
    'Not many moves left! The pressure is on!'
  ]);
  return pickArr([
    playerName + ' has made their mark! Your move, ' + otherName + '!',
    'Interesting choice from ' + playerName + '! Let\'s see what ' + otherName + ' does...',
    'Good move, ' + playerName + '! The plot thickens! ' + otherName + ', the floor is yours.',
    playerName + ' plays! Now ' + otherName + ' has some thinking to do...',
    'Ooh, ' + playerName + ' went there! Bold! What\'s the counter-play, ' + otherName + '?'
  ]);
}

// ── speak ──
function speak(text) {
  setState({ bubbleVisible: false });
  setTimeout(function() {
    setState({ bubbleText: text, bubbleVisible: true, heartyAnim: 'speaking', lastBubbleTime: Date.now() });
    SFX.hearty();
    clearTimeout(speakAnimTimeout);
    speakAnimTimeout = setTimeout(function() { setState({ heartyAnim: 'breathing' }); }, 750);
  }, 300);
}

var FANFARE_DURATION = 900;

// ── Handle result ──
function handleResult(r) {
  setState({ result: r });
  var newHistory = state.history.slice(0);
  newHistory.push(r.winner === 'draw' ? 'D' : r.winner);
  setState({ history: newHistory });

  if (r.winner === 'X') {
    var streak = state.winStreakX + 1;
    var newScores = objAssign({}, state.scores); newScores.X = state.scores.X + 1;
    setState({ scores: newScores, winStreakX: streak, winStreakP2: 0 });
    var isStreakWin = streak >= 3;
    if (isStreakWin) SFX.streakFanfare(); else SFX.fanfare();
    setTimeout(function() { setState({ showCup: true }); }, 750);
    setTimeout(function() { launchVictoryCelebration(isStreakWin); }, FANFARE_DURATION);
    (function(streakVal, streakWin) {
      setTimeout(function() {
        var msg;
        if (streakWin) {
          msg = pick('streakX').replace('%s', streakVal);
        } else {
          msg = state.mode === '2p'
            ? pickArr(['Well played, ' + playerNames.X + '!', playerNames.X + ' wins it! Brilliant!', 'Bravo ' + playerNames.X + '! The grid is yours!'])
            : pick('winX');
        }
        speak(msg);
      }, FANFARE_DURATION + 100);
    })(streak, isStreakWin);

    if (state.seriesMode !== 'none') {
      var target = state.seriesMode === 'bo3' ? 2 : 3;
      var newSX = state.seriesX + 1;
      setState({ seriesX: newSX });
      if (newSX >= target) { (function(){ setTimeout(function(){ showMatchBanner('X'); }, 1800); })(); }
    }

  } else if (r.winner === 'O') {
    if (state.mode === 'ai') {
      var ns2 = objAssign({}, state.scores); ns2.O_Hearty = state.scores.O_Hearty + 1;
      setState({ scores: ns2, winStreakX: 0, winStreakP2: 0 });
      speak(pick('winO')); SFX.O();
    } else {
      var streak2 = state.winStreakP2 + 1;
      var ns3 = objAssign({}, state.scores); ns3.O_Human = state.scores.O_Human + 1;
      setState({ scores: ns3, winStreakX: 0, winStreakP2: streak2 });
      var isStreakWin2 = streak2 >= 3;
      if (isStreakWin2) SFX.streakFanfare(); else SFX.fanfare();
      setTimeout(function() { setState({ showCup: true }); }, 750);
      setTimeout(function() { launchVictoryCelebration(isStreakWin2); }, FANFARE_DURATION);
      (function(s2, sw2) {
        setTimeout(function() {
          var msg2;
          if (sw2) {
            msg2 = pickArr([
              playerNames.O + ' is on a ' + s2 + '-win streak! Unstoppable!',
              s2 + ' in a row for ' + playerNames.O + '! What a run!',
              playerNames.O + ' is dominating -- ' + s2 + ' consecutive wins!'
            ]);
          } else {
            msg2 = pickArr(['Well played, ' + playerNames.O + '!', playerNames.O + ' wins! Brilliant!', 'Bravo ' + playerNames.O + '! The grid is yours!']);
          }
          speak(msg2);
        }, FANFARE_DURATION + 100);
      })(streak2, isStreakWin2);

      if (state.seriesMode !== 'none') {
        var target2 = state.seriesMode === 'bo3' ? 2 : 3;
        var newSO = state.seriesO + 1;
        setState({ seriesO: newSO });
        if (newSO >= target2) { setTimeout(function(){ showMatchBanner('O'); }, 1800); }
      }
    }
  } else {
    var ns4 = objAssign({}, state.scores); ns4.draw = state.scores.draw + 1;
    setState({ scores: ns4, winStreakX: 0, winStreakP2: 0 });
    speak(pick('draw')); SFX.draw();
    if (state.seriesMode !== 'none') {
      setState({ seriesD: state.seriesD + 1 });
      var target3 = state.seriesMode === 'bo3' ? 2 : 3;
      var totalGames = state.seriesMode === 'bo3' ? 3 : 5;
      var gamesPlayed = state.seriesX + state.seriesO + state.seriesD + 1;
      if (gamesPlayed >= totalGames && state.seriesX < target3 && state.seriesO < target3) {
        setTimeout(function(){ showMatchBanner('draw'); }, 1800);
      }
    }
  }
}

// ── Match banner ──
function showMatchBanner(winner) {
  var oLabel = state.mode === '2p' ? playerNames.O : 'Hearty';
  var title, subtitle, crown;
  if (winner === 'draw') {
    crown = '<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 17a1 1 0 0 1 1 1a1 1 0 0 1 1-1"/><path d="M8 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4"/><path d="M16 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4"/><path d="M5 9a7 7 0 0 0 7 7"/><path d="M12 16a7 7 0 0 0 7-7"/><line x1="8" y1="12" x2="16" y2="12"/></svg>';
    title = "It's a Tie!"; subtitle = "The series ends level -- a rematch is needed!";
  } else {
    var name = winner === 'X' ? playerNames.X : oLabel;
    crown = '<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6-6 6 6 3-3v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6l3 3z" fill="#fbbf24" fill-opacity="0.3"/><path d="M6 9l6-6 6 6 3-3v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"/><path d="M9 21v-6h6v6"/></svg>';
    title = name + ' wins the Match!';
    subtitle = state.seriesMode === 'bo3' ? 'Best of 3 complete!' : 'Best of 5 complete!';
  }
  document.getElementById('matchCrown').innerHTML = crown;
  document.getElementById('matchTitle').textContent = title;
  document.getElementById('matchSubtitle').textContent = subtitle;

  var xLabel = playerNames.X;
  document.getElementById('matchScore').innerHTML =
    '<div class="match-score-chip"><span class="num" style="color:#f43f5e">' + state.seriesX + '</span><span class="lbl">' + xLabel + '</span></div>' +
    '<div class="match-score-chip"><span class="num" style="color:#94a3b8">' + state.seriesD + '</span><span class="lbl">Draws</span></div>' +
    '<div class="match-score-chip"><span class="num" style="color:#7c3aed">' + state.seriesO + '</span><span class="lbl">' + oLabel + '</span></div>';
  document.getElementById('matchBanner').className = 'match-banner';
  launchVictoryCelebration(true);
}
function closeMatchBanner() { document.getElementById('matchBanner').className = 'match-banner hidden'; }
function startNewMatch() {
  closeMatchBanner();
  setState({ seriesX:0, seriesO:0, seriesD:0 });
  newGame();
}

// ── handleClick ──
function handleClick(idx) {
  if (state.watchMode) return;
  var cellEl = dom.cells[idx];
  if (state.board[idx] || state.result || (state.mode==='ai'&&!state.xIsNext)) {
    if (cellEl && state.board[idx]) {
      cellEl.className = cellEl.className.replace(' shake-error','');
      void cellEl.offsetWidth;
      cellEl.className += ' shake-error';
      setTimeout(function() { cellEl.className = cellEl.className.replace(' shake-error',''); }, 400);
    }
    return;
  }
  var undoStack = state.undoStack.slice(0);
  undoStack.push({ board: copyBoard(state.board), xIsNext: state.xIsNext });
  var b = copyBoard(state.board);
  var marker = state.xIsNext ? 'X' : 'O';
  b[idx] = marker;
  setState({ board: b, undoStack: undoStack });
  SFX[marker]();
  var r = checkWinner(b);
  if (r) { handleResult(r); return; }
  setState({ xIsNext: !state.xIsNext });
  if (state.mode === '2p') {
    speak(getTwoPlayerComment(b, marker, idx));
  } else if (state.mode === 'ai') {
    scheduleAI();
  }
}

// ── Undo ──
function undoMove() {
  if (state.undoStack.length===0||state.result||state.aiThinking||state.watchMode) return;
  var stack = state.undoStack.slice(0);
  var prev = stack.pop();
  for (var i = 0; i < dom.cells.length; i++) { dom.cells[i].setAttribute('data-val',''); }
  setState({ board: prev.board, xIsNext: prev.xIsNext, undoStack: stack, result: null, showCup: false });
  SFX.undo();
  speak(pickArr([
    "Oops! Taking that back -- fair enough!",
    "Undo! Everyone deserves a second chance!",
    "Rewinding! This is why I love humans -- always reconsidering!"
  ]));
}

// ── AI ──
function scheduleAI() {
  if (state.result || state.xIsNext) return;
  clearTimeout(aiTimeout);
  setState({ aiThinking: true, heartyAnim: 'wiggling' });
  aiTimeout = setTimeout(function() {
    var b = copyBoard(state.board);
    var move = getBestMove(b, state.difficulty);
    if (move != null) {
      b[move] = 'O';
      setState({ board: b, aiThinking: false, heartyAnim: 'breathing' });
      SFX.O();
      var r = checkWinner(b);
      if (r) { handleResult(r); return; }
      setState({ xIsNext: true });
      speak(pick('Omove'));
    }
  }, 1200);
}

// ── AI Watch mode ──
function scheduleWatchMove() {
  if (!state.watchMode || state.result) return;
  clearTimeout(watchTimeout);
  setState({ aiThinking: true, heartyAnim: 'wiggling' });
  watchTimeout = setTimeout(function() {
    var b = copyBoard(state.board);
    var marker = state.xIsNext ? 'X' : 'O';
    var empty = arrFilter(arrMap(b, function(v,i){ return v ? null : i; }), function(i){ return i !== null; });
    if (empty.length === 0) { setState({ aiThinking: false, heartyAnim: 'breathing' }); return; }
    var move;
    if (marker === 'X') {
      var bestScore = _INF, bestMove = empty[0];
      for (var i = 0; i < empty.length; i++) {
        var tb = copyBoard(b); tb[empty[i]] = 'X';
        var sc = minimax(tb, true, -_INF, _INF, 0);
        if (sc < bestScore) { bestScore = sc; bestMove = empty[i]; }
      }
      move = bestMove;
    } else {
      move = getBestMove(b, 'hard');
    }
    if (move != null) {
      b[move] = marker;
      setState({ board: b, aiThinking: false, heartyAnim: 'breathing', xIsNext: !state.xIsNext });
      SFX[marker]();
      var r = checkWinner(b);
      if (r) { handleResult(r); return; }
      speak(pickArr(["Fascinating!", "Calculated!", "Optimal play!", "Logic prevails!", "The machines are thinking..."]));
      scheduleWatchMove();
    }
  }, 900);
}

function toggleWatch() {
  clearTimeout(aiTimeout); clearTimeout(watchTimeout);
  var newWatch = !state.watchMode;
  for (var i = 0; i < dom.cells.length; i++) { dom.cells[i].setAttribute('data-val',''); }
  setState({ watchMode: newWatch, board: makeBoard(), xIsNext: true, result: null,
    aiThinking: false, heartyAnim: 'breathing', showCup: false, undoStack: [] });
  if (newWatch) {
    speak("AI vs AI -- let's see who's smarter!");
    setTimeout(scheduleWatchMove, 800);
  } else {
    speak(state.mode === '2p' ? pick('welcome') : pick('welcome'));
  }
}

// ── newGame ──
function newGame() {
  clearTimeout(aiTimeout); clearTimeout(watchTimeout);
  for (var i = 0; i < dom.cells.length; i++) { dom.cells[i].setAttribute('data-val',''); }
  setState({ board: makeBoard(), xIsNext: true, result: null, aiThinking: false,
    heartyAnim: 'breathing', showCup: false, lastBubbleTime: Date.now(), undoStack: [] });
  SFX.newGame();
  if (state.watchMode) {
    speak("New round -- AI vs AI!");
    setTimeout(scheduleWatchMove, 800);
  } else {
    var greeting = state.mode === '2p'
      ? pickArr([playerNames.X + ' vs ' + playerNames.O + '! May the best player win!', 'Here we go, ' + playerNames.X + ' and ' + playerNames.O + '! Let\'s play!', 'New game! ' + playerNames.X + ' goes first! Good luck both!'])
      : pick('welcome');
    speak(greeting);
  }
}

// ── switchMode ──
function switchMode(m) {
  clearTimeout(aiTimeout); clearTimeout(watchTimeout);
  for (var i = 0; i < dom.cells.length; i++) { dom.cells[i].setAttribute('data-val',''); }
  setState({ mode: m, watchMode: false, board: makeBoard(), xIsNext: true, result: null,
    aiThinking: false, heartyAnim: 'breathing', showCup: false,
    winStreakX: 0, winStreakP2: 0, undoStack: [], seriesX: 0, seriesO: 0, seriesD: 0 });
  SFX.newGame();
  if (m === '2p') showNameModal(false);
  else speak(pick('welcome'));
}

function setDiff(d) { state.difficulty = d; render(); }

function setSeriesMode(m) {
  setState({ seriesMode: m, seriesX: 0, seriesO: 0, seriesD: 0 });
  var msgs = { none: "Free play mode -- just for fun!", bo3: "Best of 3 -- first to win 2 games wins the match!", bo5: "Best of 5 -- first to win 3 games takes the trophy!" };
  speak(msgs[m]);
}

// ── Sound / Dark ──
function toggleSound() { _soundOn = !_soundOn; render(); }
function toggleDark() {
  var newDark = !state.darkMode;
  setState({ darkMode: newDark });
  if (newDark) document.body.className = 'dark-mode';
  else document.body.className = '';
}

// ── Name Modal ──
function showNameModal(isAI) {
  document.getElementById('p2NameField').style.display = isAI ? 'none' : 'block';
  document.getElementById('inputP1').value = playerNames.X === 'Player 1' ? '' : playerNames.X;
  document.getElementById('inputP2').value = playerNames.O === 'Player 2' ? '' : playerNames.O;
  document.getElementById('nameModal').className = 'modal-overlay';
  setTimeout(function() { document.getElementById('inputP1').focus(); }, 100);
}
function closeNameModal() {
  var p1 = document.getElementById('inputP1').value;
  if (p1) p1 = p1.replace(/^\s+|\s+$/g, ''); p1 = p1 || 'Player 1';
  var p2 = document.getElementById('inputP2').value;
  if (p2) p2 = p2.replace(/^\s+|\s+$/g, ''); p2 = p2 || 'Player 2';
  playerNames.X = p1; playerNames.O = p2;
  document.getElementById('nameModal').className = 'modal-overlay hidden';
  var greeting = state.mode === '2p'
    ? p1 + ' vs ' + p2 + '! Let the battle begin!'
    : 'Welcome, ' + p1 + '! Let\'s play!';
  speak(greeting);
  render();
}
document.getElementById('nameModalOk').addEventListener('click', closeNameModal);
document.getElementById('inputP1').addEventListener('keydown', function(e) { if (e.keyCode === 13) closeNameModal(); });
document.getElementById('inputP2').addEventListener('keydown', function(e) { if (e.keyCode === 13) closeNameModal(); });

// ── initLayout ──
function initLayout() {
  var cellsHTML = '';
  for (var ci = 0; ci < 9; ci++) {
    cellsHTML += '<div class="cell-wrapper"><button id="cell-' + ci + '" class="cell" onclick="handleClick(' + ci + ')"></button></div>';
  }

  document.getElementById('root').innerHTML =
    '<div class="title">' +
      '<h1>Noughts &amp; Crosses</h1>' +
      '<div class="title-sub">with Hearty <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px;color:#c0386e"><path d="M9 3L5 9l7 1 7-1-4-6z" fill="#7c3aed" fill-opacity="0.3" stroke="#7c3aed"/><path d="M12 10v11"/><path d="M8 21h8"/><circle cx="12" cy="10" r="1" fill="#fbbf24" stroke="none"/></svg></div>' +
    '</div>' +

      '<button class="icon-btn" id="soundBtn" onclick="toggleSound()" title="Toggle sound"></button>' +

      '<button class="icon-btn" onclick="showNameModal(state.mode===\'ai\')" title="Change player names"><svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
    '</div>' +
    '<div id="controls" class="controls"></div>' +
    '<div class="main-layout">' +
      '<div class="hearty-col">' +
        '<div id="bubble" class="speech-bubble">' +
          '<div id="bubbleContent" style="width:100%"></div>' +
          '<div class="bubble-tail-border"></div>' +
          '<div class="bubble-tail"></div>' +
        '</div>' +
        '<div id="heartyWrap" class="hearty-svg-wrap"></div>' +
        '<span class="hearty-label">Hearty <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;color:#d4648a"><path d="M9 3L5 9l7 1 7-1-4-6z" fill="#7c3aed" fill-opacity="0.3" stroke="#7c3aed"/><path d="M12 10v11"/><path d="M8 21h8"/><circle cx="12" cy="10" r="1" fill="#fbbf24" stroke="none"/></svg></span>' +
      '</div>' +

          '<div class="score-card"><span class="score-num draw" id="score-draw-val">0</span><span class="score-label">Draws</span></div>' +
          '<div class="score-card"><span class="score-num o" id="score-O-val">0</span><span class="score-label" id="score-O-lbl">Hearty (O)</span></div>' +
        '</div>' +
        '<div id="seriesBar" class="series-bar" style="display:none"></div>' +
        '<div id="statusBar" class="status-bar">' +
          '<span id="statusText" class="status-text"></span>' +
        '</div>' +
        '<div class="board-wrap">' +
          '<div id="grid" class="board-grid">' + cellsHTML + '</div>' +
        '</div>' +
        '<div class="btn-row">' +
          '<button class="undo-btn" id="undoBtn" onclick="undoMove()" disabled><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;margin-right:4px"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>Undo</button>' +
          '<button class="new-game-btn" onclick="newGame()">&#10022; New Game</button>' +
          '<button class="rematch-btn" id="rematchBtn" onclick="newGame()" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;margin-right:4px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Rematch</button>' +

// ── Auto-tip timer ──
setInterval(function() {
  var isEmpty = arrEvery(state.board, function(c){ return c === null; });
  var isFinished = state.result !== null;
  if ((isEmpty || isFinished) && !state.aiThinking && !state.watchMode) {
    speak(pick('health'));
  }
}, 15000);

// ── Boot ──
initLayout();
render();
</script>
