function createFirework(x,y,big){
  SFX.firework(); // audio always stays on main thread
  if(_fwWorker){
    _fwWorker.postMessage({type:'burst', x:x, y:y, big:!!big});
  } else {
    // Fallback particle classes (identical logic, main-thread ctx)
    var palette=FW_PALETTES[Math.floor(Math.random()*FW_PALETTES.length)];
    var count=big?90:50, starCount=big?18:10;
    var c=_fbCtx;
    function FbParticle(px,py,col,pbig,isStar){
      this.x=px; this.y=py; this.color=col;
      this.angle=Math.random()*Math.PI*2;
      this.speed=Math.random()*(pbig?10:7)+(pbig?3:2);
      this.friction=0.94; this.gravity=0.10; this.alpha=1;
      this.decay=isStar?(Math.random()*0.03+0.04):(Math.random()*0.012+0.012);
      this.size=isStar?(Math.random()*3+3):(pbig?(Math.random()*2+1.2):1.8);
      this.isStar=isStar; this.life=0;
    }
    FbParticle.prototype.update=function(){
      this.life++; this.speed*=this.friction;
      this.x+=Math.cos(this.angle)*this.speed;
      this.y+=Math.sin(this.angle)*this.speed+this.gravity;
      var tw=this.isStar?0:Math.sin(this.life*0.8)*0.12;
      this.alpha=Math.max(0,this.alpha-this.decay+tw);
    };
    FbParticle.prototype.draw=function(){
      c.globalAlpha=Math.max(0,this.alpha);
      if(this.isStar){
        c.strokeStyle=this.color; c.lineWidth=this.size*0.7; c.lineCap='round';
        c.beginPath(); c.moveTo(this.x,this.y);
        c.lineTo(this.x-Math.cos(this.angle)*this.speed*2.2,this.y-Math.sin(this.angle)*this.speed*2.2);
        c.stroke();
      } else {
        c.fillStyle=this.color; c.beginPath(); c.arc(this.x,this.y,this.size,0,Math.PI*2); c.fill();
      }
    };
    function FbShell(px,py){ this.x=px; this.y=py; this.vy=-6; this.alpha=0.9; this.size=2.5; }
    FbShell.prototype.update=function(){ this.vy*=0.85; this.y+=this.vy; this.alpha-=0.12; };
    FbShell.prototype.draw=function(){ c.globalAlpha=Math.max(0,this.alpha); c.fillStyle='#fff'; c.beginPath(); c.arc(this.x,this.y,this.size,0,Math.PI*2); c.fill(); };
    for(var t=0;t<5;t++) _fbParticles.push(new FbShell(x+Math.random()*4-2,y+t*8));

  }

    if(_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume();

    document.body.classList.add('app-hidden');
    if(_fwWorker) _fwWorker.postMessage({type:'pause'});

    if(_audioCtx && _audioCtx.state === 'running' && !window._musicHandleVisibility) {

function launchVictoryCelebration(big){
  if (document.body.getAttribute('data-theme') === 'neon') {
    document.body.classList.add('neon-crt-pause');
  }
  canvas.style.willChange = 'transform';
  var count=0;
  var total = big ? 14 : 8;
  var interval=setInterval(function(){
    createFirework(Math.random()*window.innerWidth, Math.random()*(window.innerHeight*0.6), big);
    count++;
    if(count>total) clearInterval(interval);
  }, big ? 250 : 350);
}

  if(!_audioCtx||!_soundOn) return;
  type=type||'sine'; dur=dur||0.18; vol=vol||0.22;
  try{
    if(_audioCtx.state==='suspended') _audioCtx.resume();
    const osc=_audioCtx.createOscillator(), gain=_audioCtx.createGain();
    osc.connect(gain); gain.connect(_audioCtx.destination);
    osc.type=type; osc.frequency.setValueAtTime(freq,_audioCtx.currentTime);
    gain.gain.setValueAtTime(vol,_audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,_audioCtx.currentTime+dur);
    osc.start(_audioCtx.currentTime); osc.stop(_audioCtx.currentTime+dur);
  }catch(e){}
}

// ════════════════════════════════════════════════════════════════════════════
// MISÈRE (REVERSE) — game logic
// Same board as Classic but the player who completes three in a row LOSES.
// Their opponent wins. Draws are still draws.
// mState is null when not in Misère mode.
// ════════════════════════════════════════════════════════════════════════════

var mState = null;
var _mAiTimeout = null;

function mInitState() {
  return {
    board: Array(9).fill(null),
    xIsNext: (Math.random() < 0.5),
    result: null,       // null | {winner:'X'|'O'|'draw', line:[]}
    mode: 'ai',
    difficulty: 'easy',
    aiThinking: false,
    undoSnapshot: null, // single undo
    scoresX: 0, scoresDraw: 0, scoresO: 0,
  };
}

// In Misère: whoever completes a line LOSES — so their OPPONENT wins.
// A full board with no line is still a draw.
function mCheckResult(board) {
  var r = checkWinner(board);
  if (!r) return null;
  if (r.winner === 'draw') return { winner: 'draw', line: [] };
  // The player who just completed the line loses — invert winner
  var loser = r.winner;
  return { winner: loser === 'X' ? 'O' : 'X', loser: loser, line: r.line };
}

// Misère minimax — score is from O's perspective as normal minimax,
// but winning lines are bad for the player who makes them.
// We achieve this by swapping the sign: completing a line = score of -10
// for the player who did it (they lose in Misère).
function mMinimax(b, isMax, alpha, beta, depth) {
  // Check for a completed line (the completer loses)
  var raw = checkWinner(b);
  if (raw) {
    if (raw.winner === 'draw') return 0;
    // raw.winner is whoever completed the line — they LOSE
    // isMax = O's turn just ended (O maximises), isMin = X's turn just ended
    // If raw.winner === 'O' (O just made a line) → O loses → score is negative for O
    if (raw.winner === 'O') return depth - 10;  // O lost (bad for maximiser)
    if (raw.winner === 'X') return 10 - depth;  // X lost (good for maximiser = O)
  }
  if (isMax) {
    var best = -Infinity;
    for (var i = 0; i < 9; i++) {
      if (b[i]) continue;
      b[i] = 'O';
      best = Math.max(best, mMinimax(b, false, alpha, beta, depth + 1));
      b[i] = null;
      alpha = Math.max(alpha, best);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    var best2 = Infinity;
    for (var j = 0; j < 9; j++) {
      if (b[j]) continue;
      b[j] = 'X';
      best2 = Math.min(best2, mMinimax(b, true, alpha, beta, depth + 1));
      b[j] = null;
      beta = Math.min(beta, best2);
      if (beta <= alpha) break;
    }
    return best2;
  }
}

function mGetBestMove(board, diff) {
  var empty = board.map(function(v,i){ return !v ? i : null; }).filter(function(i){ return i !== null; });
  if (!empty.length) return null;
  if (diff === 'easy' && Math.random() < 0.7) return empty[Math.floor(Math.random() * empty.length)];
  if (diff === 'medium' && Math.random() < 0.35) return empty[Math.floor(Math.random() * empty.length)];
  var best = -Infinity, move = null;
  for (var k = 0; k < empty.length; k++) {
    var i = empty[k];
    var b = board.slice();
    b[i] = 'O';
    var s = mMinimax(b, false, -Infinity, Infinity, 0);
    if (s > best) { best = s; move = i; }
  }
  return move;
}

  if (!_tutorialActive && !mState.result && mState.mode === 'ai' && !mState.xIsNext) {
    mState.aiThinking = true;

  }
}

function mDoAIMove() {

  if (!mState || mState.result) return;
  var move = mGetBestMove(mState.board, mState.difficulty);
  if (move === null) return;
  var b = mState.board.slice();
  b[move] = 'O';
  mState.board = b;
  mState.xIsNext = true;
  mState.aiThinking = false;
  SFX.O();
  var r = mCheckResult(b);
  if (r) {
    mState.result = r;
    mHandleResult();
    return;
  }
  speak(pickArr([
    "Sneaky! I avoided that trap!",
    "Boop — but I won't complete a line!",
    "I'm trying NOT to win... this is hard!",
    "In Misère I lose if I get three in a row!",
  ]));
  mRender();
}

function mHandleResult() {
  var r = mState.result;
  // Draw the strike-through line on the Misère board (target mBoardWrap
  // explicitly so we don't accidentally hit the hidden Classic board-wrap).
  if (r.line && r.line.length === 3) {
    // r.loser completed the line — draw it in their colour
    var lineWinner = r.loser || (r.winner === 'X' ? 'O' : 'X');
    setTimeout(function() {
      if (window.drawWinLine) window.drawWinLine(r.line, lineWinner, 'mBoardWrap');
    }, 80);
  }
  if (r.winner === 'draw') {
    mState.scoresDraw = (mState.scoresDraw || 0) + 1;
    setState({ winStreakX: 0, winStreakP2: 0, lossStreak: 0 });
    SFX.draw();
    speak(pickArr([
      'A draw! Neither of you fell for it!',
      'Perfect Misère — nobody completed a line!',
      'Incredible defensive play from both sides!',
    ]), true);
  } else if (r.winner === 'X') {
    mState.scoresX = (mState.scoresX || 0) + 1;
    var streak = (state.winStreakX || 0) + 1;
    setState({ winStreakX: streak, winStreakP2: 0, lossStreak: 0 });
    var isStreakWin = streak >= 3;
    if (isStreakWin) SFX.streakFanfare(); else SFX.fanfare();
    HAP.win();
    launchVictoryCelebration(isStreakWin);
    setTimeout(function(){ mState.showCup = true; mRender(); }, 750);
    var msg;
    if (streak === 3) {
      msg = pick('streakX').replace('%s', streak);
    } else {
      msg = pickArr([
        playerNames.X + ' wins! You forced the line!',
        'Brilliant Misère play — ' + playerNames.X + ' wins!',
        'You made Hearty trap itself! Well played!',
        playerNames.X + ' is the Misère master!',
      ]);
    }
    speak(msg, true);
  } else {
    mState.scoresO = (mState.scoresO || 0) + 1;
    if (mState.mode === '2p') {
      var streakP2 = (state.winStreakP2 || 0) + 1;
      setState({ winStreakX: 0, winStreakP2: streakP2, lossStreak: 0 });
      var isStreakWinP2 = streakP2 >= 3;
      if (isStreakWinP2) SFX.streakFanfare(); else SFX.fanfare();
      HAP.win();
      launchVictoryCelebration(isStreakWinP2);
      setTimeout(function(){ mState.showCup = true; mRender(); }, 750);
      var msgP2;
      if (streakP2 === 3) {
        msgP2 = pickArr([
          playerNames.O + ' is on a ' + streakP2 + '-win streak! Unstoppable! 🔥',
          streakP2 + ' in a row for ' + playerNames.O + '! What a run!',
          playerNames.O + ' is dominating — ' + streakP2 + ' consecutive wins!'
        ]);
      } else {
        msgP2 = pickArr([
          playerNames.O + ' wins Misère!',
          playerNames.O + ' forced the win! Nicely done!',
          'Brilliant Misère play from ' + playerNames.O + '!',
        ]);
      }
      speak(msgP2, true);
    } else {
      var newLossStreak = (state.lossStreak || 0) + 1;
      setState({ winStreakX: 0, winStreakP2: 0, lossStreak: newLossStreak });
      SFX.O();
      speak(pickArr([
        'Hearty wins Misère! You completed a line!',
        'Caught in your own trap! Better luck next time!',
        'Hearty forced you into a line — clever!',
      ]), true);
    }
  }
  mRender();
}

function mNewGame() {


  clearTimeout(_mAiTimeout);

  if (window.clearWinLine) window.clearWinLine('mBoardWrap');

  // attributes, preventing stale delta-update state across games.
  var _mGridEl = document.getElementById('mGrid');
  if (_mGridEl) _mGridEl.innerHTML = '';
  var prev = mState ? { scoresX: mState.scoresX||0, scoresDraw: mState.scoresDraw||0, scoresO: mState.scoresO||0 } : { scoresX:0, scoresDraw:0, scoresO:0 };
  mState = mInitState();

  mState.difficulty = state.difficulty;

function mUndoMove() {
  if (!mState || !mState.undoSnapshot || mState.result || mState.aiThinking) return;
  mState.board = mState.undoSnapshot.board;
  mState.xIsNext = mState.undoSnapshot.xIsNext;

}

function getTwoPlayerComment(board, lastMarker, lastIdx) {
  const other = lastMarker === 'X' ? 'O' : 'X';
  const playerName = pName(lastMarker);
  const otherName  = pName(other);
  const filled = board.filter(Boolean).length;

  function findThreats(marker) {
    const threats = [];
    for (const line of WIN_LINES) {
      const marks = line.filter(i => board[i] === marker);
      const empties = line.filter(i => !board[i]);
      if (marks.length === 2 && empties.length === 1) threats.push(empties[0]);
    }
    return threats;
  }
  function wasABlock() {
    const temp = [...board]; temp[lastIdx] = null;
    const opponentThreats = findThreats(other);
    return opponentThreats.includes(lastIdx);
  }
  function createdFork() { return findThreats(lastMarker).length >= 2; }

  const myThreats  = findThreats(lastMarker);
  const oppThreats = findThreats(other);
  const blocked    = wasABlock();
  const fork       = createdFork();
  const tookCenter = lastIdx === 4;
  const tookCorner = [0,2,6,8].includes(lastIdx);

  if (myThreats.length >= 2) return pickArr([

  if (blocked && oppThreats.length === 0) return pickArr([

  if (fork) return pickArr([

// ── setState / render ──
// scheduleRender batches all synchronous setState calls that happen in the
// same call stack into a single render on the next animation frame.
// This prevents redundant style-recalc / layout work when multiple setState
// calls fire back-to-back (e.g. handleResult triggers 3-5 in one tick).
// Direct boot and reset calls that need an immediate paint still call
// render() / uRender() / mRender() directly.
var _renderPending = false;
function scheduleRender(){
  if(_renderPending) return;
  _renderPending = true;
  requestAnimationFrame(function(){
    _renderPending = false;
    if(uState) uRender();
    else if(mState) mRender();
    else render();
  });
}
function setState(patch){ Object.assign(state, patch); scheduleRender(); }

function render(){
  const s = state;

  // mode + diff buttons — include series
  const modeButtons = [

    `<button class="btn-pill ${s.mode==='2p'&&!uState&&!mState?'active-mode':'inactive-mode'}" onclick="if(uState)uToggleMode();if(mState)mToggleMode();switchMode('2p')">2 Players</button>`
  ].join('');

  const seriesButtons = ['none','bo3','bo5'].map(m=>`<button class="btn-pill ${!uState&&!mState&&!_blitzMode&&s.seriesMode===m?'active-series':'inactive-series'}" onclick="setSeriesMode('${m}')">${m==='none'?'Free Play':m==='bo3'?'Best of 3':'Best of 5'}</button>`).join('') + `<button class="btn-pill ${_blitzMode?'active-mode':'inactive-mode'}" onclick="blitzToggle()">⚡ Blitz</button>`;
  var controlsHTML = modeButtons + (diffButtons ? '<span style="margin:0 2px;color:var(--card-border)">|</span>' + diffButtons : '') + '<br style="width:100%"/>' + seriesButtons;
  if(dom.controls.innerHTML !== controlsHTML) dom.controls.innerHTML = controlsHTML;

  // Scores
  const currentOScore = s.mode==='2p' ? s.scores.O_Human : s.scores.O_Hearty;
  dom.scoreXVal.textContent = s.scores.X;
  dom.scoreXLbl.textContent = s.mode==='2p' ? `${playerNames.X} (X)` : `${playerNames.X} (X)`;
  dom.scoreDrawVal.textContent = s.scores.draw;
  dom.scoreOVal.textContent = currentOScore;

  // O-turn indicator
  if(!s.xIsNext && s.mode==='2p') dom.grid.classList.add('o-turn');

  // Bubble — skip during tutorial (tutorial owns the bubble content)
  if(!_tutorialActive) {
    if(s.aiThinking){

    } else {
      dom.bubbleContent.innerHTML = `<p>${s.bubbleText}</p>`;
    }
    dom.bubble.className = `speech-bubble ${s.bubbleVisible?'visible':'hidden'}`;
  }

  // Hearty — only rebuild SVG when its content params change, not on every render.
  // Rebuilding innerHTML resets the DOM node and kills the breathing animation,
  // causing a visible flicker whenever the speech bubble updates.
  var heartyKey = (s.showCup?'1':'0') + '|' + s.difficulty + '|' + (s.mode==='2p'?'1':'0') + '|' + (typeof _currentTheme!=='undefined'?_currentTheme:'default') + '|' + (s.aiThinking?'t':'f') + '|' + (_tutorialActive?'T':'F');
  if(dom.heartyWrap._heartyKey !== heartyKey){
    dom.heartyWrap._heartyKey = heartyKey;
    dom.heartyWrap.innerHTML = heartySVG(s.showCup, s.difficulty, s.mode==='2p', s.aiThinking, _tutorialActive);
  }
  var heartyClass = `hearty-svg-wrap ${s.heartyAnim}`;
  if(dom.heartyWrap.className !== heartyClass) dom.heartyWrap.className = heartyClass;

  // Undo button
  const canUndo = !s.result && !s.aiThinking && s.undoStack.length > 0;
  dom.undoBtn.disabled = !canUndo;
  _syncNewGameBtn();

  // Rematch button removed — New Game button restarts from any state

  // Series bar
  if(s.seriesMode !== 'none'){

  // Sound / dark toggles

    : `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`;

// ── speak ──
// force=true bypasses the bubble lock (used for win/streak/Hearty-win messages)
function speak(text, force, tier){
  if(!force && Date.now() < state.bubbleLockedUntil) return;
  // During tutorial, only _speakTutorial() (which sets force=false and uses
  // direct DOM writes) controls the bubble. Block all other speak() calls.
  if(_tutorialActive && !force) return;

  // Manipulate bubble and Hearty animation directly — no setState/render.
  // Going through setState triggers a full render() which repaints the
  // entire score panel, causing Hearty's drop-shadow filter to flicker.
  state.bubbleText    = text;
  state.bubbleVisible = false;
  state.lastBubbleTime = Date.now();

  // Hide bubble immediately, without touching Hearty
  dom.bubble.className = 'speech-bubble hidden';

  clearTimeout(speakAnimTimeout);

  setTimeout(function(){
    state.bubbleText    = text;
    state.bubbleVisible = true;
    state.heartyAnim    = 'speaking';

    // Update bubble content and show
    dom.bubbleContent.innerHTML = '<p>' + text + '</p>';
    var animClass = (tier==='cheer') ? 'cheer' : (tier==='encourage') ? 'encourage' : 'visible';
    dom.bubble.className = 'speech-bubble ' + animClass;

    // Switch Hearty animation class directly — no render(), no DOM rebuild
    var heartyClass = 'hearty-svg-wrap speaking';
    if(dom.heartyWrap.className !== heartyClass) dom.heartyWrap.className = heartyClass;

    SFX.hearty();

    speakAnimTimeout = setTimeout(function(){
      state.heartyAnim = 'breathing';
      var breathClass = 'hearty-svg-wrap breathing';
      if(dom.heartyWrap.className !== breathClass) dom.heartyWrap.className = breathClass;
    }, 750);
  }, 80); // reduced from 300ms — snappier feel, less dead time
}

// ── Win-line overlay ──────────────────────────────────────────────────────
// Maps WIN_LINES indices to SVG coordinate pairs inside the board-wrap (310px)
// Padding=14, cell≈87.33px, gap=10px  → cell_centre = 14 + col*97.33 + 43.67
const _WIN_LINE_COORDS = (function(){
  function centre(idx){
    const col = idx % 3, row = Math.floor(idx / 3);
    const c = 14 + col * 97.33 + 43.67;
    const r = 14 + row * 97.33 + 43.67;
    return [c, r];
  }
  return WIN_LINES.map(line => {
    const a = centre(line[0]), b = centre(line[line.length-1]);
    // extend 14px beyond the outer cell centres for a more dramatic line
    const dx = b[0]-a[0], dy = b[1]-a[1];
    const len = Math.sqrt(dx*dx+dy*dy);
    const ext = 22 / len;
    return {
      x1: a[0]-dx*ext, y1: a[1]-dy*ext,
      x2: b[0]+dx*ext, y2: b[1]+dy*ext,
      len: Math.round(len + ext*2*len)
    };
  });
})();

function drawWinLine(lineIdx, winner) {
  const el = document.getElementById('winLineOverlay');
  if (!el) return;
  // Find which WIN_LINES entry matches
  const match = WIN_LINES.findIndex(l => l.join() === lineIdx.join());
  if (match < 0) { el.innerHTML = ''; return; }
  const c = _WIN_LINE_COORDS[match];
  const len = Math.round(Math.sqrt((c.x2-c.x1)**2 + (c.y2-c.y1)**2));
  el.innerHTML = `<svg viewBox="0 0 310 310" preserveAspectRatio="xMidYMid meet">
    <line class="win-line-path" x1="${c.x1.toFixed(1)}" y1="${c.y1.toFixed(1)}"
      x2="${c.x2.toFixed(1)}" y2="${c.y2.toFixed(1)}"
      style="--win-line-len:${len}"/>
  </svg>`;
}

function clearWinLine() {
  const el = document.getElementById('winLineOverlay');
  if (el) el.innerHTML = '';
}

// ── FANFARE duration ──
const FANFARE_DURATION = 900;

// ── Handle result ──
function handleResult(r){
  blitzStop();
  blitzHideUI();
  setState({result:r});
  // Draw animated win line if there's a winning line (not a draw)
  if(r.line && r.line.length === 3){
    setTimeout(function(){ if(window.drawWinLine) window.drawWinLine(r.line, r.winner); }, 80);
  }
  if(r.line && r.line.length === 3) drawWinLine(r.line, r.winner);

  if(r.winner==='X'){
    const streak = state.winStreakX + 1;
    setState({scores:{...state.scores, X:state.scores.X+1}, winStreakX:streak, winStreakP2:0, lossStreak:0});
    const isStreakWin = streak >= 3;
    if(isStreakWin) SFX.streakFanfare(); else SFX.fanfare();
    HAP.win();
    setTimeout(()=>setState({showCup:true}), 750);
    setTimeout(()=>launchVictoryCelebration(isStreakWin), FANFARE_DURATION);
    setState({bubbleLockedUntil: Date.now() + 10000});
    setTimeout(()=>{
      let msg;
      if(streak === 3){
        msg = pick('streakX').replace('%s', streak);
      } else {
        msg = state.mode==='2p'
          ? pickArr([`Well played, ${playerNames.X}!`, `${playerNames.X} wins it! Brilliant!`, `Bravo ${playerNames.X}! The grid is yours!`])
          : pick('winX');
      }
      speak(msg, true);
    }, FANFARE_DURATION+100);

    // Series check
    if(state.seriesMode!=='none'){
      const target = state.seriesMode==='bo3'?2:3;
      const newSX = state.seriesX + 1;
      setState({seriesX: newSX});
      if(newSX >= target) setTimeout(()=>showMatchBanner('X'), 1800);
    }

  } else if(r.winner==='O'){
    if(state.mode==='ai'){
      const newLossStreak = (state.lossStreak || 0) + 1;
      setState({scores:{...state.scores, O_Hearty:state.scores.O_Hearty+1}, winStreakX:0, winStreakP2:0,
        lossStreak: newLossStreak, bubbleLockedUntil: Date.now() + 12000});
      SFX.O();
      // Pick message and animation tier based on how many times in a row the player has lost
      setTimeout(()=>{
        let msg, tier;
        if(newLossStreak >= 6){
          msg = pick('lossT4'); tier = 'cheer';
        } else if(newLossStreak >= 4){
          msg = pick('lossT3'); tier = 'cheer';
        } else if(newLossStreak >= 2){
          msg = pick('lossT2'); tier = 'encourage';
        } else {
          // First loss — gentle winO + tier1 encouragement combined
          msg = pick('winO') + ' ' + pick('lossT1'); tier = 'encourage';
        }
        speak(msg, true, tier);
      }, FANFARE_DURATION+100);
    } else {
      const streak = state.winStreakP2 + 1;
      setState({scores:{...state.scores, O_Human:state.scores.O_Human+1}, winStreakX:0, winStreakP2:streak});
      const isStreakWin = streak >= 3;
      if(isStreakWin) SFX.streakFanfare(); else SFX.fanfare();
      HAP.win();
      setTimeout(()=>setState({showCup:true}), 750);
      setTimeout(()=>launchVictoryCelebration(isStreakWin), FANFARE_DURATION);
      setState({bubbleLockedUntil: Date.now() + 10000});
      setTimeout(()=>{
        let msg;
        if(streak === 3){
          // First time hitting the streak threshold — announce it
          msg = pickArr([
            `${playerNames.O} is on a ${streak}-win streak! Unstoppable! 🔥`,
            `${streak} in a row for ${playerNames.O}! What a run!`,
            `${playerNames.O} is dominating — ${streak} consecutive wins!`
          ]);
        } else {
          // Normal win message whether below or above streak threshold
          msg = pickArr([`Well played, ${playerNames.O}!`, `${playerNames.O} wins! Brilliant!`, `Bravo ${playerNames.O}! The grid is yours!`]);
        }
        speak(msg, true);
      }, FANFARE_DURATION+100);

      // Series check
      if(state.seriesMode!=='none'){
        const target = state.seriesMode==='bo3'?2:3;
        const newSO = state.seriesO + 1;
        setState({seriesO: newSO});
        if(newSO >= target) setTimeout(()=>showMatchBanner('O'), 1800);
      }
    }
  } else {
    setState({scores:{...state.scores, draw:state.scores.draw+1}, winStreakX:0, winStreakP2:0, lossStreak:0});
    speak(pick('draw')); SFX.draw();
    if(state.seriesMode!=='none'){
      setState({seriesD: state.seriesD+1});
      // Check if series is exhausted (all games played, no winner yet) — e.g. bo3: after 3 games
      const target = state.seriesMode==='bo3'?2:3;
      const totalGames = state.seriesMode==='bo3'?3:5;
      const gamesPlayed = state.seriesX + state.seriesO + state.seriesD + 1;
      if(gamesPlayed >= totalGames && state.seriesX < target && state.seriesO < target){
        setTimeout(()=>showMatchBanner('draw'), 1800);
      }
    }
  }
}

// ── handleClick ──
function handleClick(idx){

  const _cTutWait = _tutorialActive && TUTORIALS[_tutorialMode] && TUTORIALS[_tutorialMode][_tutorialStep] && TUTORIALS[_tutorialMode][_tutorialStep].waitForMove;
  if (_tutorialActive && !_cTutWait) return;
  const cellEl = dom.cells[idx];
  if(cellEl) cellEl.blur();
  if(state.board[idx] || state.result || (!_cTutWait && state.mode==='ai'&&!state.xIsNext)){
    if(cellEl && state.board[idx]){
      HAP.error();
      cellEl.classList.remove('shake-error');
      void cellEl.offsetWidth;
      cellEl.classList.add('shake-error');
      setTimeout(()=>cellEl.classList.remove('shake-error'), 400);
    }
    return;
  }
  // Push undo snapshot before placing
  if (_cTutWait && !state.xIsNext) setState({xIsNext: true});
  const undoStack = [...state.undoStack, {board:[...state.board], xIsNext:state.xIsNext}];
  const b=[...state.board], marker=state.xIsNext?'X':'O';
  b[idx]=marker;
  setState({board:b, undoStack});
  SFX[marker]();
  HAP.place();
  if(window.notifyAmbientMove) window.notifyAmbientMove(idx);
  tutorialOnMove();
  const r=checkWinner(b);
  if(r){handleResult(r);return;}
  if(_tutorialActive) return; // tutorialOnMove owns turn progression during tutorial
  setState({xIsNext:!state.xIsNext});
  if(state.mode==='2p'){
    speak(getTwoPlayerComment(b, marker, idx));
    if(_blitzMode) blitzStart();
  } else if(state.mode==='ai'){
    blitzStop();
    scheduleAI();
  }
}

// ── Undo ──
function undoMove(){
  if(state.undoStack.length===0||state.result||state.aiThinking) return;
  const stack = [...state.undoStack];
  const prev = stack.pop();
  dom.cells.forEach(c=>{ c.dataset.val=''; c.innerHTML='<div class="cell-inner"></div>'; });
  setState({board:prev.board, xIsNext:prev.xIsNext, undoStack:stack, result:null, showCup:false});
  SFX.undo();
  HAP.undo();
  speak(pickArr([
    "Oops! Taking that back — fair enough! 😄",
    "Undo! Everyone deserves a second chance!",
    "Rewinding! This is why I love humans — always reconsidering! 🔄"
  ]));
}

// ── AI ──
function scheduleAI(){

  setState({aiThinking:true, heartyAnim:'wiggling'});

}

// ── Blitz Mode ────────────────────────────────────────────────────────────
// 10-second countdown per move. On timeout: a random legal cell is played
// automatically (fair for both human and AI — pressure applies to all).
// Blitz is a toggle; it can be combined with any series mode.
let _blitzMode  = false;
let _blitzArmed = false; // true when blitz is selected but waiting for player to press Start
let _blitzTimer = null;
let _blitzSec   = 10;
const BLITZ_SECS = 10;

function blitzToggle() {
  _stopTutorialIfActive();
  _blitzMode = !_blitzMode;
  _blitzArmed = false;
  // Reset board fully when toggling blitz mid-game
  clearWinLine(); if(window.clearWinLine) window.clearWinLine();
  dom.cells.forEach(c=>{ c.dataset.val=''; c.innerHTML='<div class="cell-inner"></div>'; });
  setState({board:Array(9).fill(null), xIsNext:(Math.random()<0.5), result:null, aiThinking:false,
    showCup:false, undoStack:[], scores:{X:0,O_Human:0,O_Hearty:0,draw:0},
    winStreakX:0, winStreakP2:0, lossStreak:0, seriesMode:'none', seriesX:0, seriesO:0, seriesD:0,
    bubbleLockedUntil:0});
  blitzStop();
  if (_blitzMode) {
    _blitzArmed = true;
  
    state.bubbleLockedUntil = 0;
    speak(pick('blitzWelcome'), true);
    state.bubbleLockedUntil = Date.now() + 10000;
    render();
    renderSideMenu();
  
    _blitzUpdateUI();
  } else {
    blitzHideUI();
    speak(pickArr(["Normal rules — take all the time you need!", "Back to regular pace! No rush at all."]));
    render();
    renderSideMenu();
  }
}

function blitzStartGame() {
  // Called when the player presses the Start button in Blitz armed state
  if (!_blitzMode) return;
  _blitzArmed = false;


  blitzHideUI();
  speak(pickArr(["Go! ⚡", "Timer's running! ⚡", "Clock's ticking! Go! ⚡", "Ready... GO! ⚡"]), true);
  // If it's Hearty's turn to go first, skip the countdown and let the AI move;
  // blitzStart() will fire for the human's turn after Hearty plays.
  if (state.mode === 'ai' && !state.xIsNext) {
    scheduleAI();
  } else {
    blitzStart();
  }
  render();
}

function menuBlitzToggle() {
  _stopTutorialIfActive();
  // If Ultimate is active, exit it back to classic first
  if (uState) {
    if(window.clearUWinLine) window.clearUWinLine();
    clearWinLine(); if(window.clearWinLine) window.clearWinLine();
    uState = null;
    _aiGen++; clearTimeout(_uAiTimeout);
    document.getElementById('uContainer').style.display = 'none';
    document.getElementById('classicContainer').style.display = 'flex';
  }
  // If Misère is active, exit it back to classic first
  if (mState) {
    mState = null;
    clearTimeout(_mAiTimeout);
    clearWinLine(); if(window.clearWinLine) window.clearWinLine();
    document.getElementById('mContainer').style.display = 'none';
    document.getElementById('classicContainer').style.display = 'flex';
  }
  // Toggle blitz state and reset board
  _blitzMode = !_blitzMode;
  _blitzArmed = false;
  clearWinLine(); if(window.clearWinLine) window.clearWinLine();
  dom.cells.forEach(c=>{ c.dataset.val=''; c.innerHTML='<div class="cell-inner"></div>'; });
  setState({board:Array(9).fill(null), xIsNext:(Math.random()<0.5), result:null, aiThinking:false,
    showCup:false, undoStack:[], scores:{X:0,O_Human:0,O_Hearty:0,draw:0},
    winStreakX:0, winStreakP2:0, lossStreak:0, seriesMode:'none', seriesX:0, seriesO:0, seriesD:0,
    bubbleLockedUntil:0});
  blitzStop();
  if (_blitzMode) {
    _blitzArmed = true;
  
    state.bubbleLockedUntil = 0;
    speak(pick('blitzWelcome'), true);
    state.bubbleLockedUntil = Date.now() + 10000;
    render();
    renderSideMenu();
  
    _blitzUpdateUI();
  } else {
    blitzHideUI();
    speak(pickArr(["Normal rules — take all the time you need!", "Back to regular pace! No rush at all."]));
    render();
    renderSideMenu();
  }
}

function blitzStart() {
  if (!_blitzMode || state.result) return;
  if (_tutorialActive) return; // never run blitz timer during tutorial
  // Don't run timer during AI turn
  if (state.mode === 'ai' && !state.xIsNext) return;
  blitzStop();
  _blitzSec = BLITZ_SECS;
  _blitzUpdateUI();
  _blitzTimer = setInterval(_blitzTick, 1000);
}

function blitzStop() {
  clearInterval(_blitzTimer);
  _blitzTimer = null;
}

function blitzHideUI() {
  const row = document.getElementById('blitzTimerRow');
  if (row) row.classList.remove('active');
  const startRow = document.getElementById('blitzStartRow');
  if (startRow) startRow.classList.remove('active');
  _blitzArmed = false;

}

function _blitzUpdateUI() {
  const row  = document.getElementById('blitzTimerRow');
  const num  = document.getElementById('blitzNumber');
  const ring = document.getElementById('blitzRingFg');
  const ringWrap = document.getElementById('blitzRing');
  const numEl    = document.getElementById('blitzNumber');
  const startRow = document.getElementById('blitzStartRow');
  if (!row) return;
  // Show start button when armed (timer not yet running), timer when running
  if (_blitzArmed) {
    row.classList.remove('active');
    if (startRow) startRow.classList.add('active');
    return;
  }
  if (startRow) startRow.classList.remove('active');
  row.classList.add('active');
  const frac = _blitzSec / BLITZ_SECS;
  const dash = 113; // 2π×18
  const urgent = _blitzSec <= 3;
  if (num) { num.textContent = _blitzSec; num.className = 'blitz-number' + (urgent?' urgent':''); }
  if (ring) { ring.style.strokeDashoffset = dash * (1 - frac); ring.className = 'blitz-ring-fg' + (urgent?' urgent':''); }
  if (ringWrap) ringWrap.className = 'blitz-ring' + (urgent?' urgent-pulse':'');
}

function _blitzTick() {
  if (!_blitzMode || state.result) { blitzStop(); blitzHideUI(); return; }
  if (_tutorialActive) { blitzStop(); return; } // tutorial owns the board — freeze timer
  _blitzSec--;
  _blitzUpdateUI();
  if (_blitzSec === 3) {
    speak(pick('blitzUrgent'));
    SFX.hearty();
  }
  if (_blitzSec <= 0) {
    blitzStop();
    _blitzTimeout();
  }
}

function _blitzTimeout() {
  if (_tutorialActive) return; // don't auto-play during tutorial
  speak(pick('blitzTimeout'), true);
  SFX.draw();
  // Play a random legal move for the current player
  const empty = state.board.map((v,i)=>!v?i:null).filter(i=>i!==null);
  if (empty.length === 0) return;
  const idx = empty[Math.floor(Math.random() * empty.length)];
  const b = [...state.board];
  const marker = state.xIsNext ? 'X' : 'O';
  b[idx] = marker;
  dom.cells[idx].dataset.val = '';  // force re-render of this cell
  setState({board:b});
  const r = checkWinner(b);
  if (r) { handleResult(r); return; }
  setState({xIsNext: !state.xIsNext});
  if (state.mode === 'ai') {
    scheduleAI();
  } else {
    blitzStart();
  }
}


// ── Win-line overlay ─────────────────────────────────────────────────────────
// Draws an animated SVG line through the three winning cells on the board.
// The line sweeps in using stroke-dashoffset, themed by winner colour.
(function(){
  var C = [43.67, 141, 238.33]; // cell centres in 282px grid space
  var WIN_COORDS = [
    // rows
    [C[0],C[0], C[2],C[0]],  // [0,1,2] row 0
    [C[0],C[1], C[2],C[1]],  // [3,4,5] row 1
    [C[0],C[2], C[2],C[2]],  // [6,7,8] row 2
    // cols
    [C[0],C[0], C[0],C[2]],  // [0,3,6] col 0
    [C[1],C[0], C[1],C[2]],  // [1,4,7] col 1
    [C[2],C[0], C[2],C[2]],  // [2,5,8] col 2
    // diagonals
    [C[0],C[0], C[2],C[2]],  // [0,4,8] diagonal TL-BR
    [C[2],C[0], C[0],C[2]]   // [2,4,6] diagonal TR-BL
  ];
  // WIN_LINES order matches WIN_COORDS order
  var LINE_IDX = {
    '012':0, '345':1, '678':2,
    '036':3, '147':4, '258':5,
    '048':6, '246':7
  };

  window.drawWinLine = function(line, winner, containerId) {
    var boardWrap = containerId
      ? document.getElementById(containerId)
      : document.querySelector('.board-wrap');
    if (!boardWrap) return;
    // Remove any existing win line
    var existing = boardWrap.querySelector('.win-line-svg');
    if (existing) existing.remove();
    if (!line || line.length < 3) return;

    var key = line.slice().sort(function(a,b){return a-b;}).join('');
    var coords = WIN_COORDS[LINE_IDX[key]];
    if (!coords) return;

    var cls = winner === 'X' ? 'x-line' : 'o-line';
    var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','win-line-svg');
    svg.setAttribute('viewBox','0 0 282 282');
    svg.setAttribute('xmlns','http://www.w3.org/2000/svg');

    var path = document.createElementNS('http://www.w3.org/2000/svg','line');
    path.setAttribute('class','win-line-path ' + cls);
    path.setAttribute('x1', coords[0]);
    path.setAttribute('y1', coords[1]);
    path.setAttribute('x2', coords[2]);
    path.setAttribute('y2', coords[3]);
    svg.appendChild(path);
    boardWrap.appendChild(svg);
  };

function setDiff(d){

    if (_uBEl) _uBEl.innerHTML = '';
    var _uPrev = { scoresX: uState.scoresX||0, scoresDraw: uState.scoresDraw||0, scoresO: uState.scoresO||0 };
    uState = uInitState();
    uState.mode = state.mode;

    uState.scoresDraw = _uPrev.scoresDraw;

    if (_mGEl) _mGEl.innerHTML = '';

function applyThemeLetterbox() {
  // Find letterbox colour from the active theme's CSS variable
  var isDark = document.body.classList.contains('dark-mode');
  var lbMap = {
    'default':   { light: '#ffeaf4', dark: '#1a0a12' },
    'spring':    { light: '#f0faf4', dark: '#052e16' },
    'neon':      { light: '#2d0a4e', dark: '#000005' },
    'halloween': { light: '#1a1040', dark: '#020808' },
    'ocean':     { light: '#e0f7fa', dark: '#042f40' },
    'summer':    { light: '#fffbeb', dark: '#2d1a00' }
  };
  var pair = lbMap[_currentTheme] || lbMap['default'];
  var col  = isDark ? pair.dark : pair.light;
  document.documentElement.style.background = col;
  document.body.style.background = col;
}

function setTheme(id) {
  _stopTutorialIfActive();
  _currentTheme = id;
  // Remove any previous theme attribute, then set new one
  if (id === 'default') {
    document.body.removeAttribute('data-theme');
  } else {
    document.body.setAttribute('data-theme', id);
  }
  applyThemeLetterbox();
  // Force Hearty to redraw immediately with the new theme's accessories.
  // The heartyKey guard caches the last render — clear it so the next
  // render() / uRender() / mRender() always rebuilds the SVG.
  if (dom.heartyWrap) dom.heartyWrap._heartyKey = null;
  // Trigger the correct render path for whichever mode is active
  if (uState) uRender();
  else if (mState) mRender();
  else render();
  // Refresh side menu swatches if open
  if (menuOpen) renderSideMenu();
  // Adapt background music to the new theme
  if (window._musicSetTheme) window._musicSetTheme();
  // Persist across page session (best-effort)
  try { localStorage.setItem('hearty-theme', id); } catch(e){}
}

function menuSetTheme(id) {
  setTheme(id);
  // Re-render swatches inline without closing menu
  renderThemeSwatches();
}

function renderThemeSwatches() {
  var el = document.getElementById('menuThemeSwatches');
  var lbl = document.getElementById('menuThemeLabel');
  if (!el) return;
  var currentTheme = THEMES.find(function(t){ return t.id === _currentTheme; }) || THEMES[0];
  el.innerHTML = THEMES.map(function(t) {
    var sel = t.id === _currentTheme ? ' selected' : '';
    return '<button class="theme-swatch' + sel + '" '
      + 'style="background:' + t.swatch + ';" '
      + "onclick=\"menuSetTheme('" + t.id + "')\" "
      + 'title="' + t.label + '">'
      + '<span class="theme-swatch-tick">&#10003;</span>'
      + '</button>';
  }).join('');
  if (lbl) lbl.textContent = currentTheme.label;
}

  // ── Particle layer container ───────────────────────────────────────────
  var _layer = null;
  function getLayer() {
    if (_layer && _layer.parentNode) return _layer;
    _layer = document.getElementById('particle-layer');
    if (!_layer) {
      _layer = document.createElement('div');
      _layer.id = 'particle-layer';
      var root = document.getElementById('root');
      if (root) root.appendChild(_layer);
    }
    return _layer;
  }

  // ── Utility ───────────────────────────────────────────────────────────
  function rnd(min, max) { return min + Math.random() * (max - min); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function hex(col) { return col; } // colours already in hex/rgba strings

  // Self-removing helper: removes outer element when the TRAVEL animation ends.
  // We check animationName against the known travel keyframe names so that
  // infinite sub-animations (bob, flap, etc.) on child elements dont fire early removal.
  var TRAVEL_ANIMS = {
    heartRise:1, petalFall:1,
    batFlyLR:1, batFlyRL:1,
    ghostFlyLR:1, ghostFlyRL:1,
    bubbleRise:1,
    fishSwimLR:1, fishSwimRL:1,
    bflyLR:1, bflyRL:1
  };

  // ── JS particle counters — O(1) cap checks, no querySelectorAll ──────────
  // Each counter tracks live particles for its particle type. autoRemove
  // decrements the counter via the classCounterKey stored on the element.
  var _pcnt = { heart:0, petal:0, bat:0, ghost:0, bubble:0, fish:0, butterfly:0 };

  function autoRemove(el, counterKey) {
    if (counterKey) _pcnt[counterKey]++;
    el.addEventListener('animationend', function handler(e) {
      if (e.target === el && TRAVEL_ANIMS[e.animationName]) {
        if (counterKey) _pcnt[counterKey]--;
        el.remove();
        el.removeEventListener('animationend', handler);
      }
    });
  }

  // ── Cell centre helper (classic 3×3 grid) ─────────────────────────────
  function cellCenter(idx) {
    var col = idx % 3, row = Math.floor(idx / 3);
    return { x: 54 + col * 94 + 47, y: 438 + row * 94 + 47 };
  }

  // ══════════════════════════════════════════════════════════════════════
  // DEFAULT — Hearts rising from the bottom
  // ══════════════════════════════════════════════════════════════════════
  var HEART_COLORS = [
    '#c0154a','#e8185d','#f43f5e','#fb7185','#fda4af','#f9a8d4',
    '#5b21b6','#7c3aed','#9333ea','#a855f7','#c084fc','#e9d5ff'
  ];

  function heartSVG(col) {
    if (_heartSVGCache[col]) return _heartSVGCache[col];
    var c = col.replace('#','%23');
    var uri = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 18'%3E%3Cpath fill='" + c + "' d='M10 17C10 17 1 11 1 5.5 1 2.9 3.1 1 5.5 1 7.2 1 10 3 10 3 10 3 12.8 1 14.5 1 16.9 1 19 2.9 19 5.5 19 11 10 17 10 17Z'/%3E%3C/svg%3E";
    _heartSVGCache[col] = uri;

  function spawnHeart(x) {
    var el = document.createElement('div');
    var size = rnd(10, 20);
    var px = (x !== undefined) ? (x - size / 2) : rnd(10, 370);
    var ex = px + rnd(-50, 50); // pre-computed end X — no calc(var+var) in keyframe
    el.className = 'ap ap-heart';
    el.style.cssText = [
      '--px:' + px + 'px',
      '--ex:' + ex + 'px',
      '--ps:' + rnd(0.85, 1.15),
      '--pa:' + rnd(0.55, 0.88),
      '--sz:' + size + 'px',
      'animation-duration:' + rnd(18, 28) + 's',
      'animation-delay:' + rnd(0, 1.5) + 's',
      'background-image:url("' + heartSVG(pick(HEART_COLORS)) + '")'
    ].join(';');
    getLayer().appendChild(el);

  var _heartTimer = null;
  var _heartSeeds = [];
  function startHearts() {
    if (_heartTimer) return;
    for (var i = 0; i < 8; i++) {
      (function(delay) {
        _heartSeeds.push(setTimeout(function(){ if(_activeTheme==='default') spawnHeart(); }, delay));

  // SPRING — Blossom petals falling from the top
  // ══════════════════════════════════════════════════════════════════════
  var PETAL_COLORS = ['#f43f5e','#fb7185','#f9a8d4','#e11d48','#fda4af','#ec4899','#f472b6'];

  function spawnPetal(x, y, burst) {
    var count = burst ? 8 : 1;
    for (var i = 0; i < count; i++) {
      var el = document.createElement('div');
      var w = rnd(10, 18), h = rnd(7, 12);
      var startX = (x !== undefined) ? (x + rnd(-30, 30)) : rnd(0, 390);
      var startY = (y !== undefined) ? (y - 10) : rnd(-20, -2);
      var dur = burst ? rnd(2.0, 3.5) : rnd(9, 16);
      var pr = rnd(0, 360), prv = rnd(-480, 480);
      var pw = rnd(-70, 70) * (burst ? 2.5 : 1);
      el.className = 'ap ap-petal';
      el.style.cssText = [
        '--px:' + startX + 'px',
        '--py:' + startY + 'px',
        '--ex:' + (startX + pw) + 'px',  // pre-computed end X
        '--er:' + (pr + prv) + 'deg',    // pre-computed end rotation
        '--pw2:' + w + 'px',
        '--ph:' + h + 'px',
        '--pr:' + pr + 'deg',
        '--pa:' + rnd(0.82, 1.0),
        '--pc:' + pick(PETAL_COLORS),
        'animation-duration:' + dur + 's',
        'animation-delay:' + rnd(0, burst ? 0.08 : 0.3) + 's'

      if (!_appVisible) return;

  // ══════════════════════════════════════════════════════════════════════
  // NEON — Circuit board lights on the board edges
  // Each packet is a div that travels along one edge of the board-wrap
  // using a single CSS transform keyframe (compositor-only, zero paint).
  // Static junction nodes pulse with opacity only — also compositor-only.
  // ══════════════════════════════════════════════════════════════════════
  var _circuitTimer = null;
  var _circuitNodeEls = []; // static junction nodes, removed on stop

  // Colours alternate cyan and magenta for variety
  var _CIRCUIT_COLS = ['#00ffff','#ff00ff','#00ffff','#00ffff','#ff00ff','#00ffff'];
  var _circuitColIdx = 0;

  function _circuitColor() {
    return _CIRCUIT_COLS[_circuitColIdx++ % _CIRCUIT_COLS.length];
  }

  // Returns the position of the currently visible game board inside #root design coords.
  // Picks the correct element depending on which mode is active.
  function _boardRect() {
    var bw;
    // Ultimate mode — use the meta-grid
    if (document.getElementById('uContainer') &&
        document.getElementById('uContainer').style.display !== 'none') {
      bw = document.getElementById('uBoard');
    }
    // Misère mode — use mBoardWrap
    else if (document.getElementById('mContainer') &&
             document.getElementById('mContainer').style.display !== 'none') {
      bw = document.getElementById('mBoardWrap');
    }
    // Classic — use board-wrap (first visible one)
    else {
      bw = document.querySelector('#classicContainer .board-wrap');
    }
    if (!bw) return null;
    var root = document.getElementById('root');
    if (!root) return null;
    var br = bw.getBoundingClientRect();
    var rr = root.getBoundingClientRect();
    // Skip if board is hidden (display:none gives all-zero rect)
    if (br.width === 0 || br.height === 0) return null;
    var scale = rr.width / 390;
    return {
      left:   (br.left - rr.left) / scale,
      top:    (br.top  - rr.top)  / scale,
      width:  br.width  / scale,
      height: br.height / scale
    };
  }

  // Spawn one packet travelling along a random edge
  function _spawnCircuitPacket() {
    if (_activeTheme !== 'neon') return;
    var rect = _boardRect();
    if (!rect) return;

    var col  = _circuitColor();
    var size = rnd(3, 6);
    var dur  = rnd(1.8, 3.6);
    var edge = Math.floor(Math.random() * 4); // 0=top,1=right,2=bottom,3=left

    var el = document.createElement('div');
    el.className = 'ap-circuit-dot';
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.background = col;
    el.style.boxShadow  = '0 0 ' + (size*2) + 'px ' + col + ',0 0 ' + (size*4) + 'px ' + col + '88';
    el.style.borderRadius = '50%';
    el.style.willChange = 'transform,opacity';
    el.style.position = 'absolute';
    el.style.zIndex = '2';

    // Position the element on its starting edge
    if (edge === 0) { // top: slide left→right
      el.style.left = rect.left + 'px';
      el.style.top  = (rect.top - size/2) + 'px';
      el.style.animation = 'circuitTop ' + dur + 's linear forwards';
    } else if (edge === 1) { // right: slide top→bottom
      el.style.left = (rect.left + rect.width - size/2) + 'px';
      el.style.top  = rect.top + 'px';
      el.style.animation = 'circuitRight ' + dur + 's linear forwards';
    } else if (edge === 2) { // bottom: slide right→left
      el.style.left = rect.left + 'px';
      el.style.top  = (rect.top + rect.height - size/2) + 'px';
      el.style.animation = 'circuitBottom ' + dur + 's linear forwards';
    } else { // left: slide bottom→top
      el.style.left = (rect.left - size/2) + 'px';
      el.style.top  = rect.top + 'px';
      el.style.animation = 'circuitLeft ' + dur + 's linear forwards';
    }

    var circuitLayer = document.getElementById('circuit-layer');
    if (!circuitLayer) return;
    circuitLayer.appendChild(el);
    // Self-remove after animation completes
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, dur * 1000 + 100);
  }

  // Spawn static junction nodes at corners and midpoints of the board border
  function _spawnCircuitNodes() {
    var rect = _boardRect();
    if (!rect) return;
    // 8 positions: 4 corners + 4 midpoints
    var positions = [
      { x: rect.left,                   y: rect.top },
      { x: rect.left + rect.width/2,    y: rect.top },
      { x: rect.left + rect.width,      y: rect.top },
      { x: rect.left + rect.width,      y: rect.top + rect.height/2 },
      { x: rect.left + rect.width,      y: rect.top + rect.height },
      { x: rect.left + rect.width/2,    y: rect.top + rect.height },
      { x: rect.left,                   y: rect.top + rect.height },
      { x: rect.left,                   y: rect.top + rect.height/2 }
    ];
    positions.forEach(function(pos, i) {
      var col = (i % 2 === 0) ? '#00ffff' : '#ff00ff';
      var sz = rnd(3, 5);
      var el = document.createElement('div');
      el.className = 'ap-circuit-node';
      el.style.cssText = [
        'width:' + sz + 'px',
        'height:' + sz + 'px',
        'background:' + col,
        'border-radius:1px',
        'box-shadow:0 0 6px ' + col + ',0 0 12px ' + col + '88',
        'left:' + (pos.x - sz/2) + 'px',
        'top:' + (pos.y - sz/2) + 'px',
        'position:absolute',
        'z-index:2',
        'will-change:opacity',
        'animation:circuitNodePulse ' + rnd(1.2, 2.8) + 's ease-in-out ' + rnd(0, 1.5) + 's infinite'
      ].join(';');
      var circuitLayer = document.getElementById('circuit-layer');
      if (!circuitLayer) return;
      circuitLayer.appendChild(el);
      _circuitNodeEls.push(el);
    });
  }

  function startCircuit() {
    // Circuit layer sits above the game board (z-index:5) so lights
    // are not covered by the Ultimate/Misère board containers (z-index:1)
    var cl = document.getElementById('circuit-layer');
    if (!cl) {
      cl = document.createElement('div');
      cl.id = 'circuit-layer';
      cl.style.cssText = 'position:absolute;inset:0;width:390px;height:780px;pointer-events:none;z-index:5;overflow:hidden;';
      var root = document.getElementById('root');
      if (root) root.appendChild(cl);
    }
    // Delay first nodes until board is in DOM
    setTimeout(_spawnCircuitNodes, 300);
    if (_circuitTimer) return;
    _circuitTimer = setInterval(function() {
      if (!_appVisible) return;
      _spawnCircuitPacket();
    }, 400);
  }

  // Exposed so mode-switch functions can reposition nodes on the new board
  window._refreshCircuitNodes = function() {
    if (_activeTheme !== 'neon') return;
    // Remove existing static nodes and respawn on the now-visible board
    _circuitNodeEls.forEach(function(el) { if (el.parentNode) el.parentNode.removeChild(el); });
    _circuitNodeEls = [];
    setTimeout(_spawnCircuitNodes, 350);
  };

  function stopCircuit() {
    clearInterval(_circuitTimer); _circuitTimer = null;
    _circuitNodeEls.forEach(function(el) { if (el.parentNode) el.parentNode.removeChild(el); });
    _circuitNodeEls = [];
    var cl = document.getElementById('circuit-layer');
    if (cl) cl.innerHTML = '';
  }

      (function(d){ _oceanSeeds.push(setTimeout(function(){ if(_activeTheme==='ocean') spawnBubble(); }, d)); })(i*300);
    }
    for (var j = 0; j < 3; j++) {
      (function(d){ _oceanSeeds.push(setTimeout(function(){ if(_activeTheme==='ocean') spawnFish(); }, d)); })(j*1200);
    }
    _oceanTimer = setInterval(function () {
      if (!_appVisible) return;
      if (_pcnt.bubble < 22) spawnBubble();
      if (_pcnt.fish < 4) spawnFish();
    }, 500);
  }
  function stopOcean() { clearInterval(_oceanTimer); _oceanTimer = null; _oceanSeeds.forEach(clearTimeout); _oceanSeeds = []; }

  // ══════════════════════════════════════════════════════════════════════
  // SUMMER — Butterflies
  // ══════════════════════════════════════════════════════════════════════
  var BUTTERFLY_COLORS = [
    '#f59e0b','#fbbf24','#f97316','#ec4899','#a855f7',
    '#3b82f6','#10b981','#ef4444','#84cc16','#06b6d4'
  ];

  function butterflySVG(col) {
    var c = col.replace('#','%23');
    return "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 36'%3E%3Cpath fill='" + c + "' d='M20 18C16 6 2 4 4 14 6 20 14 20 20 18Z'/%3E%3Cpath fill='" + c + "' d='M20 18C24 6 38 4 36 14 34 20 26 20 20 18Z'/%3E%3Cpath fill='" + c + "' opacity='0.72' d='M20 18C14 20 10 30 14 32 18 34 20 26 20 18Z'/%3E%3Cpath fill='" + c + "' opacity='0.72' d='M20 18C26 20 30 30 26 32 22 34 20 26 20 18Z'/%3E%3Cellipse cx='20' cy='18' rx='2' ry='8' fill='%231a0000'/%3E%3C/svg%3E";
  }

  function spawnButterfly() {
    var outer = document.createElement('div');
    var fromLeft = Math.random() < 0.5;
    var col = pick(BUTTERFLY_COLORS);
    var size = rnd(26, 42);
    outer.className = 'ap ap-butterfly';
    outer.style.cssText = [
      (function(){ var py=rnd(180,710); return '--py:'+py+'px;--ey:'+(py+rnd(-40,40))+'px'; })(),
      '--pa:' + rnd(0.65, 0.92),
      'width:' + size + 'px',
      'height:' + size + 'px',
      'animation-name:' + (fromLeft ? 'bflyLR' : 'bflyRL'),
      'animation-duration:' + rnd(8, 16) + 's'
    ].join(';');
    if (!fromLeft) {
      var flip = document.createElement('div');
      flip.style.cssText = 'width:100%;height:100%;transform:scaleX(-1);';
      var inner = document.createElement('div');
      inner.className = 'ap-butterfly-inner';
      inner.style.cssText = 'background-image:url("' + butterflySVG(col) + '");animation-duration:' + rnd(0.22, 0.46) + 's';
      flip.appendChild(inner);
      outer.appendChild(flip);
    } else {
      var inner = document.createElement('div');
      inner.className = 'ap-butterfly-inner';
      inner.style.cssText = 'background-image:url("' + butterflySVG(col) + '");animation-duration:' + rnd(0.22, 0.46) + 's';
      outer.appendChild(inner);
    }
    getLayer().appendChild(outer);
    autoRemove(outer, 'butterfly');
  }

  var _summerTimer = null;
  var _summerSeeds = [];
  function startSummer() {
    if (_summerTimer) return;
    for (var i = 0; i < 6; i++) {
      (function(d){ _summerSeeds.push(setTimeout(function(){ if(_activeTheme==='summer') spawnButterfly(); }, d)); })(i*400);
    }
    _summerTimer = setInterval(function () {
      if (!_appVisible) return;
      if (_pcnt.butterfly < 10) spawnButterfly();
    }, 1000);
  }
  function stopSummer() { clearInterval(_summerTimer); _summerTimer = null; _summerSeeds.forEach(clearTimeout); _summerSeeds = []; }

  // ══════════════════════════════════════════════════════════════════════
  // Theme switching — start/stop the right spawner
  // ══════════════════════════════════════════════════════════════════════
  var _activeTheme = null;

  function stopAll() {
    stopHearts(); stopPetals(); stopNeon();
    stopHalloween(); stopOcean(); stopSummer();
    stopCircuit();
    // Flush all live CSS particles from the layer
    var layer = document.getElementById('particle-layer');
    if (layer) layer.innerHTML = '';
    // Reset counters — all particles are gone
    _pcnt.heart = 0; _pcnt.petal = 0; _pcnt.bat = 0;
    _pcnt.ghost = 0; _pcnt.bubble = 0; _pcnt.fish = 0; _pcnt.butterfly = 0;
  }

  function startTheme(id) {
    stopAll();
    _activeTheme = id;
    switch (id) {
      case 'default':   startHearts();    break;
      case 'spring':    startPetals();    break;
      case 'neon':      startNeon();      break;
      case 'halloween': startHalloween(); break;
      case 'ocean':     startOcean();     break;
      case 'summer':    startSummer();    break;
      default:          startHearts();    break;
    }
  }

  // ── Attach layer + boot ───────────────────────────────────────────────
  window._attachParticleCanvas = function () {
    injectParticleCSS();
    getLayer(); // ensures #particle-layer exists inside #root
    var theme = (typeof _currentTheme !== 'undefined') ? _currentTheme : 'default';
    startTheme(theme);
  };

  // ── Hook setTheme to switch particle systems ──────────────────────────
  (function patchSetTheme() {
    var orig = (typeof setTheme === 'function') ? setTheme : null;
    if (!orig) { setTimeout(patchSetTheme, 200); return; }
    setTheme = function (id) {
      orig(id);
      startTheme(id);
    };
  })();

  // ── Spring burst on cell tap ──────────────────────────────────────────
  window.notifyAmbientMove = function (cellIdx) {
    if ((typeof _currentTheme !== 'undefined') && _currentTheme === 'spring') {
      var cc = cellCenter(cellIdx);
      spawnPetal(cc.x, cc.y, true);
    }
  };

})(); // end ambient particles IIFE

function _stopTutorialIfActive() {
  if (!_tutorialActive) return;
  var mode = _tutorialMode;
  _tutorialActive = false;
  _clearTutorialHighlights();
  if (dom.bubble) dom.bubble.classList.remove('tutorial-active');
  if (dom.heartyWrap) dom.heartyWrap._heartyKey = null;
  var btn = document.getElementById('tutorialBtn');
  if (btn) btn.classList.remove('active');
  _syncNewGameBtn();
  // Clear the board so the player starts fresh after the tutorial
  // Use setTimeout so the calling mode-change function runs first
  setTimeout(function() {
    if (mode === 'ultimate' && uState) { uNewGame(); }
    else if (mode === 'misere' && mState) { mNewGame(); }
    else if (!uState && !mState) { newGame(); }
  }, 50);
  // No completion speech — the mode-change function speaks instead.
}

function _tutorialCurrentGame() {
  if (mState) return 'misere';
  if (uState) return 'ultimate';
  return 'classic';
}

function startTutorial() {
  if (_tutorialActive) { endTutorial(); return; }
  _tutorialMode   = _tutorialCurrentGame();
  _tutorialActive = true;
  _tutorialStep   = 0;
  // Cancel all in-flight AI so Hearty can't play on the tutorial board
  _aiGen++;
  clearTimeout(aiTimeout); clearTimeout(watchTimeout);
  clearTimeout(_uAiTimeout); clearTimeout(_mAiTimeout);
  blitzStop();    // freeze any running blitz countdown immediately
  blitzHideUI();  // hide timer ring so it doesn't show during tutorial
  var btn = document.getElementById('tutorialBtn');
  if (btn) btn.classList.add('active');
  _syncNewGameBtn();
  // Force Hearty to redraw with teacher accessories
  if (dom.heartyWrap) dom.heartyWrap._heartyKey = null;
  if (_tutorialMode === 'classic') {
    if (uState) uToggleMode();
    if (mState) mToggleMode();
    state.mode = 'ai'; state.difficulty = 'easy';
    // Clear board cells visually before newGame resets state
    dom.cells.forEach(function(c){ c.dataset.val=''; c.innerHTML='<div class="cell-inner"></div>'; });
    clearWinLine(); if(window.clearWinLine) window.clearWinLine();
    newGame();
  } else if (_tutorialMode === 'ultimate') {
    if (!uState) uToggleMode();
    _uFromMenu = true;
    _uWaitingNewGame = false;
    uNewGame();
  } else {
    if (!mState) mToggleMode();
    _mFromMenu = true;
    _mWaitingNewGame = false;
    mNewGame();
  }
  setTimeout(_renderTutorialStep, 400);
}

function _renderTutorialStep() {
  _clearTutorialHighlights();
  var steps = TUTORIALS[_tutorialMode];
  if (!steps || _tutorialStep >= steps.length) { endTutorial(); return; }
  var step = steps[_tutorialStep];
  // Re-render so cell disabled/click states reflect current _tutorialStep
  if (_tutorialMode === 'misere' && mState) mRender();
  else if (_tutorialMode === 'ultimate' && uState) uRender();
  else render();
  if (step.highlight && step.highlight.length) _applyHighlights(step.highlight);
  _speakTutorial(step, _tutorialStep, steps.length);
}

function _applyHighlights(indices) {
  if (_tutorialMode === 'classic') {
    indices.forEach(function(i) {
      var el = document.getElementById('cell-' + i);
      if (el) el.classList.add('tutorial-highlight');
    });
  } else if (_tutorialMode === 'misere') {
    indices.forEach(function(i) {
      var el = document.getElementById('mcell-' + i);
      if (el) el.classList.add('tutorial-highlight');
    });
  } else if (_tutorialMode === 'ultimate') {
    indices.forEach(function(i) {
      var el = document.getElementById('umboard-' + i);
      if (el) el.classList.add('tutorial-highlight');
    });
  }
}

function _highlightUltimateActiveBoard() {
  if (!uState) return;
  _clearTutorialHighlights();
  var nextBoard = uState.activeBoard;
  if (nextBoard === -1) {
    for (var i = 0; i < 9; i++) {
      if (!uState.meta[i]) {
        var el = document.getElementById('umboard-' + i);
        if (el) el.classList.add('tutorial-highlight');
      }
    }
  } else {
    var el2 = document.getElementById('umboard-' + nextBoard);
    if (el2) el2.classList.add('tutorial-highlight');
  }
}

function _clearTutorialHighlights() {
  document.querySelectorAll('.tutorial-highlight').forEach(function(el) {
    el.classList.remove('tutorial-highlight');
  });
}

// Write tutorial content directly into Hearty's speech bubble
function _speakTutorial(step, stepIdx, total) {
  var modeLabel = _tutorialMode === 'classic' ? 'Classic' : _tutorialMode === 'ultimate' ? 'Ultimate' : 'Mis\u00e8re';

  var btnRow = step.waitForMove
    ? '<div class="tut-btn-row"><button class="tut-skip" onclick="endTutorial()">\u2715 Exit</button><span class="tut-wait">\ud83d\udc46 tap to continue</span></div>'
    : '<div class="tut-btn-row"><button class="tut-skip" onclick="endTutorial()">\u2715 Exit</button><button class="tut-next" onclick="advanceTutorial()">' + (step.nextLabel || 'Next \u2192') + '</button></div>';

  var html =
    '<div class="tut-meta">\ud83d\udcd6 ' + modeLabel + ' \u00b7 ' + (stepIdx+1) + '\u00a0/\u00a0' + total + '</div>' +
    '<p class="tut-text">' + step.text + '</p>' +
    btnRow;

  // Hide bubble, swap content, then show — same pattern as speak()
  state.bubbleText    = step.text;
  state.bubbleVisible = false;
  dom.bubble.className = 'speech-bubble hidden';

  clearTimeout(speakAnimTimeout);
  setTimeout(function() {
    state.bubbleVisible = true;
    state.heartyAnim    = 'speaking';

    dom.bubbleContent.innerHTML = html;
    dom.bubble.className = 'speech-bubble tutorial-active visible';

    var heartyClass = 'hearty-svg-wrap speaking';
    if (dom.heartyWrap.className !== heartyClass) dom.heartyWrap.className = heartyClass;

    SFX.hearty();

    speakAnimTimeout = setTimeout(function() {
      state.heartyAnim = 'breathing';
      var breathClass = 'hearty-svg-wrap breathing';
      if (dom.heartyWrap.className !== breathClass) dom.heartyWrap.className = breathClass;
    }, 750);
  }, 80);
}

function advanceTutorial() {
  _tutorialStep++;
  _renderTutorialStep();
}

function tutorialOnMove() {
  if (!_tutorialActive) return;
  var steps = TUTORIALS[_tutorialMode];
  if (!steps) return;
  var step = steps[_tutorialStep];
  if (step && step.waitForMove) {
    if (_tutorialMode === 'ultimate') _highlightUltimateActiveBoard();
    _tutorialStep++;
    setTimeout(function() {
      _clearTutorialHighlights();
      _renderTutorialStep();
      // Let Hearty respond after player's tutorial move
      if (_tutorialMode === 'classic' && !state.result && state.mode === 'ai' && state.xIsNext) {
        // xIsNext still true here (handleClick returned early before flipping)
        clearTimeout(aiTimeout);
        setState({xIsNext: false, aiThinking: true, heartyAnim: 'wiggling'});
        _tutAIAllowed = true;
        var _tg = ++_aiGen;
        aiTimeout = setTimeout(function() {
          _aiWorker.postMessage({type:'classic', board:state.board.slice(), difficulty:state.difficulty, gen:_tg});
        }, 1000);
      }
      if (_tutorialMode === 'ultimate' && uState && !uState.result && uState.mode === 'ai' && !uState.xIsNext) {
        uState.aiThinking = true;
        uRender();
        _tutAIAllowed = true;
        _uAiTimeout = setTimeout(uDoAIMove, 800);
      }
      if (_tutorialMode === 'misere' && mState && !mState.result && mState.mode === 'ai' && !mState.xIsNext) {
        mState.aiThinking = true;
        mRender();
        _mAiTimeout = setTimeout(mDoAIMove, 800);
      }
    }, 1400);
  }
}

function endTutorial() {
  var mode = _tutorialMode;
  _tutorialActive = false;
  _clearTutorialHighlights();
  if (dom.bubble) dom.bubble.classList.remove('tutorial-active');
  if (dom.heartyWrap) dom.heartyWrap._heartyKey = null;
  var btn = document.getElementById('tutorialBtn');
  if (btn) btn.classList.remove('active');
  _syncNewGameBtn();
  // Clear the board so the player starts fresh after the tutorial
  if (mode === 'ultimate' && uState) { uNewGame(); }
  else if (mode === 'misere' && mState) { mNewGame(); }
  else { newGame(); }
  speak(pickArr([
    "Tutorial complete! You've got this — let's play for real! \ud83d\udc95",
    "All done! Now show me what you've learned! \ud83c\udfae",
    "Tutorial finished! I believe in you — good luck! \ud83c\udf1f"
  ]), true);
}


// ── Auto-tip timer — skipped when app is in background ──
setInterval(()=>{
  if(!_appVisible) return; // don't fire tips when backgrounded
  if(_tutorialActive) return; // don't interrupt tutorial
  const isEmpty = state.board.every(c=>c===null);
  const isFinished = state.result!==null;
  if((isEmpty||isFinished)&&!state.aiThinking){
    speak(pick('health'));
  }
}, 15000);

// ── Boot ──
// Restore saved theme before first render
(function(){
  try {
    var saved = localStorage.getItem('hearty-theme');
    if (saved && saved !== 'default') {
      _currentTheme = saved;
      document.body.setAttribute('data-theme', saved);
    }
  } catch(e){}
})();
// ── Portrait lock (Screen Orientation API) ──
// Locks the app to portrait on devices that support the API (PWA / standalone).
// Falls back silently — the CSS overlay already handles the landscape overlay
// for browsers that don't support lock().
(function() {
  try {
    var ori = screen.orientation || screen.mozOrientation || screen.msOrientation;
    if (ori && typeof ori.lock === 'function') {
      ori.lock('portrait').catch(function(){});
    }
  } catch(e) {}
})();
initLayout();
if (window._attachParticleCanvas) window._attachParticleCanvas();
render();
if (window._prewarmGradCache) window._prewarmGradCache();
// Apply uniform scale so the 390×780 canvas fits any screen in both axes.
// Math.min(vw/W, vh/H) picks the axis that is more constrained — the canvas
// fills that axis fully and is centred (letterboxed) on the other.
(function() {
  var DESIGN_W = 390, DESIGN_H = 780;
  function applyScale() {
    var vw = window.innerWidth, vh = window.innerHeight;
    var scale = Math.min(vw / DESIGN_W, vh / DESIGN_H);
    var root = document.getElementById('root');
    if (root) {
      root.style.width  = DESIGN_W + 'px';
      root.style.height = DESIGN_H + 'px';
      root.style.transform = 'scale(' + scale + ')';
      root.style.transformOrigin = 'top left';
      root.style.left = Math.round((vw - DESIGN_W * scale) / 2) + 'px';
      root.style.top  = '0px';
    }
    // Keep letterbox colour in sync with current theme + palette
    if (typeof applyThemeLetterbox === 'function') applyThemeLetterbox();
  }
  applyScale();
  window.addEventListener('resize', applyScale);
})();
// Restore saved music volume
(function(){
  try {
    var saved = parseInt(localStorage.getItem('hearty-music-vol'));
    if (!isNaN(saved)) {
      var slider = document.getElementById('musicVolumeSlider');
      if (slider) slider.value = saved;
      var desc = document.getElementById('menuMusicDesc');
      if (desc) desc.textContent = 'Volume ' + saved + '%';
      if (window._musicSetVolume) window._musicSetVolume(saved / 100);
    }
  } catch(e) {}
})();
// Show name modal on first load in 2p mode — skip for ai mode
// (don't show modal on boot so the welcome message fires naturally)
</script>
