    <circle cx='0' cy='0' r='2' fill='rgba(0,255,255,0.6)'/>
  </g>

  <!-- ACTIVE ZONE y110-280 -->
  <!-- Big glitch X left -->
  <g transform='translate(8,118) rotate(-18)' fill='none' stroke-linecap='square'>
    <line x1='0' y1='0' x2='24' y2='24' stroke='rgba(0,255,255,0.55)' stroke-width='3.2'/>
    <line x1='24' y1='0' x2='0' y2='24' stroke='rgba(0,255,255,0.55)' stroke-width='3.2'/>
    <line x1='3' y1='0' x2='27' y2='24' stroke='rgba(255,0,255,0.25)' stroke-width='1.2'/>
  </g>
  <!-- Large neon ring right -->
  <circle cx='374' cy='132' r='17' fill='none' stroke='rgba(255,0,255,0.45)' stroke-width='3'/>
  <circle cx='374' cy='132' r='11' fill='none' stroke='rgba(0,255,255,0.25)' stroke-width='1.5'/>
  <circle cx='374' cy='132' r='4' fill='rgba(255,0,255,0.35)'/>
  <!-- Neon ring left mid -->
  <circle cx='46' cy='152' r='12' fill='none' stroke='rgba(255,0,255,0.38)' stroke-width='2.4'/>
  <circle cx='46' cy='152' r='5' fill='none' stroke='rgba(0,255,255,0.3)' stroke-width='1.2'/>
  <!-- X right mid -->
  <g transform='translate(330,148) rotate(18)' fill='none' stroke='rgba(0,255,255,0.40)' stroke-width='2.5' stroke-linecap='square'>
    <line x1='0' y1='0' x2='16' y2='16'/><line x1='16' y1='0' x2='0' y2='16'/>
  </g>
  <!-- Circuit node -->
  <g transform='translate(88,128)' opacity='0.32'>
    <polygon points='0,-9 9,0 0,9 -9,0' fill='none' stroke='rgba(255,0,255,0.55)' stroke-width='1.8'/>
    <circle cx='0' cy='0' r='3' fill='rgba(255,0,255,0.4)'/>
  </g>
  <!-- Circuit trace right -->
  <g transform='translate(288,122)' opacity='0.30'>
    <polyline points='0,0 10,0 10,10' fill='none' stroke='rgba(0,255,255,0.45)' stroke-width='1.8'/>
    <circle cx='0' cy='0' r='2' fill='rgba(0,255,255,0.6)'/>
    <circle cx='10' cy='10' r='2' fill='rgba(0,255,255,0.6)'/>
  </g>
  <!-- X small -->
  <g transform='translate(112,138) rotate(22)' fill='none' stroke='rgba(0,255,255,0.30)' stroke-width='1.8' stroke-linecap='square'>
    <line x1='0' y1='0' x2='9' y2='9'/><line x1='9' y1='0' x2='0' y2='9'/>
  </g>
  <!-- Big circuit trace left -->
  <g transform='translate(4,196)' opacity='0.36'>
    <polyline points='0,0 12,0 12,12 24,12 24,24' fill='none' stroke='rgba(0,255,255,0.55)' stroke-width='2.8'/>
    <circle cx='0' cy='0' r='3' fill='rgba(0,255,255,0.7)'/>
    <circle cx='24' cy='24' r='3' fill='rgba(0,255,255,0.7)'/>
  </g>
  <!-- Large neon ring right -->
  <circle cx='370' cy='210' r='16' fill='none' stroke='rgba(255,0,255,0.42)' stroke-width='2.8'/>
  <circle cx='370' cy='210' r='9' fill='none' stroke='rgba(0,255,255,0.22)' stroke-width='1.5'/>
  <circle cx='370' cy='210' r='3' fill='rgba(255,0,255,0.45)'/>
  <!-- X lower left -->
  <g transform='translate(54,224) rotate(-22)' fill='none' stroke='rgba(0,255,255,0.36)' stroke-width='2.2' stroke-linecap='square'>
    <line x1='0' y1='0' x2='14' y2='14'/><line x1='14' y1='0' x2='0' y2='14'/>
  </g>
  <!-- Diamond right -->
  <g transform='translate(328,232)' opacity='0.30'>
    <polygon points='0,-11 11,0 0,11 -11,0' fill='none' stroke='rgba(255,0,255,0.50)' stroke-width='2'/>
    <polygon points='0,-6 6,0 0,6 -6,0' fill='rgba(255,0,255,0.2)'/>
  </g>
  <!-- Neon ring left -->
  <circle cx='22' cy='256' r='9' fill='none' stroke='rgba(255,0,255,0.32)' stroke-width='2'/>
  <circle cx='22' cy='256' r='3' fill='rgba(255,0,255,0.35)'/>
  <!-- X right lower -->
  <g transform='translate(356,260) rotate(-10)' fill='none' stroke='rgba(0,255,255,0.30)' stroke-width='2' stroke-linecap='square'>
    <line x1='0' y1='0' x2='12' y2='12'/><line x1='12' y1='0' x2='0' y2='12'/>
  </g>

  <!-- CARD ZONE — fade out -->
  <circle cx='28' cy='296' r='12' fill='none' stroke='rgba(255,0,255,0.18)' stroke-width='2'/>
  <circle cx='28' cy='296' r='4' fill='none' stroke='rgba(0,255,255,0.12)' stroke-width='1'/>
  <g transform='translate(78,304) rotate(24)' fill='none' stroke='rgba(0,255,255,0.16)' stroke-width='1.8' stroke-linecap='square'>
    <line x1='0' y1='0' x2='12' y2='12'/><line x1='12' y1='0' x2='0' y2='12'/>
  </g>
  <circle cx='362' cy='306' r='8' fill='none' stroke='rgba(255,0,255,0.14)' stroke-width='1.8'/>
</svg>