<svg xmlns='http://www.w3.org/2000/svg' width='390' height='340' viewBox='0 0 390 340'>
  <rect width='390' height='340' fill='#0d0221'/>

  <!-- Scan-line texture -->
  <g opacity='0.04' stroke='rgba(0,255,255,0.8)' stroke-width='0.5'>
    <line x1='0' y1='20' x2='390' y2='20'/><line x1='0' y1='40' x2='390' y2='40'/>
    <line x1='0' y1='60' x2='390' y2='60'/><line x1='0' y1='80' x2='390' y2='80'/>
    <line x1='0' y1='100' x2='390' y2='100'/><line x1='0' y1='120' x2='390' y2='120'/>
    <line x1='0' y1='140' x2='390' y2='140'/><line x1='0' y1='160' x2='390' y2='160'/>
    <line x1='0' y1='180' x2='390' y2='180'/><line x1='0' y1='200' x2='390' y2='200'/>
    <line x1='0' y1='220' x2='390' y2='220'/><line x1='0' y1='240' x2='390' y2='240'/>
    <line x1='0' y1='260' x2='390' y2='260'/><line x1='0' y1='280' x2='390' y2='280'/>
    <line x1='0' y1='300' x2='390' y2='300'/><line x1='0' y1='320' x2='390' y2='320'/>
  </g>

  <!-- GHOST ZONE y0-110 -->
  <!-- Neon ring top-left -->
  <circle cx='22' cy='18' r='8' fill='none' stroke='rgba(255,0,255,0.40)' stroke-width='1.8'/>
  <circle cx='22' cy='18' r='5' fill='none' stroke='rgba(255,0,255,0.20)' stroke-width='1'/>
  <!-- Glitch X -->
  <g transform='translate(68,8) rotate(20)' fill='none' stroke-linecap='square'>
    <line x1='0' y1='0' x2='9' y2='9' stroke='rgba(0,255,255,0.55)' stroke-width='2.2'/>
    <line x1='9' y1='0' x2='0' y2='9' stroke='rgba(0,255,255,0.55)' stroke-width='2.2'/>
    <line x1='2' y1='0' x2='11' y2='9' stroke='rgba(255,0,255,0.20)' stroke-width='1'/>
  </g>
  <!-- Double neon ring right -->
  <circle cx='356' cy='14' r='10' fill='none' stroke='rgba(255,0,255,0.38)' stroke-width='2'/>
  <circle cx='356' cy='14' r='6' fill='none' stroke='rgba(0,255,255,0.25)' stroke-width='1.2'/>
  <!-- Circuit node dot -->
  <circle cx='356' cy='14' r='2' fill='rgba(255,0,255,0.6)'/>
  <!-- X right -->
  <g transform='translate(316,6) rotate(-16)' fill='none' stroke='rgba(0,255,255,0.32)' stroke-width='1.8' stroke-linecap='square'>
    <line x1='0' y1='0' x2='9' y2='9'/><line x1='9' y1='0' x2='0' y2='9'/>
  </g>
  <!-- Circuit trace left -->
  <g transform='translate(6,52)' opacity='0.35'>
    <polyline points='0,0 8,0 8,8 16,8 16,16' fill='none' stroke='rgba(0,255,255,0.5)' stroke-width='1.8'/>
    <circle cx='0' cy='0' r='2' fill='rgba(0,255,255,0.6)'/>
    <circle cx='16' cy='16' r='2' fill='rgba(0,255,255,0.6)'/>
  </g>
  <!-- Neon ring -->
  <circle cx='372' cy='56' r='9' fill='none' stroke='rgba(255,0,255,0.34)' stroke-width='2'/>
  <circle cx='372' cy='56' r='3' fill='rgba(255,0,255,0.3)'/>
  <!-- Glitch X small -->
  <g transform='translate(104,38) rotate(-8)' fill='none' stroke='rgba(0,255,255,0.26)' stroke-width='1.6' stroke-linecap='square'>
    <line x1='0' y1='0' x2='8' y2='8'/><line x1='8' y1='0' x2='0' y2='8'/>
  </g>
  <!-- Diamond -->
  <g transform='translate(280,42)' opacity='0.28'>
    <polygon points='0,-7 7,0 0,7 -7,0' fill='none' stroke='rgba(255,0,255,0.55)' stroke-width='1.6'/>
    <polygon points='0,-4 4,0 0,4 -4,0' fill='rgba(255,0,255,0.2)'/>
  </g>
  <!-- Neon ring left -->
  <circle cx='32' cy='92' r='11' fill='none' stroke='rgba(255,0,255,0.35)' stroke-width='2.2'/>
  <circle cx='32' cy='92' r='4' fill='none' stroke='rgba(0,255,255,0.25)' stroke-width='1'/>
