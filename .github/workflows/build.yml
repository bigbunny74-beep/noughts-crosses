name: Build APK (Fixed Assets)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install image & font tools
        run: |
          sudo apt-get install -y imagemagick python3-pip
          pip3 install requests --break-system-packages

      - name: Bundle external assets
        run: |
          # 1. Target the 'www' directory found in your capacitor.config.json
          WEB_DIR="www"
          echo "Web directory set to: $WEB_DIR"
          
          mkdir -p "$WEB_DIR/assets/fonts" "$WEB_DIR/assets/bg"

          # 2. Handle Fonts
          FONT_URL="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=DM+Mono:wght@400;500&family=Lilita+One&display=swap"
          curl -sfA "Mozilla/5.0 (X11; Linux x86_64)" "$FONT_URL" -o "$WEB_DIR/assets/fonts/fonts.css" || echo "Font CSS download failed"

          grep -oP 'https://[^)]+\.woff2' "$WEB_DIR/assets/fonts/fonts.css" | sort -u | while read url; do
            fname=$(echo "$url" | md5sum | cut -c1-12).woff2
            curl -sfL "$url" -o "$WEB_DIR/assets/fonts/$fname"
            sed -i "s|$url|../fonts/$fname|g" "$WEB_DIR/assets/fonts/fonts.css"
          done
          
          # Replace Google Font import with local CSS in index.html
          sed -i "s|@import url(['\"]https://fonts.googleapis.com/[^'\"]*['\"])|@import url('./assets/fonts/fonts.css')|g" "$WEB_DIR/index.html"

          # 3. Handle SVGs
          SVG_URLS=(
            "https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/3095bc0db01eab570b679e338f7367e036abd388/assests/hearty-bg-default.svg"
            "https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/a9dedc52ba38154a32fec813495a90cff93f172a/assests/hearty-bg-default-dark.svg"
            "https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/3095bc0db01eab570b679e338f7367e036abd388/assests/hearty-bg-spring.svg"
            "https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/a9dedc52ba38154a32fec813495a90cff93f172a/assests/hearty-bg-spring-dark.svg"
            "https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/3095bc0db01eab570b679e338f7367e036abd388/assests/hearty-bg-neon.svg"
            "https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/a9dedc52ba38154a32fec813495a90cff93f172a/assests/hearty-bg-neon-dark.svg"
            "https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/3095bc0db01eab570b679e338f7367e036abd388/assests/hearty-bg-halloween.svg"
            "https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/a9dedc52ba38154a32fec813495a90cff93f172a/assests/hearty-bg-halloween-dark.svg"
            "https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/3095bc0db01eab570b679e338f7367e036abd388/assests/hearty-bg-ocean.svg"
            "https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/a9dedc52ba38154a32fec813495a90cff93f172a/assests/hearty-bg-ocean-dark.svg"
            "https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/3095bc0db01eab570b679e338f7367e036abd388/assests/hearty-bg-summer.svg"
            "https://raw.githubusercontent.com/bigbunny74-beep/noughts-crosses/a9dedc52ba38154a32fec813495a90cff93f172a/assests/hearty-bg-summer-dark.svg"
          )

          for url in "${SVG_URLS[@]}"; do
            fname=$(basename "$url")
            if curl -sfL "$url" -o "$WEB_DIR/assets/bg/$fname"; then
              sed -i "s|$url|./assets/bg/$fname|g" "$WEB_DIR/index.html"
            else
              echo "Failed to download $url"
            fi
          done

      - name: Add Android platform
        run: npx cap add android

      - name: Fix SDK versions and App Name
        run: |
          # 1. Update SDK versions in variables.gradle to stop the 'old android' warning
          SEDCONFIG="android/variables.gradle"
          if [ -f "$SEDCONFIG" ]; then
            sed -i "s/compileSdkVersion = .*/compileSdkVersion = 34/g" "$SEDCONFIG"
            sed -i "s/targetSdkVersion = .*/targetSdkVersion = 34/g" "$SEDCONFIG"
            echo "Updated $SEDCONFIG to Target SDK 34"
          fi

          # 2. Set the friendly app name (Quoted to prevent YAML syntax errors with '&')
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Hearty Noughts \&amp; Crosses</string>|g' android/app/src/main/res/values/strings.xml

      - name: Copy web assets
        run: npx cap copy android

      - name: Process modern adaptive icons and splash
        run: |
          # 1. Ensure directories exist
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable
          
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p android/app/src/main/res/$dir
          done

          # 2. Icon processing
          if [ -f "icon.png" ]; then
            echo "Processing icon.png for Adaptive and Legacy formats..."
            
            # Create a solid background color (Updated to #F7B9C9)
            echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="ic_launcher_background">#F7B9C9</color></resources>' > android/app/src/main/res/values/ic_background_color.xml

            # Create Adaptive XML definition
            cat <<EOF > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
<?xml version="1.0" encoding="utf-8"?>
<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
    <background android:drawable="@color/ic_launcher_background"/>
    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
</adaptive-icon>
EOF
            cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

            # Generate Foreground Layers (Resizing to 108dp base / 432px for xxxhdpi)
            convert icon.png -resize 432x432 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png
            convert icon.png -resize 324x324 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
            convert icon.png -resize 216x216 android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
            convert icon.png -resize 162x162 android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
            convert icon.png -resize 108x108 android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png

            # Generate Legacy PNGs
            convert icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            convert icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            
            for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              cp android/app/src/main/res/mipmap-$d/ic_launcher.png android/app/src/main/res/mipmap-$d/ic_launcher_round.png
            done
          fi

          # 3. Splash processing
          if [ -f "splash.png" ]; then
            convert splash.png -resize 2732x2732 android/app/src/main/res/drawable/splash.png
            mkdir -p android/app/src/main/res/drawable-port-xxhdpi
            mkdir -p android/app/src/main/res/drawable-land-xxhdpi
            cp android/app/src/main/res/drawable/splash.png android/app/src/main/res/drawable-port-xxhdpi/splash.png
            cp android/app/src/main/res/drawable/splash.png android/app/src/main/res/drawable-land-xxhdpi/splash.png
          else
            echo "CRITICAL: splash.png not found. Failing build."
            exit 1
          fi

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HeartyNoughtsAndCrosses
          path: android/app/build/outputs/apk/debug/app-debug.apk
