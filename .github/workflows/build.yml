name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets
        run: npx cap copy android

      - name: Install image tools
        run: sudo apt-get install -y imagemagick

      - name: Process Custom Assets
        run: |
          # Ensure directories exist
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/drawable

          # Process Icon (expects icon.png in root)
          if [ -f "icon.png" ]; then
            echo "Processing icon.png..."
            convert icon.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert icon.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert icon.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          else
            echo "Warning: icon.png not found in root. Using default Capacitor icons."
          fi

          # Process Splash (expects splash.png in root)
          if [ -f "splash.png" ]; then
            echo "Processing splash.png..."
            convert splash.png -resize 2732x2732 android/app/src/main/res/drawable/splash.png
          else
            echo "Warning: splash.png not found in root. Using default Capacitor splash."
          fi

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NoughtsAndCrosses
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
